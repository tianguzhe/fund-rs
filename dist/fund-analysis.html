<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基金深度分析</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./fund-analysis.css">
</head>
<body>

<div class="scroll-prog" aria-hidden="true"><div class="scroll-prog-fill" id="scrollProgFill"></div></div>

<div id="loading" role="status" aria-live="polite">
  <div class="spin"></div>
  <div class="ltxt">LOADING FUND DATA...</div>
</div>

<div class="layout">
    <div class="wrap app-shell" id="app"></div>
  <aside class="toc" id="toc" aria-label="目录"></aside>
</div>

<script>
/* ─── helpers ─── */

// HTML-escape every interpolated upstream string. The fund-core JSON includes
// raw user-visible strings (fund names, manager resume, fee rule text). Any of
// these could in principle carry an `<` and break the page or run script.
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

const PMAP = {
  'Last Week':'近1周','Last Month':'近1月','Last 3 Months':'近3月',
  'Last 6 Months':'近6月','Last Year':'近1年','Last 2 Years':'近2年',
  'Last 3 Years':'近3年','Last 5 Years':'近5年','Year to Date':'今年以来',
  'Since Inception':'成立来',
};

function fmt(v, d=2) { const n=parseFloat(v); return isNaN(n)?'--':n.toFixed(d); }
function pct(v, d=2, sign=false) {
  const n=parseFloat(v); if(isNaN(n)) return '--';
  return (sign&&n>0?'+':'')+n.toFixed(d)+'%';
}
function cc(v) { const n=parseFloat(v); if(isNaN(n)||n===0) return 'neu'; return n>0?'pos':'neg'; }
function cpct(v,d=2) { return `<span class="${cc(v)}">${pct(v,d,true)}</span>`; }
function rankpct(r,t) { return t?r/t*100:50; }
function chip(r,t) {
  if(!t) return '--';
  const p=rankpct(r,t);
  const cls = p<=25?'good':p>=75?'bad':'';
  return `<span class="chip ${cls}">${r}/${t}</span>`;
}

/* Chapter + section auto-numbering. _secCh advances when bChapterBreak()
 * fires; _secNo advances on every sl() call. The label injected as a
 * monospace § prefix replaces the old 2px lead-in dash on .slabel. */
let _secCh = 0;
let _secNo = 0;

function pad2(n) { return String(n).padStart(2, '0'); }

function nextSecId() {
  _secNo += 1;
  return `${pad2(_secCh)}.${pad2(_secNo)}`;
}

/* section label with optional badge / as-of date */
function sl(text, badge='', asof='') {
  const num = _secCh > 0 ? nextSecId() : '';
  let html = `<div class="slabel">`;
  if (num) html += `<span class="slabel-num">§${num}</span>`;
  html += `<span class="slabel-title">${esc(text)}</span>`;
  if (badge) html += `<span class="badge">${esc(badge)}</span>`;
  if (asof) html += `<span class="asof">截至 ${esc(asof)}</span>`;
  html += `</div>`;
  return html;
}

function nval(v, fallback=null) {
  const n = Number(v);
  return Number.isFinite(n) ? n : fallback;
}

function safePct(v, d=2, sign=false) {
  const n = nval(v);
  return n == null ? '--' : pct(n, d, sign);
}

function commentaryBox(title, bullets, cls='') {
  const list = (bullets || []).filter(Boolean);
  if (!list.length) return '';
  return `
    <div class="commentary ${cls}">
      <div class="commentary-title">${esc(title)}</div>
      <ul class="commentary-list">${list.map(x => `<li>${x}</li>`).join('')}</ul>
    </div>`;
}

function getPeriod(d, title) {
  return (d.periods || []).find(p => p.title === title) || null;
}

function scoreTier(score) {
  if (score >= 80) return { label:'优秀', cls:'pos', text:'综合质量突出，数据层面具备较强可持有性' };
  if (score >= 65) return { label:'中等偏上', cls:'warn', text:'综合表现可用，但仍需要看清风险来源' };
  if (score >= 55) return { label:'中等', cls:'neu', text:'优缺点并存，更适合作为候选而非直接重仓' };
  return { label:'偏弱', cls:'neg', text:'关键维度偏弱，除非有明确配置理由，否则不宜放大仓位' };
}

function stockExposureLabel(stockPct) {
  if (stockPct == null) return '权益仓位未披露';
  if (stockPct < 5) return '接近纯债定位';
  if (stockPct < 20) return '偏债增强定位';
  if (stockPct < 60) return '权益增强较明显';
  if (stockPct < 90) return '偏股/灵活配置定位';
  return '股票型/高权益定位';
}

function latestAsset(d) {
  return Array.isArray(d.asset_allocation) && d.asset_allocation.length ? d.asset_allocation[0] : null;
}

function latestScale(d) {
  return Array.isArray(d.scale_changes) && d.scale_changes.length ? d.scale_changes[0] : null;
}

function latestHolder(d) {
  return Array.isArray(d.holder_structure) && d.holder_structure.length ? d.holder_structure[0] : null;
}

function topStockStats(d, limit=10) {
  const stocks = d.top_stocks?.stocks || [];
  const top = stocks.slice(0, limit);
  const total = top.reduce((acc, s) => acc + (nval(s.ratio, 0) || 0), 0);
  const max = top.reduce((acc, s) => Math.max(acc, nval(s.ratio, 0) || 0), 0);
  return { top, total, max };
}

function topBondStats(d, limit=10) {
  const bonds = d.top_bonds?.bonds || [];
  const top = bonds.slice(0, limit);
  const total = top.reduce((acc, b) => acc + (nval(b.ratio, 0) || 0), 0);
  return { top, total };
}

function holdingHorizonText(d) {
  const r = d.rolling_returns || {};
  const hc = d.holding_constraints;
  if (hc?.min_holding_days) {
    const days = hc.min_holding_days;
    const label = days >= 365 ? `${Math.round(days / 365)} 年` : `${days} 天`;
    return `合同含最短持有期 <b>${esc(label)}</b>，流动性敏感资金需要先接受锁定安排。`;
  }
  if (r.y3?.min > 0) return `拉长到 <b>3 年持有</b> 的历史滚动体验更稳，任意 3 年窗口未亏损。`;
  if (r.y1?.min < 0) return `1 年维度曾出现亏损窗口，更适合用 <b>分批 + 中长期</b> 的方式持有。`;
  return `历史滚动样本有限，持有期判断以回撤承受能力为主。`;
}

function mainRiskBullets(d) {
  const bullets = [];
  const r = d.risk_metrics || {};
  const dist = d.distribution || {};
  const aa = latestAsset(d);
  const hs = latestHolder(d);
  const sc = latestScale(d);
  const stockPct = aa ? nval(aa.stock_pct, 0) : null;
  const bondPct = aa ? nval(aa.bond_pct, 0) : null;
  const cashPct = aa ? nval(aa.cash_pct, 0) : null;
  const leverage = aa ? stockPct + bondPct + cashPct - 100 : 0;

  if (nval(r.sharpe_ratio) != null && r.sharpe_ratio < 0) {
    bullets.push(`近 ${esc(r.data_points || '--')} 交易日 Sharpe 为 <b class="neg">${fmt(r.sharpe_ratio)}</b>，风险调整收益偏弱。`);
  }
  if (nval(r.max_drawdown) != null && r.max_drawdown > 8) {
    bullets.push(`最大回撤 <b class="neg">-${fmt(r.max_drawdown)}%</b>，持有体验不应按低波现金替代品理解。`);
  }
  if (nval(dist.excess_kurtosis) != null && dist.excess_kurtosis > 3) {
    bullets.push(`日收益分布呈厚尾，极端单日波动概率高于普通正态假设。`);
  }
  if (stockPct != null && stockPct >= 15) {
    bullets.push(`最新股票仓位 <b>${fmt(stockPct)}%</b>，收益弹性和回撤都明显受权益市场影响。`);
  }
  if (leverage > 5) {
    bullets.push(`资产合计约 <b>${fmt(stockPct + bondPct + cashPct)}%</b>，债基杠杆信号较明确。`);
  }
  if (hs && nval(hs.institutional_pct, 0) > 70) {
    bullets.push(`机构持有人占比 <b>${fmt(hs.institutional_pct)}%</b>，资金结构偏机构盘，需关注大额申赎扰动。`);
  }
  if (sc && Math.abs(nval(sc.change_pct, 0)) > 20) {
    bullets.push(`最近一期净资产变动 <b class="${sc.change_pct >= 0 ? 'pos' : 'neg'}">${pct(sc.change_pct,2,true)}</b>，规模变化会影响建仓与流动性管理。`);
  }
  return bullets;
}

function bInvestmentSummary(d) {
  const det = d.detail || {};
  const score = nval(d.scores?.overall, 0) || 0;
  const tier = scoreTier(score);
  const r = d.risk_metrics || {};
  const y1 = getPeriod(d, 'Last Year');
  const m3 = getPeriod(d, 'Last 3 Months');
  const aa = latestAsset(d);
  const stockPct = aa ? nval(aa.stock_pct, null) : null;
  const profile = stockExposureLabel(stockPct);
  const trend = [];
  if (m3 && y1) {
    const shortLead = (m3.return_rate || 0) - ((y1.return_rate || 0) / 4);
    if (shortLead > 2) {
      trend.push(`近 3 月收益 ${safePct(m3.return_rate,2,true)} 明显强于近 1 年折算节奏，近期行情贡献偏大。`);
    } else if (shortLead < -2) {
      trend.push(`近 3 月收益 ${safePct(m3.return_rate,2,true)} 弱于近 1 年折算节奏，近期动能放缓。`);
    } else {
      trend.push(`近 3 月与近 1 年收益节奏大体一致，短期没有明显脱离长期状态。`);
    }
  }
  const hc = d.holding_constraints;
  const hs = latestHolder(d);
  const risks = mainRiskBullets(d).slice(0, 3);
  const fit = [];
  if (score >= 65) fit.push('可进入候选池');
  if (d.rolling_returns?.y3?.min > 0) fit.push('适合长持账户');
  if (stockPct != null && stockPct < 20) fit.push('偏稳健配置');
  if (!fit.length) fit.push('先观察，不宜重仓');
  const avoid = [];
  if (r.max_drawdown > 8) avoid.push('不能承受中等回撤');
  if (hc?.min_holding_days) avoid.push('需要短期流动性');
  if (hs?.institutional_pct > 70) avoid.push('担心机构赎回扰动');
  if (!avoid.length) avoid.push('短期择时资金');
  const panels = [
    {
      title: '核心判断',
      body: `<b class="${tier.cls}">${score}/100 · ${esc(tier.label)}</b>。${esc(tier.text)}；真实定位为 ${esc(det.FTYPE || '--')} / R${esc(det.RISKLEVEL || '--')}，${esc(profile)}${stockPct == null ? '' : `（股票 ${fmt(stockPct)}%）`}。`,
    },
    {
      title: '适合',
      body: fit.map(x => `<span class="decision-pill">${esc(x)}</span>`).join(''),
    },
    {
      title: '警惕',
      body: risks.length ? risks.join('') : avoid.map(x => `<span class="decision-pill warn">${esc(x)}</span>`).join(''),
    },
    {
      title: '操作口径',
      body: trend[0] ? `${trend[0]} ${holdingHorizonText(d)}` : holdingHorizonText(d),
    },
  ].map(p => `
    <div class="decision-panel">
      <div class="decision-title">${esc(p.title)}</div>
      <div class="decision-body">${p.body}</div>
    </div>`).join('');

  return `
  <section class="card insight-card mb24 fade">
    ${sl('配置结论', '精简决策')}
    <div class="decision-grid">${panels}</div>
  </section>`;
}

/* ─── builders ─── */

/* Chapter break — full-row divider that introduces a new top-level
 * chapter (I PROFILE / II PERFORMANCE / ...). Resets the in-chapter
 * section counter so sl() emits §02.01, §02.02, ... after II fires. */
const CHAPTERS = [
  { roman: 'I',   tag: 'RETURN',            name: '收益与比较',
    desc: '先看真实收益、同类排名、累计走势和基准差距。' },
  { roman: 'II',  tag: 'RISK',              name: '风险与持有体验',
    desc: '波动、回撤、尾部、滚动样本与金额化的盈亏区间。' },
  { roman: 'III', tag: 'STYLE',             name: '风格与持仓',
    desc: '资产配置、重仓股债与经理风格是否一致。' },
  { roman: 'IV',  tag: 'FLOW & COST',       name: '资金与成本',
    desc: '规模变动、持有人结构、费率和申赎限制。' },
  { roman: 'V',   tag: 'APPENDIX',          name: '档案与附录',
    desc: '基础档案、评分拆解、经理履历、月度和分红明细。' },
];

function bChapterBreak(chapterIndex, sectionCount) {
  _secCh = chapterIndex;
  _secNo = 0;
  const c = CHAPTERS[chapterIndex - 1];
  if (!c) return '';
  return `
  <section class="chapter-break" id="ch-${chapterIndex}" aria-label="Chapter ${esc(c.roman)} · ${esc(c.tag)}">
    <div class="chapter-roman">${esc(c.roman)}</div>
    <div class="chapter-body">
      <h2 class="chapter-name"><span class="chapter-name-tag">§</span>${esc(c.tag)}</h2>
      <div class="chapter-rule"></div>
      <p class="chapter-desc">${esc(c.desc)}</p>
      <div class="chapter-meta">${pad2(sectionCount)} sections · ${esc(c.name)}</div>
    </div>
  </section>`;
}

/* Verdict — 35-50 字的一句话编辑导语，压缩 bInvestmentSummary 的判断。
 * 走规则化判断，不依赖 LLM：评分档位 / 风格定位 / 回撤口径 / 费率水平 /
 * 持有期建议。文案是 2-3 句分号串接，不超过两行屏宽。 */
function feeBucket(d) {
  const det = d.detail || {};
  const total = (parseFloat(det.MGREXP || '0')
               + parseFloat(det.TRUSTEXP || '0')
               + parseFloat(det.SALESEXP || '0'));
  if (!isFinite(total) || total <= 0) return { total: null, tier: '--', cls: 'neu' };
  if (total <= 0.6) return { total, tier: '低', cls: 'pos' };
  if (total <= 1.0) return { total, tier: '中', cls: 'neu' };
  return { total, tier: '偏高', cls: 'warn' };
}

function bVerdict(d) {
  const score = nval(d.scores?.overall, 0) || 0;
  const tier = scoreTier(score);
  const det = d.detail || {};
  const r = d.risk_metrics || {};
  const aa = latestAsset(d);
  const stockPct = aa ? nval(aa.stock_pct, null) : null;
  const profile = stockExposureLabel(stockPct);
  const fee = feeBucket(d);
  const roll = d.rolling_returns || {};
  const hc = d.holding_constraints;

  // Clause 1: 定位 + 档位
  const ftype = det.FTYPE || '基金';
  const clause1 = `<b>${esc(ftype)}</b> · ${esc(profile)}，综合评分 <b class="${tier.cls}">${score}/100 · ${esc(tier.label)}</b>`;

  // Clause 2: 风险 + 滚动样本
  const mdd = r.max_drawdown != null ? '-' + fmt(r.max_drawdown) + '%' : '--';
  const rollSig = (roll.y3 && roll.y3.min > 0)
    ? `任意 3 年持有未亏损`
    : (roll.y1 && roll.y1.min < 0)
      ? `近 1 年滚动曾亏损`
      : `滚动样本有限`;
  const clause2 = `最大回撤 <b class="neg">${esc(mdd)}</b>、${esc(rollSig)}`;

  // Clause 3: 费率
  let clause3 = '';
  if (fee.total != null) {
    clause3 = `费率 <b class="${fee.cls}">${fmt(fee.total)}%</b>（同类${esc(fee.tier)}）`;
  }

  // Clause 4: 持有期建议
  const horizonDays = hc?.min_holding_days || 0;
  let horizon = '';
  if (horizonDays >= 365) {
    horizon = `合同含 ${Math.round(horizonDays / 365)} 年最短持有期`;
  } else if (roll.y3 && roll.y3.min > 0) {
    horizon = `适合 3 年以上稳健账户底仓`;
  } else if (score >= 65) {
    horizon = `适合中长期持有`;
  } else {
    horizon = `更适合作为候选而非重仓`;
  }

  const parts = [clause1, clause2, clause3, horizon].filter(Boolean);
  const text = parts.join('；') + '。';

  return `
  <section class="verdict fade" aria-label="一句话定论">
    <div class="verdict-label">
      <span class="verdict-label-tag">THE TAKE · §0</span>
      <span class="verdict-label-rule"></span>
    </div>
    <p class="verdict-text">${text}</p>
    <div class="verdict-attr">规则化判断 / 23 字段输入</div>
  </section>`;
}

function bHeader(d) {
  const s = d.scores.overall;
  const sc = s>=80?'#2f6a48':s>=65?'#a4761d':'#973340';
  const circ = 2 * Math.PI * 47;
  const det = d.detail;
  const scale = (parseFloat(det.ENDNAV)/1e8).toFixed(2);
  // Split the fund name into per-character spans so each letter can be
  // animated in turn — gives the masthead an editorial reveal cadence.
  const splitName = [...(det.SHORTNAME || '')].map((ch, i) =>
    ch === ' '
      ? '<span class="letter">&nbsp;</span>'
      : `<span class="letter" style="animation-delay:${(0.18 + i * 0.045).toFixed(3)}s">${esc(ch)}</span>`
  ).join('');
  return `
  <header class="hdr fade">
    <div>
      <div class="hcode">基金代码 ${esc(det.FCODE)}</div>
      <div class="hname">${splitName}</div>
      <div class="hfull">${esc(det.FULLNAME)}</div>
      <div class="tags">
        <span class="tag ttype">${esc(det.FTYPE)}</span>
        <span class="tag trisk">风险 R${esc(det.RISKLEVEL)}</span>
        <span class="tag tco">${esc(det.JJGS)}</span>
        <span class="tag tco">规模 ${scale} 亿</span>
      </div>
    </div>
    <div class="gaugewrap" aria-label="综合评分 ${s} 分">
      <div class="gaugesvg">
        <svg width="112" height="112" viewBox="0 0 112 112" aria-hidden="true">
          <circle class="gtrack" cx="56" cy="56" r="47"></circle>
          <circle class="gfill" id="gfill" cx="56" cy="56" r="47"
            stroke="${sc}" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${circ.toFixed(2)}"></circle>
        </svg>
        <div class="gcenter">
          <div class="gnum" id="gnum">0</div>
          <div class="gcap">综合评分</div>
        </div>
      </div>
      <div class="glabel">满分 100</div>
    </div>
  </header>`;
}

function bHoldingBanner(d) {
  const hc = d.holding_constraints;
  if (!hc || hc.min_holding_days == null) return '';
  const days = hc.min_holding_days;
  const phrase = days >= 365 ? `${(days/365).toFixed(0)} 年` : `${days} 天`;
  return `
  <div class="banner fade" role="alert">
    <div class="banner-icon" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
      </svg>
    </div>
    <div class="banner-text">
      <div class="banner-title">最短持有期 ${esc(phrase)}</div>
      <div class="banner-sub">${esc(hc.features || '')}</div>
    </div>
  </div>`;
}

/* Hero key stats — three oversized display numerals: annualized return,
 * max drawdown, sharpe. These are the three numbers a serious investor
 * looks at first; surface them with editorial scale right under the masthead. */
function bHeroStats(d) {
  const r = d.risk_metrics;
  if (!r) return '';
  const ar    = r.annualized_return;
  const mdd   = r.max_drawdown;
  const sharpe= r.sharpe_ratio;
  const arCls    = ar >= 8 ? 'pos' : ar >= 3 ? '' : 'warn';
  const mddCls   = mdd >= 15 ? 'neg' : mdd >= 8 ? 'warn' : '';
  const sharpeCls= sharpe >= 1 ? 'pos' : sharpe >= 0 ? '' : 'neg';
  const arSub    = ar >= 10 ? '同类顶级' : ar >= 6 ? '中上水平' : ar >= 3 ? '一般' : '偏弱';
  const mddSub   = mdd <= 3 ? '波动极小' : mdd <= 8 ? '温和回撤' : mdd <= 20 ? '中等波动' : '剧烈波动';
  const sharpeSub= sharpe >= 1.5 ? '风险收益顶级' : sharpe >= 1 ? '风险收益优秀' : sharpe >= 0.5 ? '风险收益尚可' : '风险收益偏弱';
  return `
  <div class="hero-stats fade">
    <div class="hero-stat">
      <div class="k">Annualized Return · 年化</div>
      <div class="v ${arCls}" data-count="${ar.toFixed(2)}" data-suffix="%" data-decimals="2" data-signed="1">${ar >= 0 ? '+' : ''}${ar.toFixed(2)}<span class="u">%</span></div>
      <div class="sub">${arSub} · 近 ${r.data_points} 交易日</div>
      <span class="underline"></span>
    </div>
    <div class="hero-stat">
      <div class="k">Max Drawdown · 最大回撤</div>
      <div class="v ${mddCls}" data-count="${(-mdd).toFixed(2)}" data-suffix="%" data-decimals="2">−${mdd.toFixed(2)}<span class="u">%</span></div>
      <div class="sub">${mddSub}${r.max_drawdown_recovery_days != null ? ` · ${r.max_drawdown_recovery_days} 天修复` : ' · 仍在水下'}</div>

    </div>
    <div class="hero-stat">
      <div class="k">Sharpe Ratio · 夏普</div>
      <div class="v ${sharpeCls}" data-count="${sharpe.toFixed(2)}" data-decimals="2">${sharpe.toFixed(2)}</div>
      <div class="sub">${sharpeSub} · 卡玛 ${r.calmar_ratio.toFixed(2)}</div>
      <span class="underline"></span>
    </div>
  </div>`;
}

function bInfo(d) {
  const det = d.detail;
  const mgr = parseFloat(det.MGREXP||'0'), tru = parseFloat(det.TRUSTEXP||'0'), sal = parseFloat(det.SALESEXP||'0');
  const tot = (mgr+tru+sal).toFixed(2);

  return `
  <div class="card mb24 fade">
    ${sl('基本信息')}
    <div class="igrid">
      <div class="icell"><div class="ikey">成立日期</div><div class="ival">${esc(det.ESTABDATE)}</div></div>

      <div class="icell"><div class="ikey">基金公司</div><div class="ival">${esc(det.JJGS)}</div></div>
      <div class="icell"><div class="ikey">基金经理</div><div class="ival">${esc(det.JJJL)}</div></div>
      <div class="icell"><div class="ikey">综合费率</div><div class="ival">${tot}% <small>管${esc(det.MGREXP)} 托${esc(det.TRUSTEXP)} 销${esc(det.SALESEXP)}</small></div></div>
    </div>
  </div>`;
}

function bTradingCost(d) {
  const hasPurchase = Array.isArray(d.fee_rules?.purchase) && d.fee_rules.purchase.length;
  const hasRedemption = Array.isArray(d.fee_rules?.redemption) && d.fee_rules.redemption.length;
  const hc = d.holding_constraints || {};
  if (!hasPurchase && !hasRedemption && !hc.min_holding_days && !hc.purchase_status && !hc.redemption_status) return '';
  const rc = r => { const v = parseFloat(r); return v>=1?'fri':v>=0.2?'frmid':v>0?'frlo':'frfree'; };
  const feeRows = (title, rows) => rows.map((r, i) =>
    `<tr><td>${i === 0 ? esc(title) : ''}</td><td>${esc(r.scope)}</td><td class="${rc(r.rate)}">${esc(r.rate)}</td></tr>`
  ).join('');
  const rows = [
    hasPurchase ? feeRows('申购', d.fee_rules.purchase) : '',
    hasRedemption ? feeRows('赎回', d.fee_rules.redemption) : '',
  ].join('');
  const minHold = hc.min_holding_days
    ? (hc.min_holding_days >= 365 ? `${Math.round(hc.min_holding_days / 365)} 年` : `${hc.min_holding_days} 天`)
    : '无明确锁定';
  const summary = [
    { k:'申购状态', v:hc.purchase_status || '--', cls:'neu' },
    { k:'赎回状态', v:hc.redemption_status || '--', cls:'neu' },
    { k:'最短持有', v:minHold, cls:hc.min_holding_days ? 'warn' : 'pos' },
  ].map(x => `
    <div class="mcell">
      <div class="mkey">${esc(x.k)}</div>
      <div class="mnum ${x.cls}">${esc(x.v)}</div>
    </div>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('交易成本与申赎限制')}
    <div class="mgrid mgrid-3 summary-grid">${summary}</div>
    ${rows ? `
      <div class="tscroll">
        <table class="mtbl">
          <thead><tr><th>类型</th><th>区间</th><th>费率</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>` : ''}
    ${hc.features ? `<div class="sub-label sub-label-muted">${esc(hc.features)}</div>` : ''}
  </div>`;
}

function bCostDrag(d) {
  const c = d.cost_analysis;
  if (!c) return '';
  const items = [
    { k:'持续费率拖累', v:fmt(c.ongoing_fee_pct)+'%', cls:c.ongoing_fee_pct <= 0.6 ? 'pos' : c.ongoing_fee_pct > 1 ? 'warn' : 'neu' },
    { k:'扣费后年化', v:pct(c.net_annualized_after_fee_pct,2,true), cls:cc(c.net_annualized_after_fee_pct) },
    { k:'管理费', v:fmt(c.manager_fee_pct)+'%', cls:'neu' },
    { k:'托管费', v:fmt(c.custody_fee_pct)+'%', cls:'neu' },
    { k:'销售服务费', v:fmt(c.sales_fee_pct)+'%', cls:c.sales_fee_pct > 0 ? 'warn' : 'pos' },
  ].map(x => `
    <div class="mcell">
      <div class="mkey">${esc(x.k)}</div>
      <div class="mnum ${x.cls}">${esc(x.v)}</div>

  return `
  <div class="card mb24 fade">

function bPeriods(d) {
  const rows = d.periods.map(p => `
    <tr>
      <td>${esc(PMAP[p.title] || p.title)}</td>
      <td>${cpct(p.return_rate)}</td>
      <td class="neu">${fmt(p.avg)}%</td>
      <td class="neu">${fmt(p.hs300_return)}%</td>
      <td>${chip(p.rank, p.total)}</td>
    </tr>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('阶段收益对比')}
    <div class="tscroll">
      <table class="dtbl">
        <thead><tr><th>时间段</th><th>本基金</th><th>同类均值</th><th>沪深300</th><th>同类排名</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${periodCommentary(d)}
  </div>`;
}

function periodCommentary(d) {
  const p1m = getPeriod(d, 'Last Month');
  const p3m = getPeriod(d, 'Last 3 Months');
  const p1y = getPeriod(d, 'Last Year');
  const p3y = getPeriod(d, 'Last 3 Years');
  const bullets = [];
  const rankText = p => p && p.total ? rankpct(p.rank, p.total) : null;
  if (p3m && p1y) {
    const shortLead = p3m.return_rate - p1y.return_rate / 4;
    if (shortLead > 2) {
      bullets.push(`近 3 月收益 <b class="${cc(p3m.return_rate)}">${pct(p3m.return_rate,2,true)}</b>，明显高于近 1 年折算节奏，短期行情贡献偏大。`);
    } else if (shortLead < -2) {
      bullets.push(`近 3 月收益 <b class="${cc(p3m.return_rate)}">${pct(p3m.return_rate,2,true)}</b>，弱于近 1 年折算节奏，近期动能放缓。`);
    } else {
      bullets.push(`近 3 月与近 1 年表现节奏接近，短期收益没有明显偏离长期状态。`);
    }
  }
  if (p1y && p3y) {
    const r1 = rankText(p1y), r3 = rankText(p3y);
    if (r1 != null && r3 != null) {
      if (r1 <= 25 && r3 <= 25) {
        bullets.push(`1 年和 3 年同类排名都在前 25%，中长期相对收益具备连续性。`);
      } else if (r1 <= 25 && r3 > 50) {
        bullets.push(`近 1 年排名明显好于 3 年排名，当前更像阶段性修复或风格顺风。`);
      } else if (r1 > 50 && r3 <= 25) {
        bullets.push(`3 年排名优于近 1 年，近期可能处在风格逆风或收益消化阶段。`);
      } else {
        bullets.push(`中长期排名未进入同类前 25%，需要用低回撤、低相关或费用等其他理由支撑配置。`);
      }
    }
  } else if (p1m && p3m) {
    bullets.push(`当前只有较短区间可比，近 1 月 ${pct(p1m.return_rate,2,true)}、近 3 月 ${pct(p3m.return_rate,2,true)}，长期判断仍需结合滚动收益。`);
  }
  return commentaryBox('阶段解读', bullets);
}

function bYearly(d) {
  if (!d.yearly_returns?.length) return '';
  const mx = Math.max(...d.yearly_returns.map(y => Math.abs(y.return_rate)), 1);
  const rows = d.yearly_returns.map(y => {
    const col = y.return_rate >= 0 ? 'var(--pos)' : 'var(--neg)';
    const w = Math.abs(y.return_rate) / mx * 82;
    const pp = rankpct(y.rank, y.total);
    const rc = pp <= 25 ? 'pos' : pp >= 75 ? 'neg' : 'neu';
    return `
    <div class="barrow">
      <div class="baryr">${esc(y.title.replace('年度',''))}</div>
      <div class="bartk"><div class="barfl" data-w="${w}%" style="background:${col}"></div></div>
      <div class="barvl ${y.return_rate>=0?'pos':'neg'}">${pct(y.return_rate,2,true)}</div>
      <div class="barrk"><span class="${rc}">${y.rank}/${y.total}</span></div>
    </div>`;
  }).join('');
  return `<div class="card mb24 fade">${sl('年度收益')}${rows}</div>`;
}

function bMonthlySeries(d) {
  if (!d.monthly_series?.length) return '';
  const series = [...d.monthly_series].sort((a, b) => b.month.localeCompare(a.month));
  const mx = Math.max(...series.map(m => Math.abs(m.return_rate)), 0.01);
  const rowHtml = m => {
    const v = m.return_rate;
    const pctW = Math.min(50, Math.abs(v) / mx * 50);
    const col = v >= 0 ? 'var(--pos)' : 'var(--neg)';
    const left = v >= 0 ? '50%' : `${50 - pctW}%`;
    return `
    <div class="mseries-row">
      <div class="lbl">${esc(m.month)}</div>
      <div class="bar-wrap">
        <div class="bar-zero"></div>
        <div class="bar-fill" data-w="${pctW}%" data-left="${left}" style="background:${col}"></div>
      </div>
      <div class="val ${v>=0?'pos':'neg'}">${pct(v,2,true)}</div>
    </div>`;
  };
  const visible = series.slice(0, 12).map(rowHtml).join('');
  const hidden = series.slice(12).map(rowHtml).join('');
  const asof = d.meta?.as_of?.monthly_series;
  const more = hidden ? `
    <details class="compact-details">
      <summary>展开更早 ${series.length - 12} 个月</summary>
      <div>${hidden}</div>
    </details>` : '';
  return `
  <div class="card mb24 fade">
    ${sl('真月度收益序列', `共 ${series.length} 月`, asof)}
    <div>${visible}</div>
    ${more}
  </div>`;
}

function bNavHistory(d) {
  const nav = d.nav_history;
  if (!Array.isArray(nav) || nav.length < 2) return '';
  const points = [...nav].sort((a, b) => a.date.localeCompare(b.date));
  const first = points[0], last = points[points.length - 1];
  const ret = first.acc_value > 0 ? (last.acc_value / first.acc_value - 1) * 100 : 0;
  const rows = [...points].reverse().slice(0, 12).map(p => `
    <tr>
      <td>${esc(p.date)}</td>
      <td>${fmt(p.net_value, 4)}</td>
      <td>${fmt(p.acc_value, 4)}</td>
      <td class="${cc(p.growth)}">${pct(p.growth,2,true)}</td>
    </tr>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('近 60 日净值', `${points.length} 个交易日`, d.meta?.as_of?.nav_history)}
    <div class="sub-label">最近样本累计收益 <span class="${cc(ret)}"><b>${pct(ret,2,true)}</b></span>，用于观察短期修复和水位。</div>
    <div class="tscroll">
      <table class="mtbl">
        <thead><tr><th>日期</th><th>单位净值</th><th>累计净值</th><th>日涨跌</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function bRisk(d) {
  const r = d.risk_metrics;
  const tot = r.positive_days + r.negative_days;
  const dwr = tot > 0 ? r.positive_days / tot * 100 : 0;
  const recoveryText = r.max_drawdown_recovery_days == null
    ? '仍在水下'
    : `${r.max_drawdown_recovery_days} 天`;
  const recoveryCls = r.max_drawdown_recovery_days == null ? 'neg' : 'neu';
  const items = [
    { k:'年化收益率', v: pct(r.annualized_return, 2, true), cls: cc(r.annualized_return), bar: Math.min(100, Math.abs(r.annualized_return)*8), bc:'var(--pos)' },
    { k:'超额收益',   v: pct(r.excess_return, 2, true),      cls: cc(r.excess_return), bar: Math.min(100, Math.abs(r.excess_return)*8), bc:'var(--acc)', hint:'累计 vs 业绩基准' },
    { k:'最大回撤',   v: '-'+fmt(r.max_drawdown)+'%',       cls:'neg', bar: Math.min(100, r.max_drawdown*28), bc:'var(--neg)' },
    { k:'当前回撤',   v: '-'+fmt(r.current_drawdown)+'%',   cls: r.current_drawdown<0.5?'neu':'neg', bar: Math.min(100, r.current_drawdown*28), bc:'var(--warn)', hint:'距历史最高净值' },
    { k:'回撤恢复',   v: recoveryText,                       cls: recoveryCls, bar: 0, bc:'var(--neu)', hint:'最大回撤后恢复天数' },
    { k:'回撤次数',   v: (r.drawdown_count_ge_1pct ?? 0)+' 次', cls:'neu', bar: Math.min(100, (r.drawdown_count_ge_1pct || 0)*12), bc:'var(--warn)', hint:'≥ 1% 回撤 episode' },
    { k:'平均回撤',   v: r.avg_drawdown_ge_1pct != null ? '-'+fmt(r.avg_drawdown_ge_1pct)+'%' : '--', cls:'neg', bar: Math.min(100, (r.avg_drawdown_ge_1pct || 0)*28), bc:'var(--neg)', hint:'≥ 1% 回撤均值' },
    { k:'年化波动率', v: fmt(r.volatility)+'%',              cls:'neu', bar: Math.min(100, r.volatility*14), bc:'var(--warn)' },
    { k:'夏普比率',   v: fmt(r.sharpe_ratio),                cls: r.sharpe_ratio>1?'pos':r.sharpe_ratio>0?'neu':'neg', bar: Math.min(100, Math.max(0,r.sharpe_ratio)/3*100), bc:'var(--acc)' },
    { k:'索提诺比率', v: fmt(r.sortino_ratio),               cls: r.sortino_ratio>1?'pos':r.sortino_ratio>0?'neu':'neg', bar: Math.min(100, Math.max(0,r.sortino_ratio)/3*100), bc:'var(--acc)', hint:'仅下行波动调整' },
    { k:'卡玛比率',   v: fmt(r.calmar_ratio),                cls: r.calmar_ratio>1?'pos':r.calmar_ratio>0?'neu':'neg', bar: Math.min(100, Math.max(0,r.calmar_ratio)/5*100), bc:'var(--acc)', hint:'年化收益 / 最大回撤' },
    { k:'正收益天数', v: r.positive_days+' 天',              cls:'pos', bar: tot?r.positive_days/tot*100:0, bc:'var(--pos)' },
    { k:'负收益天数', v: r.negative_days+' 天',              cls:'neg', bar: tot?r.negative_days/tot*100:0, bc:'var(--neg)' },
    { k:'日胜率',     v: dwr.toFixed(1)+'%',                 cls: dwr>=55?'pos':'neu', bar: dwr, bc:'var(--pos)' },
    { k:'月胜率',     v: fmt(r.monthly_win_rate, 1)+'%',     cls: r.monthly_win_rate>=60?'pos':'neu', bar: r.monthly_win_rate, bc:'var(--pos)' },
  ];
  const cells = items.map(it => `
    <div class="mcell">
      <div class="mkey">${esc(it.k)}</div>
      <div class="mnum ${it.cls}">${esc(it.v)}</div>
      <div class="mbar"><div class="mbarfl" data-w="${it.bar}%" style="background:${it.bc}"></div></div>
      ${it.hint ? `<div class="mhint" style="margin-top:6px">${esc(it.hint)}</div>` : ''}
    </div>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('风险指标', `近 ${r.data_points} 交易日`)}
    <div class="mgrid">${cells}</div>
    ${riskCommentary(d)}
  </div>`;
}

function riskCommentary(d) {
  const r = d.risk_metrics || {};
  const bullets = [];
  if (nval(r.sharpe_ratio) != null) {
    if (r.sharpe_ratio < 0) {
      bullets.push(`Sharpe 为 <b class="neg">${fmt(r.sharpe_ratio)}</b>，近期承担波动后没有获得正向超额补偿。`);
    } else if (r.sharpe_ratio >= 1) {
      bullets.push(`Sharpe 为 <b class="pos">${fmt(r.sharpe_ratio)}</b>，风险调整收益较好。`);
    } else {
      bullets.push(`Sharpe 为 ${fmt(r.sharpe_ratio)}，风险调整收益处于一般区间。`);
    }
  }
  if (nval(r.calmar_ratio) != null) {
    if (r.calmar_ratio < 0.5) {
      bullets.push(`Calmar 仅 <b class="warn">${fmt(r.calmar_ratio)}</b>，年化收益对最大回撤的覆盖偏薄。`);
    } else if (r.calmar_ratio >= 1) {
      bullets.push(`Calmar 达到 <b class="pos">${fmt(r.calmar_ratio)}</b>，回撤补偿相对充分。`);
    }
  }
  if (nval(r.current_drawdown) != null) {
    if (r.current_drawdown < 1) {
      bullets.push(`当前回撤 ${fmt(r.current_drawdown)}%，净值接近历史高点，买入后的短期安全垫主要来自后续市场而非估值回撤。`);
    } else if (r.current_drawdown > 5) {
      bullets.push(`当前仍处 ${fmt(r.current_drawdown)}% 回撤中，短期体验可能继续受修复节奏影响。`);
    }
  }
  if (r.max_drawdown_recovery_days == null) {
    bullets.push(`最大回撤尚未修复，历史回撤数据不能只看跌幅，还要看恢复时间。`);
  } else if (r.max_drawdown_recovery_days > 90) {
    bullets.push(`最大回撤修复耗时 <b>${r.max_drawdown_recovery_days} 天</b>，需要有跨季度持有的心理准备。`);
  }
  if ((r.drawdown_count_ge_1pct || 0) > 0 && r.avg_drawdown_ge_1pct != null) {
    bullets.push(`样本内出现 ${r.drawdown_count_ge_1pct} 次 ≥ 1% 回撤，平均深度 <b class="neg">-${fmt(r.avg_drawdown_ge_1pct)}%</b>${r.avg_drawdown_duration_days != null ? `，已修复回撤平均持续 ${fmt(r.avg_drawdown_duration_days,0)} 天` : ''}。`);
  }
  return commentaryBox('风险解读', bullets);
}

function bBenchmark(d) {
  const b = d.benchmark_metrics;
  if (!b || b.data_points === 0) return '';
  const items = [
    { k:'Alpha (年化)',   v: b.alpha    != null ? pct(b.alpha, 2, true)       : '--', cls: cc(b.alpha), hint:'Jensen alpha (rf=2%)' },
    { k:'Beta',           v: b.beta     != null ? fmt(b.beta)                  : '--', cls:'neu',        hint:'1.0 = 与基准同步' },
    { k:'信息比率 IR',    v: b.information_ratio != null ? fmt(b.information_ratio)  : '--', cls: cc(b.information_ratio), hint:'主动管理稳定性' },
    { k:'跟踪误差 (年化)',v: b.tracking_error    != null ? fmt(b.tracking_error)+'%' : '--', cls:'neu',    hint:'偏离基准的波动' },
    { k:'上行捕获',       v: b.upside_capture != null ? fmt(b.upside_capture)+'%' : '--', cls: b.upside_capture >= 100 ? 'pos' : 'neu', hint:'基准上涨日收益捕获' },
    { k:'下行捕获',       v: b.downside_capture != null ? fmt(b.downside_capture)+'%' : '--', cls: b.downside_capture <= 80 ? 'pos' : b.downside_capture > 100 ? 'neg' : 'neu', hint:'基准下跌日损失捕获' },
    { k:'同类 Alpha',     v: b.category_alpha != null ? pct(b.category_alpha,2,true) : '--', cls: cc(b.category_alpha), hint:'vs 同类均值，年化' },
    { k:'同类 TE',        v: b.category_tracking_error != null ? fmt(b.category_tracking_error)+'%' : '--', cls:'neu', hint:'相对同类波动' },
  ];
  const cells = items.map(it => `
    <div class="mcell">
      <div class="mkey">${esc(it.k)}</div>
      <div class="mnum ${it.cls}">${esc(it.v)}</div>
      <div class="mhint">${esc(it.hint)}</div>
    </div>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('相对基准表现', `${b.data_points} 日`)}
    <div class="mgrid">${cells}</div>
    ${benchmarkCommentary(d)}
  </div>`;
}

function benchmarkCommentary(d) {
  const b = d.benchmark_metrics || {};
  const bullets = [];
  if (nval(b.alpha) != null) {
    bullets.push(b.alpha > 0
      ? `Alpha 为 <b class="pos">${pct(b.alpha,2,true)}</b>，相对基准有正向主动收益。`
      : `Alpha 为 <b class="neg">${pct(b.alpha,2,true)}</b>，主动收益未覆盖基准。`);
  }
  if (nval(b.beta) != null) {
    const abs = Math.abs(b.beta);
    if (abs < 0.2) bullets.push(`Beta 约 ${fmt(b.beta)}，与基准同步性低，收益主要不是简单跟随基准波动。`);
    else if (abs > 1.2) bullets.push(`Beta 约 ${fmt(b.beta)}，对基准波动较敏感。`);
  }
  if (nval(b.information_ratio) != null && nval(b.tracking_error) != null) {
    if (b.information_ratio > 0.5) {
      bullets.push(`信息比率 ${fmt(b.information_ratio)}，在 ${fmt(b.tracking_error)}% 跟踪误差下主动收益稳定性较好。`);
    } else if (b.information_ratio < 0.1) {
      bullets.push(`信息比率 ${fmt(b.information_ratio)} 偏低，偏离基准并没有稳定转化为超额收益。`);
    }
  }
  if (nval(b.upside_capture) != null && nval(b.downside_capture) != null) {
    bullets.push(`上行捕获 ${fmt(b.upside_capture)}%、下行捕获 ${fmt(b.downside_capture)}%，${b.upside_capture > b.downside_capture ? '上涨参与度相对优于下跌承受度' : '下跌承受度不低，需留意回撤控制'}。`);
  }
  if (nval(b.category_alpha) != null) {
    bullets.push(b.category_alpha > 0
      ? `相对同类均值 Alpha 为 <b class="pos">${pct(b.category_alpha,2,true)}</b>，同类比较也有正超额。`
      : `相对同类均值 Alpha 为 <b class="neg">${pct(b.category_alpha,2,true)}</b>，同类里并不占优。`);
  }
  return commentaryBox('基准解读', bullets);
}

function bDistribution(d) {
  const dist = d.distribution;
  if (!dist || dist.data_points === 0) return '';
  const items = [
    { k:'VaR 95%',       v: dist.var_95  != null ? '-'+fmt(dist.var_95)+'%'  : '--', cls:'neg', hint:'5% 概率单日跌幅' },
    { k:'CVaR 95%',      v: dist.cvar_95 != null ? '-'+fmt(dist.cvar_95)+'%' : '--', cls:'neg', hint:'尾部 5% 平均跌幅' },
  ];
  const cells = items.map(it => `
    <div class="mcell">
      <div class="mkey">${esc(it.k)}</div>
      <div class="mnum ${it.cls}">${esc(it.v)}</div>
      <div class="mhint">${esc(it.hint)}</div>
    </div>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('日收益尾部风险', `${dist.data_points} 日`)}
    <div class="mgrid mgrid-4">${cells}</div>
    <details class="compact-details">
      <summary>展开分布形态</summary>
      <div class="mgrid mgrid-4">
        <div class="mcell"><div class="mkey">偏度 Skewness</div><div class="mnum ${dist.skewness != null && dist.skewness < 0 ? 'neg' : 'neu'}">${dist.skewness != null ? fmt(dist.skewness) : '--'}</div><div class="mhint">${dist.skewness != null && dist.skewness < 0 ? '左偏，偶有大跌' : '右偏 / 对称'}</div></div>
        <div class="mcell"><div class="mkey">超额峰度</div><div class="mnum ${dist.excess_kurtosis != null && dist.excess_kurtosis > 3 ? 'warn' : 'neu'}">${dist.excess_kurtosis != null ? fmt(dist.excess_kurtosis) : '--'}</div><div class="mhint">${dist.excess_kurtosis != null && dist.excess_kurtosis > 3 ? '厚尾分布' : '接近正态'}</div></div>
      </div>
    </details>
    ${distributionCommentary(d)}
  </div>`;
}

function distributionCommentary(d) {
  const dist = d.distribution || {};
  const bullets = [];
  const var95 = nval(dist.var_95);
  const cvar95 = nval(dist.cvar_95);
  if (var95 != null) {
    const label = var95 < 0.3 ? '几乎不见单日大跌'
      : var95 < 0.8 ? '温和波动'
      : var95 < 1.5 ? '明显波动'
      : var95 < 3 ? '显著单日下跌风险'
      : '极端波动';
    bullets.push(`VaR 95% 为 <b class="neg">-${fmt(var95)}%</b>，按阈值属于“${esc(label)}”。`);
  }
  if (cvar95 != null && var95 != null) {
    bullets.push(`CVaR 95% 为 <b class="neg">-${fmt(cvar95)}%</b>，意味着最差 5% 交易日的平均跌幅比 VaR 更深。`);
  }
  return commentaryBox('尾部风险解读', bullets);
}

function bRolling(d) {
  const r = d.rolling_returns;
  if (!r || (!r.y1 && !r.y3 && !r.y5)) return '';
  // Combined range covers both 1Y and 3Y; pad ±5% so labels don't clip.
  const stats = [r.y1, r.y3, r.y5].filter(x => x);
  if (!stats.length) return '';
  const lo = Math.min(...stats.map(s => s.min)) - 5;
  const hi = Math.max(...stats.map(s => s.max)) + 5;
  const span = hi - lo || 1;
  const toPct = v => ((v - lo) / span * 100);
  const row = (s, label) => {
    if (!s) return '';
    const lp = toPct(s.min), wp = toPct(s.max) - lp;
    const ip = toPct(s.p25), iw = toPct(s.p75) - ip;
    const mp = toPct(s.median);
    return `
    <div class="rolling-row">
      <div class="lbl">${esc(label)}</div>
      <div class="rolling-track" title="min ${fmt(s.min)}% · max ${fmt(s.max)}% · median ${fmt(s.median)}%">
        <div class="rolling-range" style="left:${lp.toFixed(2)}%;width:${wp.toFixed(2)}%"></div>
        <div class="rolling-iqr"   style="left:${ip.toFixed(2)}%;width:${iw.toFixed(2)}%"></div>
        <div class="rolling-mark"  style="left:${mp.toFixed(2)}%"></div>
      </div>
      <div class="val">${pct(s.median,1,true)}</div>
      <div class="val neu">${s.count} 窗口 · 亏损 ${fmt(s.loss_probability,1)}%</div>
    </div>`;
  };
  return `
  <div class="card mb24 fade">
    ${sl('滚动收益分布', '1Y / 3Y / 5Y')}
    <div class="sub-label">中位线 + IQR 阴影 + 最大最小范围</div>
    ${row(r.y1, '近 1 年')}
    ${row(r.y3, '近 3 年')}
    ${row(r.y5, '近 5 年')}
    <div class="axis-note">
      取值轴 ${fmt(lo,1)}% &nbsp;→&nbsp; ${fmt(hi,1)}%
    </div>
    ${rollingCommentary(r.y1, r.y3, r.y5)}
  </div>`;
}

function rollingCommentary(y1, y3, y5) {
  const bullets = [];
  const ref = y1 || y3;
  if (!ref) return '';
  const refLabel = y1 ? '近 1 年滚动' : '近 3 年滚动';

  const iqr = ref.p75 - ref.p25;
  const tag = iqr < 2 ? '极窄' : iqr < 5 ? '较窄' : iqr < 10 ? '中等' : '偏宽';
  bullets.push(
    `<li><b>${refLabel}中位收益 ${pct(ref.median,2,true)}</b>，IQR 区间 `
    + `${pct(ref.p25,2,true)} ~ ${pct(ref.p75,2,true)}（宽度 ${fmt(iqr,2)}pp，${tag}），`
    + `${tag === '极窄' || tag === '较窄' ? '体感平稳' : '体感波动较明显'}。</li>`
  );

  if (ref.min >= 0) {
    bullets.push(
      `<li><b>历史上任意时点持有 ${y1 ? 1 : 3} 年均未出现亏损</b>，`
      + `最差窗口仍录得 ${pct(ref.min,2,true)}。</li>`
    );
  } else {
    bullets.push(
      `<li>最差窗口收益 <b class="neg">${pct(ref.min,2,true)}</b>，`
      + `最佳 <b class="pos">${pct(ref.max,2,true)}</b>，极端区间跨度 `
      + `${fmt(ref.max - ref.min,1)}pp。</li>`
    );
  }

  if (y1 && y3) {
    const diff = y1.median - y3.median;
    if (Math.abs(diff) < 0.8) {
      bullets.push(
        `<li>1Y 与 3Y 中位差仅 ${fmt(Math.abs(diff),2)}pp，<b>近一年风格与长期一致</b>。</li>`
      );
    } else if (diff > 0) {
      bullets.push(
        `<li>1Y 中位较 3Y 高 <b class="pos">+${fmt(diff,2)}pp</b>，近期回报优于长期均值。</li>`
      );
    } else {
      bullets.push(
        `<li>1Y 中位较 3Y 低 <b class="neg">${fmt(diff,2)}pp</b>，近一年收益弱于长期均值，留意是否进入估值消化。</li>`
      );
    }
  }
  const lossParts = [
    y1 ? `1Y ${fmt(y1.loss_probability,1)}%` : null,
    y3 ? `3Y ${fmt(y3.loss_probability,1)}%` : null,
    y5 ? `5Y ${fmt(y5.loss_probability,1)}%` : null,
  ].filter(Boolean);
  if (lossParts.length) {
    bullets.push(`<li>滚动窗口亏损概率：${lossParts.join(' / ')}，这是比单点历史收益更接近持有体验的口径。</li>`);
  }

  return `
    <div class="commentary">
      <div class="commentary-title">解读</div>
      <ul class="commentary-list">${bullets.join('')}</ul>
    </div>`;
}

function bScores(d) {
  const rows = d.scores.items.map(it => {
    const cls = it.score >= 80 ? 'pos' : it.score >= 60 ? 'neu' : 'neg';
    return `
    <div class="srow">
      <div class="snm">${esc(it.name)}</div>
      <div class="sbar"><div class="sbfl" data-w="${it.score}%"></div></div>
      <div class="svl ${cls}">${it.score}</div>
      <div class="swt">${it.weight}%</div>
    </div>`;
  }).join('');
  return `
  <div class="card mb24 fade">
    ${sl('综合评分明细')}
    <div class="scorearea">
      <div class="radwrap"><svg class="radsvg" id="radsvg" viewBox="0 0 260 260" aria-hidden="true"></svg></div>
      <div>
        <div class="sub-label">维度得分 / 权重</div>
        <div class="slist">${rows}</div>
      </div>
    </div>
  </div>`;
}

function bManager(d) {
  const all = d.managers || [];
  const primary = all[0];
  if (!primary || !primary.info) return '';
  const mi = primary.info, me = primary.eval;
  const years = (parseFloat(mi.TOTALDAYS||'0') / 365).toFixed(1);
  const navB  = (parseFloat(mi.NETNAV||'0') / 1e8).toFixed(0);
  const earn1 = (parseFloat(mi.FMAXEARN1||'0') * 100).toFixed(2);
  const dd1m  = (parseFloat(mi.FMAXRETRA1||'0') * 100).toFixed(2);

  const stats = [
    { k:'从业年限',     v: years+' 年',     cls:'' },
    { k:'在管规模',     v: navB+' 亿',      cls:'' },
    { k:'在管基金',     v: (mi.FCOUNT||'--')+' 只', cls:'' },
    { k:'历史最佳年化', v: '+'+earn1+'%',   cls:'pos' },
    { k:'历史最大回撤', v: '-'+dd1m+'%',    cls:'neg' },
  ];
  if (me) {
    const s1 = parseFloat(me.SHARP_1||'0'), s3 = parseFloat(me.SHARP_3||'0');
    const mdd1 = (parseFloat(me.MAXRETRA_1||'0')*100).toFixed(2);
    const mdd3 = (parseFloat(me.MAXRETRA_3||'0')*100).toFixed(2);
    const w1 = parseFloat(me.WIN_1||'0'), w3 = parseFloat(me.WIN_3||'0');
    stats.push(
      { k:'近1年夏普', v: fmt(s1),         cls: s1>1?'pos':s1>0?'neu':'neg' },
      { k:'近3年夏普', v: fmt(s3),         cls: s3>1?'pos':s3>0?'neu':'neg' },
      { k:'近1年回撤', v: '-'+mdd1+'%',    cls:'neg' },
      { k:'近3年回撤', v: '-'+mdd3+'%',    cls:'neg' },
      { k:'近1年胜率', v: w1.toFixed(1)+'%', cls: w1>=55?'pos':'neu' },
      { k:'近3年胜率', v: w3.toFixed(1)+'%', cls: w3>=55?'pos':'neu' },
    );
  }
  const cols = Math.min(stats.length, 5);
  const cellHtml = stats.map(s => `
    <div class="mgrc">
      <div class="mgrk">${esc(s.k)}</div>
      <div class="mgrv ${s.cls}">${esc(s.v)}</div>
    </div>`).join('');

  const resume = mi.RESUME || '';
  const resumeHtml = resume ? `
    <div class="resume-wrap">
      <div class="resume" id="resume">${esc(resume)}</div>
      <button class="resume-btn" type="button" onclick="toggleResume()">展开全文 ▾</button>
    </div>` : '';

  // Title: primary manager + comma-joined co-managers when len > 1.
  // Card body shows primary's full profile only; co-managers' info objects are
  // available in d.managers[1..] for future tab UI.
  const coManagers = all.slice(1).map(m => m.manager_name).filter(Boolean).join('、');
  const title = '基金经理 · ' + (mi.MGRNAME || '')
    + (coManagers ? `（共管：${esc(coManagers)}）` : '');

  return `
  <div class="card mb24 fade">
    ${sl(title)}
    <div class="mgrg mgr-cols-${cols}">${cellHtml}</div>
    ${resumeHtml}
  </div>`;
}

function bManagerRoster(d) {
  const all = d.managers || [];
  if (all.length <= 1) return '';
  const rows = all.map((m, i) => {
    const info = m.info || {};
    const evals = m.eval || {};
    const years = info.TOTALDAYS ? (parseFloat(info.TOTALDAYS) / 365).toFixed(1) + ' 年' : '--';
    return `
      <tr>
        <td>${i + 1}</td>
        <td>${esc(m.manager_name || info.MGRNAME || '')}</td>
        <td>${esc(years)}</td>
        <td>${esc(info.FCOUNT || '--')}</td>
        <td class="${cc(evals.SHARP_1)}">${evals.SHARP_1 ? fmt(evals.SHARP_1) : '--'}</td>
        <td class="neg">${evals.MAXRETRA_1 ? '-'+fmt(parseFloat(evals.MAXRETRA_1)*100)+'%' : '--'}</td>
      </tr>`;
  }).join('');
  return `
  <div class="card mb24 fade">
    ${sl('共管经理简表', `${all.length} 人`)}
    <div class="tscroll">
      <table class="mtbl">
        <thead><tr><th>#</th><th>经理</th><th>从业</th><th>在管基金</th><th>近1年夏普</th><th>近1年回撤</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function bManagerStyle(d) {
  const rows = (d.managers || [])
    .filter(m => m.holding_char)
    .map(m => {
      const ch = m.holding_char;
      const vals = [
        { k:'股票仓位', v:ch.GPCW, avg:ch.GPCWAVG },
        { k:'前十大集中度', v:ch.SDJZD, avg:ch.SDJZDAVG },
        { k:'第一行业占比', v:ch.DYHYZB },
        { k:'行业集中度', v:ch.HYJZD },
        { k:'月度超额胜率', v:ch.YCESL_3M },
      ].map(x => `
        <div class="mcell">
          <div class="mkey">${esc(x.k)}</div>
          <div class="mnum">${esc(x.v || '--')}${x.v && String(x.v).indexOf('%') < 0 ? '%' : ''}</div>
          ${x.avg ? `<div class="mhint">同类均值 ${esc(x.avg)}</div>` : ''}
        </div>`).join('');
      return `
        <div class="manager-style-block">
          <div class="sub-label">${esc(m.manager_name || '基金经理')} · 持仓风格</div>
          <div class="mgrid">${vals}</div>
        </div>`;
    }).join('');
  if (!rows) return '';
  return `
  <div class="card mb24 fade">
    ${sl('经理持仓风格', '已接入但原页面未突出')}
    ${rows}
  </div>`;
}

function bManagerHistory(d) {
  const primary = (d.managers || [])[0];
  const list = primary ? primary.history : null;
  if (!Array.isArray(list) || !list.length) return '';
  // Sort by start date desc; show the first 5 directly and keep the full
  // history in an expandable block to preserve data without dominating flow.
  const sorted = [...list]
    .sort((a, b) => (b.FEMPDATE || '').localeCompare(a.FEMPDATE || ''));
  const fmtDate = s => s && s.length >= 10 ? s.slice(0, 10) : (s === '--' ? '至今' : esc(s));
  const row = (m, i) => {
    const days = parseInt(m.TOTALDAYS || '0', 10);
    const yrs = (days / 365).toFixed(1);
    const ret = parseFloat(m.PENAVGROWTH || '0');
    const retCls = ret >= 0 ? 'pos' : 'neg';
    const rank = m.TLRANK && m.TLSC ? chip(parseInt(m.TLRANK,10), parseInt(m.TLSC,10)) : '--';
    return `
    <tr>
      <td>${i+1}</td>
      <td>
        <div>${esc(m.SHORTNAME || '')}</div>
        <div class="ccode">${esc(m.FCODE || '')}</div>
      </td>
      <td>${fmtDate(m.FEMPDATE)} → ${fmtDate(m.LEMPDATE)}</td>
      <td>${yrs} 年</td>
      <td class="${retCls}">${pct(ret, 2, true)}</td>
      <td>${rank}</td>
    </tr>`;
  };
  const visibleRows = sorted.slice(0, 5).map(row).join('');
  const hiddenRows = sorted.slice(5).map((m, i) => row(m, i + 5)).join('');
  const more = hiddenRows ? `
    <details class="table-details">
      <summary>展开其余 ${sorted.length - 5} 条履历</summary>
      <div class="tscroll">
        <table class="mtbl">
          <tbody>${hiddenRows}</tbody>
        </table>
      </div>
    </details>` : '';
  return `
  <div class="card mb24 fade">
    ${sl('经理任职履历', `共 ${list.length} 只 · 默认 5 只`)}
    <div class="tscroll">
      <table class="mtbl">
        <thead><tr><th>#</th><th>基金</th><th>任期</th><th>时长</th><th>任内收益</th><th>同类排名</th></tr></thead>
        <tbody>${visibleRows}</tbody>
      </table>
    </div>
    ${more}
  </div>`;
}

function bTopBonds(d) {
  const tb = d.top_bonds;
  if (!tb || !tb.bonds?.length) return '';
  const top = tb.bonds.slice(0, 10);
  const stats = topBondStats(d, 10);
  const rows = top.map((b, i) => `
    <tr>
      <td>${i+1}</td>
      <td>
        <div>${esc(b.bond_name)}</div>
        <div class="ccode">${esc(b.bond_code)}</div>
      </td>
      <td class="pos">${fmt(b.ratio)}%</td>
      <td>${fmt(b.market_value_wan)} 万</td>
    </tr>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('重仓债券', tb.period || '', tb.end_date)}
    <div class="sub-label">前 ${top.length} 合计 <b>${fmt(stats.total)}%</b></div>
    <div class="tscroll">
      <table class="mtbl">
        <thead><tr><th>#</th><th>债券</th><th>占净值</th><th>市值</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${bondCommentary(d)}
  </div>`;
}

function bondCommentary(d) {
  const bonds = d.top_bonds?.bonds || [];
  const top = bonds.slice(0, 10);
  const bullets = [];
  if (!top.length) return '';
  const hasCb = top.some(b => /转债|可转/.test(b.bond_name || ''));
  const perpetual = top.filter(b => /永续|二级|资本补充/.test(b.bond_name || ''));
  const rates = top.filter(b => /国债|国开|农发|进出|地方债/.test(b.bond_name || ''));
  const total = top.reduce((acc, b) => acc + (nval(b.ratio, 0) || 0), 0);
  if (hasCb) bullets.push(`前十大债券含转债，债券仓位里带有权益弹性和转股波动。`);
  if (perpetual.length) bullets.push(`前十大包含 ${perpetual.length} 只银行永续/二级资本/资本补充债，信用利差暴露需要关注。`);
  if (rates.length) bullets.push(`前十大包含 ${rates.length} 只利率债/政策性金融债，组合对利率变化较敏感。`);
  bullets.push(`前 ${top.length} 大债券合计 ${fmt(total)}%，${total > 40 ? '债券持仓集中度较高' : '债券持仓集中度不算高'}。`);
  return commentaryBox('债券风格解读', bullets);
}

function bScaleChanges(d) {
  const sc = d.scale_changes;
  if (!Array.isArray(sc) || !sc.length) return '';
  // Newest first; cap at 8 rows.
  const top = sc.slice(0, 8);
  const rows = top.map(s => {
    const flowCls = s.change_pct >= 0 ? 'pos' : 'neg';
    return `
    <tr>
      <td></td>
      <td>${esc(s.date)}</td>
      <td>${fmt(s.purchase_yi)}</td>
      <td>${fmt(s.redemption_yi)}</td>
      <td>${fmt(s.end_shares_yi)}</td>
      <td>${fmt(s.end_nav_yi)}</td>
      <td class="${flowCls}">${pct(s.change_pct, 2, true)}</td>
    </tr>`;
  }).join('');
  return `
  <div class="card mb24 fade">
    ${sl('规模与申赎', `近 ${top.length} 期`, d.meta?.as_of?.scale_changes)}
    <div class="tscroll">
      <table class="mtbl">
        <thead><tr><th></th><th>报告期</th><th>申购(亿份)</th><th>赎回(亿份)</th><th>总份额(亿份)</th><th>净资产(亿元)</th><th>净资产变动</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${scaleCommentary(d)}
  </div>`;
}

function bFlowRisk(d) {
  const f = d.flow_risk;
  if (!f) return '';
  const cls = f.score >= 60 ? 'neg' : f.score >= 30 ? 'warn' : 'pos';
  const items = [
    { k:'资金风险', v:`${f.level || '--'} · ${f.score ?? 0}/100`, cls },
    { k:'单季净申赎', v:f.recent_quarter_net_subscribe_yi != null ? fmt(f.recent_quarter_net_subscribe_yi)+' 亿份' : '--', cls: cc(f.recent_quarter_net_subscribe_yi) },
    { k:'净申赎/份额', v:f.recent_quarter_net_subscribe_pct_of_shares != null ? pct(f.recent_quarter_net_subscribe_pct_of_shares,2,true) : '--', cls: cc(f.recent_quarter_net_subscribe_pct_of_shares) },
    { k:'机构占比', v:f.institutional_pct_latest != null ? fmt(f.institutional_pct_latest)+'%' : '--', cls: f.institutional_pct_latest >= 80 ? 'warn' : 'neu' },
    { k:'机构变化', v:f.institutional_pct_change_latest != null ? pct(f.institutional_pct_change_latest,2,true) : '--', cls: cc(f.institutional_pct_change_latest) },
    { k:'大波动季度', v:`${f.last_4q_large_swing_count || 0} / 4`, cls:f.last_4q_large_swing_count >= 2 ? 'warn' : 'neu' },
  ].map(x => `
    <div class="mcell">
      <div class="mkey">${esc(x.k)}</div>
      <div class="mnum ${x.cls}">${esc(x.v)}</div>
    </div>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('资金稳定性评分', '规模 + 持有人')}
    <div class="mgrid">${items}</div>
  </div>`;
}

function scaleCommentary(d) {
  const sc = d.scale_changes;
  if (!Array.isArray(sc) || !sc.length) return '';
  const latest = sc[0];
  const recent = sc.slice(0, 4).map(x => nval(x.change_pct, 0) || 0);
  const bullets = [];
  if (Math.abs(nval(latest.change_pct, 0)) > 20) {
    bullets.push(latest.change_pct > 0
      ? `最近一期净资产增长 <b class="pos">${pct(latest.change_pct,2,true)}</b>，资金快速流入可能带来建仓摊薄或调仓压力。`
      : `最近一期净资产下降 <b class="neg">${pct(latest.change_pct,2,true)}</b>，需关注赎回导致的被动减仓。`);
  }
  const swings = recent.filter(v => Math.abs(v) > 10).length;
  if (swings >= 2) {
    bullets.push(`近 4 期有 ${swings} 次超过 10% 的规模波动，份额稳定性一般。`);
  }
  if (nval(latest.purchase_yi, 0) > nval(latest.redemption_yi, 0) * 2 && latest.purchase_yi > 5) {
    bullets.push(`最近一期申购额显著高于赎回额，新增资金对组合再配置影响更大。`);
  }
  return commentaryBox('规模解读', bullets);
}

function bHolderStructure(d) {
  const hs = d.holder_structure;
  if (!Array.isArray(hs) || !hs.length) return '';
  // Newest first; cap at 6 rows.
  const top = hs.slice(0, 6);
  const rows = top.map(h => {
    const inst = Number(h.institutional_pct) || 0;
    const retail = Number(h.retail_pct) || 0;
    const internal = Number(h.internal_pct) || 0;
    return `
    <div class="holder-row">
      <div class="holder-meta">
        <div class="lbl">${esc(h.announce_date)}</div>
        <div class="holder-pcts" aria-label="持有人比例">
          <span class="holder-pct holder-pct-inst">机构 ${fmt(inst)}%</span>
          <span class="holder-pct holder-pct-retail">个人 ${fmt(retail)}%</span>
          <span class="holder-pct holder-pct-internal">内部 ${fmt(internal)}%</span>
        </div>
      </div>
      <div class="stack" title="机构 ${fmt(h.institutional_pct)}% · 个人 ${fmt(h.retail_pct)}% · 内部 ${fmt(h.internal_pct)}%">
        <div class="stack-inst"     style="width:${Math.max(0, inst)}%"></div>
        <div class="stack-retail"   style="width:${Math.max(0, retail)}%"></div>
        <div class="stack-internal" style="width:${Math.max(0, internal)}%"></div>
      </div>
      <div class="val">${fmt(h.total_shares_yi)} 亿份</div>
    </div>`;
  }).join('');
  return `
  <div class="card mb24 fade">
    ${sl('持有人结构', `近 ${top.length} 期`, d.meta?.as_of?.holder_structure)}
    <div class="legend holder-legend">
      <div class="litem"><div class="ldot" style="background:var(--acc)"></div>机构</div>
      <div class="litem"><div class="ldot" style="background:var(--acc2)"></div>个人</div>
      <div class="litem"><div class="ldot" style="background:var(--ink3)"></div>内部</div>
    </div>
    ${rows}
    ${holderCommentary(d)}
  </div>`;
}

function holderCommentary(d) {
  const hs = d.holder_structure;
  if (!Array.isArray(hs) || !hs.length) return '';
  const latest = hs[0];
  const inst = nval(latest.institutional_pct, 0) || 0;
  const retail = nval(latest.retail_pct, 0) || 0;
  const internal = nval(latest.internal_pct, 0) || 0;
  const bullets = [];
  if (inst > 80) {
    bullets.push(`机构占比 <b>${fmt(inst)}%</b>，接近机构主导盘，大额赎回对规模和组合管理的扰动更值得关注。`);
  } else if (inst > 70) {
    bullets.push(`机构占比 <b>${fmt(inst)}%</b>，资金结构偏机构，稳定性取决于机构资金续作意愿。`);
  } else if (retail > 70) {
    bullets.push(`个人占比 <b>${fmt(retail)}%</b>，资金更分散，但也更容易受市场情绪影响。`);
  }
  if (internal >= 0.5) {
    bullets.push(`内部持有 ${fmt(internal)}%，管理人/员工有一定跟投信号。`);
  }
  return commentaryBox('持有人解读', bullets);
}

function bDividends(d) {
  const divs = d.dividends;
  if (!Array.isArray(divs) || !divs.length) return '';
  const row = (v, i) => `
    <tr>
      <td>${i+1}</td>
      <td>${esc(v.year)}</td>
      <td>${esc(v.record_date)}</td>
      <td>${esc(v.ex_date)}</td>
      <td class="pos">${fmt(v.amount_per_share, 4)} 元</td>
      <td>${esc(v.pay_date)}</td>
    </tr>`;
  const visible = divs.slice(0, 8).map(row).join('');
  const hidden = divs.slice(8).map((v, i) => row(v, i + 8)).join('');
  const more = hidden ? `
    <details class="table-details">
      <summary>展开其余 ${divs.length - 8} 次分红</summary>
      <div class="tscroll">
        <table class="mtbl">
          <tbody>${hidden}</tbody>
        </table>
      </div>
    </details>` : '';
  return `
  <div class="card mb24 fade">
    ${sl('分红记录', `${divs.length} 次 · 默认 8 次`)}
    <div class="tscroll">
      <table class="mtbl">
        <thead><tr><th>#</th><th>年份</th><th>权益登记</th><th>除息日</th><th>每份分红</th><th>发放日</th></tr></thead>
        <tbody>${visible}</tbody>
      </table>
    </div>
    ${more}
  </div>`;
}

/* ─── P3 extension builders ─────────────────────────────────────
 * Render data that already lives in the analyze JSON but the original
 * P0-P2 page didn't surface: max-drawdown trough dates, asset allocation
 * trends, top stocks, rolling-return amounts, benchmark cumulative gap.
 */

function bMaxDrawdownEvent(d) {
  const r = d.risk_metrics;
  if (!r || !r.max_drawdown_start_date || !r.max_drawdown_end_date) return '';
  const recoveryText = r.max_drawdown_recovery_days == null
    ? '仍在水下'
    : `${r.max_drawdown_recovery_days} 天`;
  const recoveryCls = r.max_drawdown_recovery_days == null ? 'neg' : 'neu';
  const items = [
    { k:'起点日期', v: r.max_drawdown_start_date,        cls:'neu', hint:'前期净值高点' },
    { k:'谷底日期', v: r.max_drawdown_end_date,          cls:'neg', hint:'回撤最深时点' },
    { k:'回撤幅度', v: '-'+fmt(r.max_drawdown)+'%',      cls:'neg', hint:'峰谷距离' },
    { k:'恢复天数', v: recoveryText,                      cls: recoveryCls, hint:'回到前期高点用时' },
  ];
  const cells = items.map(it => `
    <div class="mcell">
      <div class="mkey">${esc(it.k)}</div>
      <div class="mnum ${it.cls}">${esc(it.v)}</div>
      <div class="mhint">${esc(it.hint)}</div>
    </div>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('最大回撤事件溯源', '近 '+r.data_points+' 交易日')}
    <div class="mgrid mgrid-4">${cells}</div>
  </div>`;
}

function bBenchAccCompare(d) {
  const acc = d.accumulated_return;
  if (!Array.isArray(acc) || acc.length < 2) return '';
  const last = acc[acc.length - 1];
  // Pick anchor points at 250 / 750 / 1250 trading days back; fall back to
  // the series start when the fund is younger than the window.
  const at = (offset) => acc.length > offset ? acc[acc.length - 1 - offset] : null;
  const rows = [
    { label: '成立以来', start: acc[0] },
    { label: '近 5 年',  start: at(1250) },
    { label: '近 3 年',  start: at(750) },
    { label: '近 1 年',  start: at(250) },
  ].filter(r => r.start && r.start.date !== last.date);

  const interpreted = [];
  const tr = rows.map(row => {
    const fund  = last.fund_return     - row.start.fund_return;
    const bench = last.bench_return    - row.start.bench_return;
    const cat   = last.category_return - row.start.category_return;
    const exB = fund - bench;
    const exC = fund - cat;
    interpreted.push({ label: row.label, fund, bench, cat, exB, exC });
    return `
    <tr>
      <td>${esc(row.label)}</td>
      <td class="ccode">${esc(row.start.date)} → ${esc(last.date)}</td>
      <td class="${cc(fund)}">${pct(fund,2,true)}</td>
      <td>${pct(bench,2,true)}</td>
      <td>${pct(cat,2,true)}</td>
      <td class="${cc(exB)}"><b>${pct(exB,2,true)} pp</b></td>
      <td class="${cc(exC)}">${pct(exC,2,true)} pp</td>
    </tr>`;
  }).join('');
  return `
  <div class="card mb24 fade">
    ${sl('真实基准累计对照', `${acc.length} 个交易日`)}
    <div class="sub-label">直接取累计收益序列首尾差，非估算值</div>
    <div class="tscroll">
      <table class="mtbl">
        <thead><tr>
          <th>区间</th><th>区间端点</th>
          <th>本基金</th><th>业绩基准</th><th>同类均值</th>
          <th>vs 基准</th><th>vs 同类</th>
        </tr></thead>
        <tbody>${tr}</tbody>
      </table>
    </div>
    ${benchAccCommentary(interpreted)}
  </div>`;
}

function benchAccCommentary(rows) {
  const bullets = [];
  const preferred = rows.find(r => r.label === '近 3 年') || rows.find(r => r.label === '近 1 年') || rows[0];
  if (preferred) {
    const exB = preferred.exB;
    const exC = preferred.exC;
    if (exB > 0 && exC > 0) {
      bullets.push(`${esc(preferred.label)}同时跑赢业绩基准和同类均值，超额分别为 <b class="pos">${pct(exB,2,true)}pp</b>、<b class="pos">${pct(exC,2,true)}pp</b>。`);
    } else if (exB > 0 && exC <= 0) {
      bullets.push(`${esc(preferred.label)}跑赢业绩基准 <b class="pos">${pct(exB,2,true)}pp</b>，但未跑赢同类均值，说明同类中还有更强替代品。`);
    } else if (exB <= 0 && exC > 0) {
      bullets.push(`${esc(preferred.label)}跑输业绩基准，但跑赢同类均值，可能是基准本身偏强或同类整体偏弱。`);
    } else {
      bullets.push(`${esc(preferred.label)}同时跑输业绩基准和同类均值，配置理由需要来自低波、低相关或特定风格暴露。`);
    }
  }
  return commentaryBox('累计对照解读', bullets);
}

function bRollingMoney(d) {
  const r = d.rolling_returns;
  if (!r || (!r.y1 && !r.y3 && !r.y5)) return '';
  // Amount comes from `?amount=NNN` query param; default 100k for an easy
  // mental anchor and to scale via simple multiplication for any holding size.
  const params = new URLSearchParams(location.search);
  const raw = parseFloat(params.get('amount') || '');
  const amount = isFinite(raw) && raw > 0 ? raw : 100000;
  const fmtCNY = v => {
    const sign = v >= 0 ? '+' : '−';
    const abs = Math.abs(v);
    return sign + abs.toLocaleString('zh-CN', { maximumFractionDigits: 0 }) + ' 元';
  };
  const row = (s, label) => {
    if (!s) return '';
    const worst = amount * s.min / 100;
    const med   = amount * s.median / 100;
    const best  = amount * s.max / 100;
    return `
    <tr>
      <td>${esc(label)}</td>
      <td class="${cc(s.min)}"><b>${fmtCNY(worst)}</b><div class="ccode">${pct(s.min,2,true)}</div></td>
      <td class="${cc(s.median)}"><b>${fmtCNY(med)}</b><div class="ccode">${pct(s.median,2,true)}</div></td>
      <td class="${cc(s.max)}"><b>${fmtCNY(best)}</b><div class="ccode">${pct(s.max,2,true)}</div></td>
      <td>${s.count} 样本</td>
    </tr>`;
  };
  const baseLabel = (amount === 100000) ? '10 万元基准' : amount.toLocaleString('zh-CN') + ' 元';
  const hintLine = (r.y3 && r.y3.min > 0)
    ? `任意 3 年滚动从未亏损，最差也赚 ${fmtCNY(amount * r.y3.min / 100)}`
    : (r.y1 && r.y1.min < -3)
      ? `极端情况下 1 年可亏 ${fmtCNY(amount * r.y1.min / 100)}（约 ${pct(Math.abs(r.y1.min),1)} 本金）`
      : '';
  return `
  <div class="card mb24 fade">
    ${sl('持有期收益区间（金额化预期）', baseLabel)}
    <div class="sub-label">基于滚动收益分布，按你的金额换算成实际盈亏</div>
    <div class="tscroll">
      <table class="mtbl">
        <thead><tr>
          <th>持有期</th>
          <th>最差情形</th><th>中位情形</th><th>最好情形</th>
          <th>样本</th>
        </tr></thead>
        <tbody>${row(r.y1, '1 年')}${row(r.y3, '3 年')}${row(r.y5, '5 年')}</tbody>
      </table>
    </div>
    ${hintLine ? `<div class="sub-label sub-label-callout">${hintLine}</div>` : ''}
    <div class="sub-label sub-label-muted">URL 加 <code>?amount=150000</code> 可自定义金额</div>
  </div>`;
}

function bAssetAllocation(d) {
  const aa = d.asset_allocation;
  if (!Array.isArray(aa) || !aa.length) return '';
  const top = aa.slice(0, 6);
  const rows = top.map(a => {
    const total = (a.stock_pct || 0) + (a.bond_pct || 0) + (a.cash_pct || 0);
    const lev = total - 100;
    const levCell = lev > 5
      ? `<td class="warn"><b>+${fmt(lev,2)}%</b><div class="ccode">质押回购加杠杆</div></td>`
      : lev < -5
        ? `<td class="neu">${fmt(lev,2)}%</td>`
        : `<td class="neu">${fmt(lev,2)}%</td>`;
    return `
    <tr>
      <td>${esc(a.date)}</td>
      <td class="pos">${fmt(a.stock_pct)}%</td>
      <td>${fmt(a.bond_pct)}%</td>
      <td class="neu">${fmt(a.cash_pct)}%</td>
      <td>${fmt(total,2)}%</td>
      ${levCell}
      <td>${fmt(a.total_assets_yi)} 亿</td>
    </tr>`;
  }).join('');

  // Style drift: spread of stock_pct across the full history. Cards above the
  // table summarize the latest snapshot + drift in plain language.
  const allStock = aa.map(x => x.stock_pct).filter(v => v != null);
  const drift = allStock.length > 1 ? Math.max(...allStock) - Math.min(...allStock) : 0;
  const driftLabel = drift <= 5  ? '风格稳定（仓位 ≤ 5pp）'
                   : drift <= 15 ? '温和择时（5–15pp）'
                                 : '风格漂移（> 15pp）';
  const driftCls = drift <= 5 ? 'pos' : drift <= 15 ? 'neu' : 'warn';
  const latest = aa[0];
  const summary = [
    { k:'最新股票占比', v: fmt(latest.stock_pct)+'%', cls:'pos' },
    { k:'最新债券占比', v: fmt(latest.bond_pct)+'%',  cls:'neu' },
    { k:'最新总资产',   v: fmt(latest.total_assets_yi)+' 亿', cls:'neu' },
    { k:'股票占比跨度', v: fmt(drift,1)+' pp',          cls: driftCls, hint: driftLabel },
  ];
  const sumCells = summary.map(it => `
    <div class="mcell">
      <div class="mkey">${esc(it.k)}</div>
      <div class="mnum ${it.cls}">${esc(it.v)}</div>
      ${it.hint ? `<div class="mhint">${esc(it.hint)}</div>` : ''}
    </div>`).join('');

  return `
  <div class="card mb24 fade">
    ${sl('资产配置 + 风格漂移', `近 ${top.length} 期`, d.meta?.as_of?.asset_allocation)}
    <div class="mgrid mgrid-4 summary-grid">${sumCells}</div>
    <div class="tscroll">
      <table class="mtbl">
        <thead><tr>
          <th>报告期</th><th>股票</th><th>债券</th><th>现金</th>
          <th>合计</th><th>杠杆率</th><th>总资产</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${assetCommentary(d)}
  </div>`;
}

function assetCommentary(d) {
  const aa = d.asset_allocation;
  if (!Array.isArray(aa) || !aa.length) return '';
  const latest = aa[0];
  const stock = nval(latest.stock_pct, 0) || 0;
  const bond = nval(latest.bond_pct, 0) || 0;
  const cash = nval(latest.cash_pct, 0) || 0;
  const total = stock + bond + cash;
  const lev = total - 100;
  const stockVals = aa.map(x => nval(x.stock_pct)).filter(v => v != null);
  const drift = stockVals.length > 1 ? Math.max(...stockVals) - Math.min(...stockVals) : 0;
  const bullets = [
    `最新资产配置显示 ${esc(stockExposureLabel(stock))}，股票 ${fmt(stock)}%、债券 ${fmt(bond)}%、现金 ${fmt(cash)}%。`,
  ];
  if (lev > 5) {
    bullets.push(`股票+债券+现金合计 <b class="warn">${fmt(total)}%</b>，超过 100% 的部分可视为债基通过质押式回购等方式加杠杆的信号。`);
  }
  if (drift > 15) {
    bullets.push(`历史股票仓位跨度 <b class="warn">${fmt(drift,1)}pp</b>，风格漂移或择时幅度较明显。`);
  } else if (drift <= 5 && stockVals.length > 1) {
    bullets.push(`历史股票仓位跨度 ${fmt(drift,1)}pp，仓位风格较稳定。`);
  }
  return commentaryBox('资产配置解读', bullets);
}

function bTopStocks(d) {
  const ts = d.top_stocks;
  if (!ts || !ts.stocks?.length) return '';
  const top = ts.stocks.slice(0, 10);
  const totalPct = top.reduce((acc, s) => acc + (s.ratio || 0), 0);
  const concCls = totalPct < 30 ? 'pos'
               : totalPct > 70 ? 'warn'
                               : 'neu';
  const concLabel = totalPct < 30 ? '高度分散'
                  : totalPct > 70 ? '高集中'
                  : totalPct > 50 ? '中等集中'
                                  : '中等分散';
  const rows = top.map((s, i) => `
    <tr>
      <td>${i+1}</td>
      <td>
        <div>${esc(s.stock_name)}</div>
        <div class="ccode">${esc(s.stock_code)}</div>
      </td>
      <td class="pos">${fmt(s.ratio)}%</td>
      <td>${fmt(s.market_value_wan)} 万</td>
    </tr>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('重仓股票', ts.period || '', ts.end_date)}
    <div class="sub-label">
      前 ${top.length} 合计 <span class="${concCls}"><b>${fmt(totalPct)}%</b></span> · ${concLabel}
    </div>
    <div class="tscroll">
      <table class="mtbl">
        <thead><tr><th>#</th><th>股票</th><th>占净值</th><th>市值</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${stockCommentary(d)}
  </div>`;
}

function inferStockBuckets(stocks) {
  const buckets = [
    { name:'科技/AI/半导体/通信', re:/通信|新易盛|中际|芯原|寒武纪|半导体|电子|科技|软件|信息|光模块|算力|AI/i },
    { name:'消费白马/家电/食品饮料', re:/茅台|五粮液|泸州|海尔|美的|格力|消费|食品|饮料|家电/ },
    { name:'银行/金融', re:/银行|保险|证券|招商|兴业|平安|中信|东方财富/ },
    { name:'资源/周期/能源', re:/煤|矿|油|石化|钢|铜|铝|紫金|中海油|杰瑞/ },
    { name:'医药/创新药', re:/药|医|生物|恒瑞|药明|百济|迈瑞/ },
    { name:'新能源/汽车', re:/宁德|比亚迪|阳光|电池|新能源|光伏|风电|北汽|汽车/ },
  ];
  return buckets
    .map(b => ({ name:b.name, count:stocks.filter(s => b.re.test(s.stock_name || '')).length }))
    .filter(b => b.count > 0)
    .sort((a, b) => b.count - a.count);
}

function stockCommentary(d) {
  const { top, total, max } = topStockStats(d, 10);
  if (!top.length) return '';
  const bullets = [];
  const buckets = inferStockBuckets(top);
  const concLabel = total < 30 ? '高度分散'
    : total > 70 || max > 8 ? '高集中'
    : total > 50 ? '中等集中'
    : '中等分散';
  bullets.push(`前 ${top.length} 大股票合计 <b>${fmt(total)}%</b>，单股最高 ${fmt(max)}%，按阈值属于“${esc(concLabel)}”。`);
  if (buckets.length) {
    bullets.push(`重仓股名称映射显示主要暴露在 ${buckets.slice(0, 3).map(b => `${esc(b.name)}（${b.count} 只）`).join('、')}。`);
  }
  return commentaryBox('股票风格解读', bullets);
}
