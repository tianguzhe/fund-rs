<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基金深度分析</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #080c14;
      --surf:    #0b1120;
      --card:    #0f1623;
      --cardhi:  #141d2e;
      --bdr:     #1c2a3e;
      --bdrdim:  rgba(28,42,62,0.5);
      --acc:     #6366f1;
      --acc2:    #8b5cf6;
      --pos:     #10b981;
      --neg:     #ef4444;
      --warn:    #f59e0b;
      --cyan:    #06b6d4;
      --ora:     #f97316;
      --slate:   #475569;
      --txt:     #e2e8f0;
      --txtd:    #94a3b8;
      --txtm:    #4e6280;
      --mono:    'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace;
      --body:    -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      --r:       12px;
      --rs:      8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 90% 55% at 60% -8%, rgba(99,102,241,0.07) 0%, transparent 70%),
        radial-gradient(circle at 1px 1px, rgba(99,102,241,0.055) 1px, transparent 0);
      background-size: 100%, 28px 28px;
      color: var(--txt);
      font-family: var(--body);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    /* Loading */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px; z-index: 200;
      transition: opacity 0.5s;
    }
    #loading.out { opacity: 0; pointer-events: none; }
    .spin {
      width: 40px; height: 40px;
      border: 2px solid var(--bdr);
      border-top-color: var(--acc);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ltxt { font-family: var(--mono); font-size: 11px; color: var(--txtm); letter-spacing: 0.1em; }

    /* Layout */
    .wrap { max-width: 1160px; margin: 0 auto; padding: 28px 18px 52px; }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      padding: 22px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      border-color: rgba(99,102,241,0.22);
      box-shadow: 0 0 0 1px rgba(99,102,241,0.05), 0 12px 40px rgba(0,0,0,0.32);
    }
    .mb16 { margin-bottom: 16px; }
    .mb20 { margin-bottom: 20px; }
    .mb24 { margin-bottom: 24px; }

    /* Section label */
    .slabel {
      font-family: var(--mono);
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--txtm);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .slabel::after { content: ''; flex: 1; height: 1px; background: var(--bdr); }
    .slabel .badge {
      background: rgba(99,102,241,0.12);
      color: var(--acc);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 9px;
      margin-left: -4px;
    }
    .slabel .asof {
      font-family: var(--mono); font-size: 9px;
      color: var(--txtm); letter-spacing: 0.06em;
      text-transform: none; margin-left: -4px;
    }
    .sub-label {
      font-family: var(--mono); font-size: 10px;
      color: var(--txtm); letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 12px;
    }

    /* HEADER */
    .hdr {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 32px; align-items: center;
      background: linear-gradient(135deg, var(--card) 0%, #0c1526 100%);
      border: 1px solid var(--bdr);
      border-radius: 16px;
      padding: 30px; margin-bottom: 24px;
      position: relative; overflow: hidden;
    }
    .hdr::before {
      content: '';
      position: absolute; top: -90px; right: -90px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(99,102,241,0.11) 0%, transparent 70%);
      pointer-events: none;
    }
    .hdr::after {
      content: ''; position: absolute;
      bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,0.18), transparent);
    }
    .hcode { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--acc); letter-spacing: 0.08em; margin-bottom: 6px; }
    .hname { font-family: var(--body); font-size: 26px; font-weight: 600; color: #f1f5f9; line-height: 1.2; margin-bottom: 6px; letter-spacing: -0.01em; }
    .hfull { font-size: 13px; color: var(--txtm); margin-bottom: 16px; }
    .tags  { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag   { font-family: var(--mono); font-size: 10px; font-weight: 500; padding: 3px 10px; border-radius: 100px; border: 1px solid; letter-spacing: 0.04em; }
    .ttype { color: var(--acc);  border-color: rgba(99,102,241,0.35); background: rgba(99,102,241,0.08); }
    .trisk { color: var(--pos);  border-color: rgba(16,185,129,0.35); background: rgba(16,185,129,0.08); }
    .tco   { color: var(--txtd); border-color: var(--bdr); }
    .twarn { color: var(--warn); border-color: rgba(245,158,11,0.35); background: rgba(245,158,11,0.08); }

    /* Gauge */
    .gaugewrap { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }
    .gaugesvg  { position: relative; width: 112px; height: 112px; }
    .gaugesvg svg { transform: rotate(-90deg); display: block; }
    .gtrack { fill: none; stroke: rgba(30,42,62,0.9); stroke-width: 9; }
    .gfill  { fill: none; stroke-width: 9; stroke-linecap: round; stroke-dasharray: 298; stroke-dashoffset: 298; transition: stroke-dashoffset 1.4s cubic-bezier(0.22,1,0.36,1); }
    .gcenter { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .gnum  { font-family: var(--mono); font-size: 28px; font-weight: 600; color: #f1f5f9; line-height: 1; }
    .gcap  { font-family: var(--mono); font-size: 9px; color: var(--txtm); letter-spacing: 0.06em; margin-top: 2px; }
    .glabel { font-family: var(--mono); font-size: 10px; color: var(--txtm); letter-spacing: 0.06em; }

    /* Banner (持有期约束) */
    .banner {
      display: flex; align-items: center; gap: 14px;
      background: linear-gradient(135deg, rgba(245,158,11,0.10), rgba(245,158,11,0.04));
      border: 1px solid rgba(245,158,11,0.32);
      border-radius: var(--r);
      padding: 14px 20px;
      margin-bottom: 24px;
    }
    .banner-icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(245,158,11,0.18);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--warn);
    }
    .banner-text { flex: 1; }
    .banner-title { font-size: 13px; font-weight: 500; color: #f1f5f9; margin-bottom: 2px; }
    .banner-sub { font-size: 11px; color: var(--txtm); font-family: var(--mono); }

    /* Info grid */
    .igrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--bdr); border-radius: var(--rs); overflow: hidden; }
    .icell { background: var(--card); padding: 14px 16px; transition: background 0.15s; }
    .icell:hover { background: var(--cardhi); }
    .ikey { font-family: var(--mono); font-size: 10px; color: var(--txtm); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
    .ival { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--txt); }
    .ival small { font-size: 11px; color: var(--txtm); font-weight: 300; }

    /* Fee */
    details.fee { border: 1px solid var(--bdr); border-radius: var(--r); overflow: hidden; }
    summary.feesumm { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: var(--card); cursor: pointer; list-style: none; user-select: none; }
    summary.feesumm::-webkit-details-marker { display: none; }
    summary.feesumm:hover { background: var(--cardhi); }
    .feeleft { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; color: var(--txtd); }
    .feeleft svg { color: var(--acc); }
    .feechev { transition: transform 0.2s; color: var(--txtm); }
    details.fee[open] .feechev { transform: rotate(180deg); }
    .feebody { background: var(--surf); padding: 4px 20px 16px; }
    .ftbl { width: 100%; border-collapse: collapse; }
    .ftbl th { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--txtm); text-align: left; padding: 10px 0 6px; border-bottom: 1px solid var(--bdr); }
    .ftbl td { padding: 10px 0; font-family: var(--mono); font-size: 13px; border-bottom: 1px solid var(--bdrdim); }
    .ftbl tr:last-child td { border-bottom: none; }
    .fri { color: var(--neg); } .frmid { color: var(--warn); } .frlo { color: var(--txtm); } .frfree { color: var(--pos); }

    /* Tables */
    .tscroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .dtbl { width: 100%; border-collapse: collapse; min-width: 500px; }
    .dtbl th { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--txtm); text-align: right; padding: 8px 12px; border-bottom: 1px solid var(--bdr); white-space: nowrap; }
    .dtbl th:first-child { text-align: left; }
    .dtbl td { font-family: var(--mono); font-size: 13px; text-align: right; padding: 9px 12px; border-bottom: 1px solid var(--bdrdim); transition: background 0.1s; }
    .dtbl td:first-child { text-align: left; color: var(--txtd); }
    .dtbl tr:last-child td { border-bottom: none; }
    .dtbl tr:hover td { background: rgba(99,102,241,0.03); }

    .pos { color: var(--pos); }
    .neg { color: var(--neg); }
    .neu { color: var(--txtd); }

    .chip { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 4px; background: rgba(99,102,241,0.1); color: var(--acc); border: 1px solid rgba(99,102,241,0.15); }
    .chip.good { background: rgba(16,185,129,0.08); color: var(--pos); border-color: rgba(16,185,129,0.2); }
    .chip.bad  { background: rgba(239,68,68,0.08);  color: var(--neg); border-color: rgba(239,68,68,0.2); }

    /* 2-col / 3-col grid */
    .col2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .col3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }

    /* Bar chart row */
    .barrow { display: grid; grid-template-columns: 78px 1fr 88px 82px; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--bdrdim); }
    .barrow:last-child { border-bottom: none; }
    .baryr  { font-family: var(--mono); font-size: 12px; color: var(--txtd); }
    .bartk  { height: 5px; background: var(--bdr); border-radius: 3px; overflow: hidden; }
    .barfl  { height: 100%; border-radius: 3px; transition: width 1s cubic-bezier(0.34,1.56,0.64,1); width: 0%; }
    .barvl  { font-family: var(--mono); font-size: 13px; font-weight: 500; text-align: right; }
    .barrk  { font-family: var(--mono); font-size: 11px; color: var(--txtm); text-align: right; }

    /* Monthly series mini bar */
    .mseries-row {
      display: grid; grid-template-columns: 60px 1fr 70px;
      align-items: center; gap: 12px;
      padding: 5px 0;
    }
    .mseries-row .lbl { font-family: var(--mono); font-size: 11px; color: var(--txtd); }
    .mseries-row .bar-wrap {
      position: relative; height: 16px;
      display: flex; align-items: center;
    }
    .mseries-row .bar-zero {
      position: absolute; left: 50%; top: 0; bottom: 0;
      width: 1px; background: var(--bdrdim);
    }
    .mseries-row .bar-fill {
      position: absolute; top: 4px; bottom: 4px;
      border-radius: 2px;
      transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
      width: 0;
    }
    .mseries-row .val { font-family: var(--mono); font-size: 11px; text-align: right; }

    /* Canvas chart */
    .chwrap { position: relative; }
    canvas.acc-chart { display: block; width: 100%; height: 250px; }
    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
    .litem  { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--txtm); }
    .ldot   { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .tip {
      position: absolute;
      background: rgba(8,12,20,0.96);
      border: 1px solid var(--bdr);
      border-radius: var(--rs);
      padding: 9px 13px;
      font-family: var(--mono); font-size: 11px;
      pointer-events: none;
      opacity: 0; transition: opacity 0.1s;
      z-index: 10; min-width: 170px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .tipdt { color: var(--txtm); font-size: 10px; margin-bottom: 7px; }
    .tiprow { display: flex; justify-content: space-between; gap: 14px; margin: 3px 0; }

    /* Metric grid (risk / benchmark / distribution) */
    .mgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--bdr); border-radius: var(--rs); overflow: hidden; }
    .mcell { background: var(--card); padding: 16px 14px; transition: background 0.15s; }
    .mcell:hover { background: var(--cardhi); }
    .mkey { font-size: 11px; color: var(--txtm); margin-bottom: 8px; line-height: 1.3; }
    .mnum { font-family: var(--mono); font-size: 21px; font-weight: 600; line-height: 1; margin-bottom: 9px; }
    .mhint { font-family: var(--mono); font-size: 10px; color: var(--txtm); line-height: 1.3; }
    .mbar { height: 3px; background: var(--bdr); border-radius: 2px; overflow: hidden; }
    .mbarfl { height: 100%; border-radius: 2px; transition: width 1.2s cubic-bezier(0.34,1.56,0.64,1); width: 0%; }

    /* Rolling chart (horizontal range bar) */
    .rolling-row {
      display: grid; grid-template-columns: 70px 1fr 80px 80px;
      align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--bdrdim);
    }
    .rolling-row:last-child { border-bottom: none; }
    .rolling-row .lbl { font-family: var(--mono); font-size: 12px; color: var(--txtd); }
    .rolling-track {
      position: relative; height: 22px;
      background: rgba(28,42,62,0.4); border-radius: 11px;
      overflow: hidden;
    }
    .rolling-range {
      position: absolute; top: 5px; bottom: 5px;
      background: linear-gradient(90deg, rgba(239,68,68,0.5), rgba(245,158,11,0.5), rgba(16,185,129,0.5));
      border-radius: 6px;
      transition: left 1s ease, width 1s ease;
    }
    .rolling-iqr {
      position: absolute; top: 0; bottom: 0;
      background: rgba(99,102,241,0.30);
      transition: left 1s ease, width 1s ease;
    }
    .rolling-mark {
      position: absolute; top: 0; bottom: 0;
      width: 2px; background: #f1f5f9;
      transition: left 1s ease;
    }
    .rolling-row .val { font-family: var(--mono); font-size: 11px; text-align: right; }

    /* Scores radar */
    .scorearea { display: grid; grid-template-columns: 260px 1fr; gap: 28px; align-items: center; }
    .radwrap { display: flex; justify-content: center; }
    .radsvg { width: 260px; height: 260px; display: block; }
    .slist { display: flex; flex-direction: column; gap: 11px; }
    .srow { display: grid; grid-template-columns: 36px 1fr 36px 30px; align-items: center; gap: 10px; }
    .snm  { font-size: 12px; color: var(--txtd); }
    .sbar { height: 4px; background: var(--bdr); border-radius: 2px; overflow: hidden; }
    .sbfl { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--acc), var(--acc2)); transition: width 1s ease; width: 0%; }
    .svl  { font-family: var(--mono); font-size: 12px; font-weight: 500; text-align: right; }
    .swt  { font-family: var(--mono); font-size: 10px; color: var(--txtm); text-align: right; }

    /* Manager */
    .mgrg { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--bdr); border-radius: var(--rs); overflow: hidden; margin-bottom: 16px; }
    .mgrc { background: var(--card); padding: 14px; transition: background 0.15s; }
    .mgrc:hover { background: var(--cardhi); }
    .mgrk { font-size: 11px; color: var(--txtm); margin-bottom: 4px; }
    .mgrv { font-family: var(--mono); font-size: 16px; font-weight: 500; }
    .resume-wrap { position: relative; }
    .resume {
      font-size: 12px; color: var(--txtm); line-height: 1.75;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    }
    .resume.open { display: block; -webkit-line-clamp: none; }
    .resume-btn {
      font-family: var(--mono); font-size: 11px;
      color: var(--acc); background: none; border: none;
      cursor: pointer; padding: 4px 0; margin-top: 6px;
      display: block;
    }

    /* Generic mini table (history / dividends / bonds / scale / holder) */
    .mtbl { width: 100%; border-collapse: collapse; }
    .mtbl th { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--txtm); text-align: right; padding: 8px 10px; border-bottom: 1px solid var(--bdr); white-space: nowrap; }
    .mtbl th:first-child { text-align: center; width: 32px; }
    .mtbl th:nth-child(2) { text-align: left; }
    .mtbl td { font-family: var(--mono); font-size: 12px; text-align: right; padding: 8px 10px; border-bottom: 1px solid var(--bdrdim); }
    .mtbl td:first-child { text-align: center; color: var(--txtm); }
    .mtbl td:nth-child(2) { text-align: left; color: var(--txtd); }
    .mtbl tr:last-child td { border-bottom: none; }
    .mtbl tr:hover td { background: rgba(99,102,241,0.03); }
    .ccode { font-size: 10px; color: var(--txtm); }

    /* Holder stacked bar */
    .holder-row {
      display: grid; grid-template-columns: 96px 1fr 70px;
      align-items: center; gap: 12px;
      padding: 8px 0; border-bottom: 1px solid var(--bdrdim);
    }
    .holder-row:last-child { border-bottom: none; }
    .holder-row .lbl { font-family: var(--mono); font-size: 11px; color: var(--txtd); }
    .holder-row .val { font-family: var(--mono); font-size: 11px; text-align: right; color: var(--txtm); }
    .stack {
      height: 14px; background: var(--bdr); border-radius: 3px;
      overflow: hidden; display: flex;
    }
    .stack-inst { background: var(--acc); }
    .stack-retail { background: var(--cyan); }
    .stack-internal { background: var(--ora); }

    /* Footer */
    footer {
      margin-top: 36px; padding-top: 20px;
      border-top: 1px solid var(--bdr);
      display: flex; justify-content: space-between; flex-wrap: wrap;
      gap: 8px; font-family: var(--mono); font-size: 10px;
      color: var(--txtm); letter-spacing: 0.04em;
    }
    .as-of-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .as-of-cell {
      background: var(--surf);
      border: 1px solid var(--bdrdim);
      border-radius: var(--rs);
      padding: 10px 12px;
    }
    .as-of-k {
      font-family: var(--mono); font-size: 9px;
      color: var(--txtm); letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .as-of-v { font-family: var(--mono); font-size: 12px; color: var(--txtd); }

    /* Fade-in animation */
    .fade { opacity: 0; transform: translateY(10px); }
    .fade.in { animation: fi 0.4s ease forwards; }
    @keyframes fi { to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) {
      .fade, .barfl, .mbarfl, .sbfl, .gfill,
      .rolling-range, .rolling-iqr, .rolling-mark, .mseries-row .bar-fill {
        animation: none !important; transition: none !important;
        opacity: 1; transform: none; width: revert;
      }
    }

    /* Responsive */
    @media (max-width: 900px) {
      .col2, .col3 { grid-template-columns: 1fr; }
      .scorearea   { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .hdr   { grid-template-columns: 1fr; }
      .gaugewrap { display: none; }
      .hname { font-size: 20px; }
      .mgrid, .mgrg, .igrid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div id="loading" role="status" aria-live="polite">
  <div class="spin"></div>
  <div class="ltxt">LOADING FUND DATA...</div>
</div>

<div class="wrap" id="app" style="opacity:0"></div>

<script>
/* ─── helpers ─── */

// HTML-escape every interpolated upstream string. The fund-core JSON includes
// raw user-visible strings (fund names, manager resume, fee rule text). Any of
// these could in principle carry an `<` and break the page or run script.
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

const PMAP = {
  'Last Week':'近1周','Last Month':'近1月','Last 3 Months':'近3月',
  'Last 6 Months':'近6月','Last Year':'近1年','Last 2 Years':'近2年',
  'Last 3 Years':'近3年','Last 5 Years':'近5年','Year to Date':'今年以来',
  'Since Inception':'成立来',
};

function fmt(v, d=2) { const n=parseFloat(v); return isNaN(n)?'--':n.toFixed(d); }
function pct(v, d=2, sign=false) {
  const n=parseFloat(v); if(isNaN(n)) return '--';
  return (sign&&n>0?'+':'')+n.toFixed(d)+'%';
}
function cc(v) { const n=parseFloat(v); if(isNaN(n)||n===0) return 'neu'; return n>0?'pos':'neg'; }
function cpct(v,d=2) { return `<span class="${cc(v)}">${pct(v,d,true)}</span>`; }
function rankpct(r,t) { return t?r/t*100:50; }
function chip(r,t) {
  if(!t) return '--';
  const p=rankpct(r,t);
  const cls = p<=25?'good':p>=75?'bad':'';
  return `<span class="chip ${cls}">${r}/${t}</span>`;
}

/* section label with optional badge / as-of date */
function sl(text, badge='', asof='') {
  let html = `<div class="slabel">${esc(text)}`;
  if (badge) html += `<span class="badge">${esc(badge)}</span>`;
  if (asof) html += `<span class="asof">截至 ${esc(asof)}</span>`;
  html += `</div>`;
  return html;
}

function bYearly(d) {
  if (!d.yearly_returns?.length) return '';
  const mx = Math.max(...d.yearly_returns.map(y => Math.abs(y.return_rate)), 1);
  const rows = d.yearly_returns.map(y => {
    const col = y.return_rate >= 0 ? 'var(--pos)' : 'var(--neg)';
    const w = Math.abs(y.return_rate) / mx * 82;
    const pp = rankpct(y.rank, y.total);
    const rc = pp <= 25 ? 'pos' : pp >= 75 ? 'neg' : 'neu';
    return `
    <div class="barrow">
      <div class="baryr">${esc(y.title.replace('年度',''))}</div>
      <div class="bartk"><div class="barfl" data-w="${w}%" style="background:${col}"></div></div>
      <div class="barvl ${y.return_rate>=0?'pos':'neg'}">${pct(y.return_rate,2,true)}</div>
      <div class="barrk"><span class="${rc}">${y.rank}/${y.total}</span></div>
    </div>`;
  }).join('');
  return `<div class="card mb24 fade">${sl('年度收益')}${rows}</div>`;
}

function bMonthlySeries(d) {
  if (!d.monthly_series?.length) return '';
  const series = d.monthly_series;
  const mx = Math.max(...series.map(m => Math.abs(m.return_rate)), 0.01);
  const rows = series.map(m => {
    const v = m.return_rate;
    const pctW = Math.min(50, Math.abs(v) / mx * 50);
    const col = v >= 0 ? 'var(--pos)' : 'var(--neg)';
    const left = v >= 0 ? '50%' : `${50 - pctW}%`;
    return `
    <div class="mseries-row">
      <div class="lbl">${esc(m.month)}</div>
      <div class="bar-wrap">
        <div class="bar-zero"></div>
        <div class="bar-fill" data-w="${pctW}%" data-left="${left}" style="background:${col}"></div>
      </div>
      <div class="val ${v>=0?'pos':'neg'}">${pct(v,2,true)}</div>
    </div>`;
  }).join('');
  const asof = d.meta?.as_of?.monthly_series;
  return `
  <div class="card mb24 fade">
    ${sl('真月度收益序列', `共 ${series.length} 月`, asof)}
    <div>${rows}</div>
  </div>`;
}

function bRisk(d) {
  const r = d.risk_metrics;
  const tot = r.positive_days + r.negative_days;
  const dwr = tot > 0 ? r.positive_days / tot * 100 : 0;
  const recoveryText = r.max_drawdown_recovery_days == null
    ? '仍在水下'
    : `${r.max_drawdown_recovery_days} 天`;
  const recoveryCls = r.max_drawdown_recovery_days == null ? 'neg' : 'neu';
  const items = [
    { k:'年化收益率', v: pct(r.annualized_return, 2, true), cls: cc(r.annualized_return), bar: Math.min(100, Math.abs(r.annualized_return)*8), bc:'var(--pos)' },
    { k:'最大回撤',   v: '-'+fmt(r.max_drawdown)+'%',       cls:'neg', bar: Math.min(100, r.max_drawdown*28), bc:'var(--neg)' },
    { k:'当前回撤',   v: '-'+fmt(r.current_drawdown)+'%',   cls: r.current_drawdown<0.5?'neu':'neg', bar: Math.min(100, r.current_drawdown*28), bc:'var(--warn)', hint:'距历史最高净值' },
    { k:'回撤恢复',   v: recoveryText,                       cls: recoveryCls, bar: 0, bc:'var(--neu)', hint:'最大回撤后恢复天数' },
    { k:'年化波动率', v: fmt(r.volatility)+'%',              cls:'neu', bar: Math.min(100, r.volatility*14), bc:'var(--warn)' },
    { k:'夏普比率',   v: fmt(r.sharpe_ratio),                cls: r.sharpe_ratio>1?'pos':r.sharpe_ratio>0?'neu':'neg', bar: Math.min(100, Math.max(0,r.sharpe_ratio)/3*100), bc:'var(--acc)' },
    { k:'索提诺比率', v: fmt(r.sortino_ratio),               cls: r.sortino_ratio>1?'pos':r.sortino_ratio>0?'neu':'neg', bar: Math.min(100, Math.max(0,r.sortino_ratio)/3*100), bc:'var(--acc)', hint:'仅下行波动调整' },
    { k:'卡玛比率',   v: fmt(r.calmar_ratio),                cls: r.calmar_ratio>1?'pos':r.calmar_ratio>0?'neu':'neg', bar: Math.min(100, Math.max(0,r.calmar_ratio)/5*100), bc:'var(--acc)', hint:'年化收益 / 最大回撤' },
    { k:'正收益天数', v: r.positive_days+' 天',              cls:'pos', bar: tot?r.positive_days/tot*100:0, bc:'var(--pos)' },
    { k:'负收益天数', v: r.negative_days+' 天',              cls:'neg', bar: tot?r.negative_days/tot*100:0, bc:'var(--neg)' },
    { k:'日胜率',     v: dwr.toFixed(1)+'%',                 cls: dwr>=55?'pos':'neu', bar: dwr, bc:'var(--pos)' },
    { k:'月胜率',     v: fmt(r.monthly_win_rate, 1)+'%',     cls: r.monthly_win_rate>=60?'pos':'neu', bar: r.monthly_win_rate, bc:'var(--pos)' },
  ];
  const cells = items.map(it => `
    <div class="mcell">
      <div class="mkey">${esc(it.k)}</div>
      <div class="mnum ${it.cls}">${esc(it.v)}</div>
      <div class="mbar"><div class="mbarfl" data-w="${it.bar}%" style="background:${it.bc}"></div></div>
      ${it.hint ? `<div class="mhint" style="margin-top:6px">${esc(it.hint)}</div>` : ''}
    </div>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('风险指标', `近 ${r.data_points} 交易日`)}
    <div class="mgrid">${cells}</div>
  </div>`;
}

function bBenchmark(d) {
  const b = d.benchmark_metrics;
  if (!b || b.data_points === 0) return '';
  const items = [
    { k:'Alpha (年化)',   v: b.alpha    != null ? pct(b.alpha, 2, true)       : '--', cls: cc(b.alpha), hint:'Jensen alpha (rf=2%)' },
    { k:'Beta',           v: b.beta     != null ? fmt(b.beta)                  : '--', cls:'neu',        hint:'1.0 = 与基准同步' },

    { k:'跟踪误差 (年化)',v: b.tracking_error    != null ? fmt(b.tracking_error)+'%' : '--', cls:'neu',    hint:'偏离基准的波动' },
  ];
  const cells = items.map(it => `

function bDistribution(d) {
  const dist = d.distribution;
  if (!dist || dist.data_points === 0) return '';
  const items = [
    { k:'VaR 95%',       v: dist.var_95  != null ? '-'+fmt(dist.var_95)+'%'  : '--', cls:'neg', hint:'5% 概率单日跌幅' },
    { k:'CVaR 95%',      v: dist.cvar_95 != null ? '-'+fmt(dist.cvar_95)+'%' : '--', cls:'neg', hint:'尾部 5% 平均跌幅' },
    { k:'偏度 Skewness', v: dist.skewness != null ? fmt(dist.skewness)        : '--', cls: dist.skewness != null && dist.skewness < 0 ? 'neg' : 'neu', hint: dist.skewness != null && dist.skewness < 0 ? '左偏，偶有大跌' : '右偏 / 对称' },
    { k:'超额峰度',      v: dist.excess_kurtosis != null ? fmt(dist.excess_kurtosis) : '--', cls: dist.excess_kurtosis != null && dist.excess_kurtosis > 3 ? 'warn' : 'neu', hint: dist.excess_kurtosis != null && dist.excess_kurtosis > 3 ? '厚尾分布' : '接近正态' },
  ];
  const cells = items.map(it => `
    <div class="mcell">
      <div class="mkey">${esc(it.k)}</div>
      <div class="mnum ${it.cls}">${esc(it.v)}</div>
      <div class="mhint">${esc(it.hint)}</div>
    </div>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('日收益分布', `${dist.data_points} 日`)}
    <div class="mgrid" style="grid-template-columns:repeat(4,1fr)">${cells}</div>
  </div>`;
}

function bRolling(d) {
  const r = d.rolling_returns;
  if (!r || (!r.y1 && !r.y3)) return '';
  // Combined range covers both 1Y and 3Y; pad ±5% so labels don't clip.
  const stats = [r.y1, r.y3].filter(x => x);
  if (!stats.length) return '';
  const lo = Math.min(...stats.map(s => s.min)) - 5;
  const hi = Math.max(...stats.map(s => s.max)) + 5;
  const span = hi - lo || 1;
  const toPct = v => ((v - lo) / span * 100);
  const row = (s, label) => {
    if (!s) return '';
    const lp = toPct(s.min), wp = toPct(s.max) - lp;
    const ip = toPct(s.p25), iw = toPct(s.p75) - ip;
    const mp = toPct(s.median);
    return `
    <div class="rolling-row">
      <div class="lbl">${esc(label)}</div>
      <div class="rolling-track" title="min ${fmt(s.min)}% · max ${fmt(s.max)}% · median ${fmt(s.median)}%">
        <div class="rolling-range" style="left:${lp.toFixed(2)}%;width:${wp.toFixed(2)}%"></div>
        <div class="rolling-iqr"   style="left:${ip.toFixed(2)}%;width:${iw.toFixed(2)}%"></div>
        <div class="rolling-mark"  style="left:${mp.toFixed(2)}%"></div>
      </div>
      <div class="val">${pct(s.median,1,true)}</div>
      <div class="val neu">${s.count} 窗口</div>
    </div>`;
  };
  return `
  <div class="card mb24 fade">
    ${sl('滚动收益分布', '1Y / 3Y')}
    <div class="sub-label">中位线 + IQR 阴影 + 最大最小范围</div>
    ${row(r.y1, '近 1 年')}
    ${row(r.y3, '近 3 年')}
    <div style="font-family:var(--mono);font-size:10px;color:var(--txtm);margin-top:10px">
      取值轴 ${fmt(lo,1)}% &nbsp;→&nbsp; ${fmt(hi,1)}%
    </div>
  </div>`;
}

function bScores(d) {
  const rows = d.scores.items.map(it => {
    const cls = it.score >= 80 ? 'pos' : it.score >= 60 ? 'neu' : 'neg';
    return `
    <div class="srow">

      <div class="sbar"><div class="sbfl" data-w="${it.score}%"></div></div>

  return `
  <div class="card mb24 fade">
    ${sl('综合评分明细')}

function bManager(d) {
  const mi = d.manager_info, me = d.manager_eval;
  if (!mi) return '';
  const years = (parseFloat(mi.TOTALDAYS||'0') / 365).toFixed(1);
  const navB  = (parseFloat(mi.NETNAV||'0') / 1e8).toFixed(0);
  const earn1 = (parseFloat(mi.FMAXEARN1||'0') * 100).toFixed(2);
  const dd1m  = (parseFloat(mi.FMAXRETRA1||'0') * 100).toFixed(2);

  const stats = [
    { k:'从业年限',     v: years+' 年',     cls:'' },
    { k:'在管规模',     v: navB+' 亿',      cls:'' },
    { k:'在管基金',     v: (mi.FCOUNT||'--')+' 只', cls:'' },
    { k:'历史最佳年化', v: '+'+earn1+'%',   cls:'pos' },
    { k:'历史最大回撤', v: '-'+dd1m+'%',    cls:'neg' },
  ];
  if (me) {
    const s1 = parseFloat(me.SHARP_1||'0'), s3 = parseFloat(me.SHARP_3||'0');
    const mdd1 = (parseFloat(me.MAXRETRA_1||'0')*100).toFixed(2);
    const mdd3 = (parseFloat(me.MAXRETRA_3||'0')*100).toFixed(2);
    const w1 = parseFloat(me.WIN_1||'0'), w3 = parseFloat(me.WIN_3||'0');
    stats.push(
      { k:'近1年夏普', v: fmt(s1),         cls: s1>1?'pos':s1>0?'neu':'neg' },
      { k:'近3年夏普', v: fmt(s3),         cls: s3>1?'pos':s3>0?'neu':'neg' },
      { k:'近1年回撤', v: '-'+mdd1+'%',    cls:'neg' },
      { k:'近3年回撤', v: '-'+mdd3+'%',    cls:'neg' },
      { k:'近1年胜率', v: w1.toFixed(1)+'%', cls: w1>=55?'pos':'neu' },
      { k:'近3年胜率', v: w3.toFixed(1)+'%', cls: w3>=55?'pos':'neu' },
    );
  }
  const cols = Math.min(stats.length, 5);
  const cellHtml = stats.map(s => `
    <div class="mgrc">
      <div class="mgrk">${esc(s.k)}</div>
      <div class="mgrv ${s.cls}">${esc(s.v)}</div>
    </div>`).join('');

  const resume = mi.RESUME || '';
  const resumeHtml = resume ? `
    <div class="resume-wrap" style="margin-top:4px">
      <div class="resume" id="resume">${esc(resume)}</div>
      <button class="resume-btn" type="button" onclick="toggleResume()">展开全文 ▾</button>
    </div>` : '';

  return `
  <div class="card mb24 fade">
    ${sl('基金经理 · ' + (mi.MGRNAME || ''))}
    <div class="mgrg" style="grid-template-columns:repeat(${cols},1fr)">${cellHtml}</div>
    ${resumeHtml}
  </div>`;
}

function bManagerHistory(d) {
  const list = d.manager_history;
  if (!Array.isArray(list) || !list.length) return '';
  // Sort by start date desc, keep top 8 to bound page length.
  const sorted = [...list]
    .sort((a, b) => (b.FEMPDATE || '').localeCompare(a.FEMPDATE || ''))
    .slice(0, 8);
  const fmtDate = s => s && s.length >= 10 ? s.slice(0, 10) : (s === '--' ? '至今' : esc(s));
  const rows = sorted.map((m, i) => {
    const days = parseInt(m.TOTALDAYS || '0', 10);
    const yrs = (days / 365).toFixed(1);
    const ret = parseFloat(m.PENAVGROWTH || '0');
    const retCls = ret >= 0 ? 'pos' : 'neg';
    const rank = m.TLRANK && m.TLSC ? chip(parseInt(m.TLRANK,10), parseInt(m.TLSC,10)) : '--';
    return `
    <tr>
      <td>${i+1}</td>
      <td>
        <div>${esc(m.SHORTNAME || '')}</div>
        <div class="ccode">${esc(m.FCODE || '')}</div>
      </td>
      <td>${fmtDate(m.FEMPDATE)} → ${fmtDate(m.LEMPDATE)}</td>
      <td>${yrs} 年</td>
      <td class="${retCls}">${pct(ret, 2, true)}</td>
      <td>${rank}</td>
    </tr>`;
  }).join('');
  return `
  <div class="card mb24 fade">
    ${sl('经理任职履历', `共 ${list.length} 只 · 显示前 ${sorted.length}`)}
    <div class="tscroll">
      <table class="mtbl">
        <thead><tr><th>#</th><th>基金</th><th>任期</th><th>时长</th><th>任内收益</th><th>同类排名</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

/* ─── animations / charts ─── */

function animGauge(score) {
  const fill = document.getElementById('gfill');
  const num  = document.getElementById('gnum');
  if (!fill || !num) return;
  const circ = 2 * Math.PI * 47;
  requestAnimationFrame(() => { fill.style.strokeDashoffset = circ * (1 - score / 100); });
  if (!score) { num.textContent = 0; return; }
  let cur = 0;
  const step = Math.max(1, Math.floor(score / 60));
  const ivl = setInterval(() => {
    cur = Math.min(cur + step, score);
    num.textContent = cur;
    if (cur >= score) clearInterval(ivl);
  }, 1000 / Math.max(score, 30));
}

function renderRadar(items) {
  const svg = document.getElementById('radsvg');
  if (!svg) return;
  const n = items.length, cx = 130, cy = 130, R = 88;
  const a0 = -Math.PI/2, step = 2*Math.PI/n;
  const pt = (i, r) => ({ x: cx+r*Math.cos(a0+i*step), y: cy+r*Math.sin(a0+i*step) });
  let h = '';
  [20,40,60,80,100].forEach(p => {
    const pp = items.map((_, i) => { const v = pt(i, R*p/100); return `${v.x.toFixed(1)},${v.y.toFixed(1)}`; }).join(' ');
    h += `<polygon points="${pp}" fill="none" stroke="rgba(28,42,62,0.9)" stroke-width="1"/>`;
  });
  items.forEach((_, i) => { const p = pt(i, R); h += `<line x1="${cx}" y1="${cy}" x2="${p.x.toFixed(1)}" y2="${p.y.toFixed(1)}" stroke="rgba(28,42,62,0.9)" stroke-width="1"/>`; });
  const ref = items.map((_, i) => { const p = pt(i, R*0.8); return `${p.x.toFixed(1)},${p.y.toFixed(1)}`; }).join(' ');
  h += `<polygon points="${ref}" fill="rgba(99,102,241,0.04)" stroke="rgba(99,102,241,0.22)" stroke-width="1" stroke-dasharray="3,3"/>`;
  const spts = items.map((it, i) => { const p = pt(i, R*it.score/100); return `${p.x.toFixed(1)},${p.y.toFixed(1)}`; }).join(' ');
  h += `<polygon id="rpoly" points="${spts}" fill="rgba(99,102,241,0.18)" stroke="#6366f1" stroke-width="2" opacity="0" style="transition:opacity 0.6s"/>`;
  items.forEach((it, i) => {
    const p = pt(i, R*it.score/100);
    h += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="#6366f1" stroke="rgba(8,12,20,0.9)" stroke-width="2"/>`;
    const lp = pt(i, R+19);
    const vc = it.score>=80 ? '#10b981' : it.score>=60 ? '#e2e8f0' : '#ef4444';
    h += `<text x="${lp.x.toFixed(1)}" y="${(lp.y-5).toFixed(1)}" text-anchor="middle" font-family="${'IBM Plex Mono,monospace'}" font-size="11" fill="#64748b">${esc(it.name)}</text>`;
    h += `<text x="${lp.x.toFixed(1)}" y="${(lp.y+10).toFixed(1)}" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="10" font-weight="500" fill="${vc}">${it.score}</text>`;
  });
  svg.innerHTML = h;
  setTimeout(() => { const p = document.getElementById('rpoly'); if (p) p.style.opacity = '1'; }, 400);
}

/* Downsample a time series to roughly `target` points using uniform stride.
   Cheap and good enough — values are smoothed cumulative returns, so stride
   sampling is visually indistinguishable from the original at this density. */
function downsample(points, target) {
  if (!points || points.length <= target) return points || [];
  const step = (points.length - 1) / (target - 1);
  const out = [];
  for (let i = 0; i < target; i++) {
    out.push(points[Math.min(points.length - 1, Math.round(i * step))]);
  }
  // Always include the last point.
  if (out[out.length - 1] !== points[points.length - 1]) {
    out[out.length - 1] = points[points.length - 1];
  }
  return out;
}

function renderAccChart(rawPoints) {
  const base = document.getElementById('accchart-base');
  const overlay = document.getElementById('accchart-overlay');
  if (!base || !overlay || !rawPoints?.length) return;

  // Downsample to ~150 points; original 548 ≈ daily, that's overkill for a chart.
  const points = downsample(rawPoints, 150);
  const series = [
    { key:'fund_return',     color:'#6366f1', w:2.5, label:'本基金',    glow:true },
    { key:'index_return',    color:'#f97316', w:1.5, label:'基准指数' },
    { key:'category_return', color:'#06b6d4', w:1.5, label:'同类均值' },
    { key:'bench_return',    color:'#475569', w:1.5, label:'债券指数' },
  ];

  // Cached geometry — computed once per resize.
  let geom = null;
  let prog = 0;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const W = base.clientWidth, H = base.clientHeight;
    if (!W || !H) return;
    [base, overlay].forEach(c => {
      if (c.width !== W * dpr || c.height !== H * dpr) {
        c.width = W * dpr; c.height = H * dpr;
      }
    });
    const pd = { t: 14, r: 14, b: 28, l: 44 };
    const cW = W - pd.l - pd.r, cH = H - pd.t - pd.b;
    let lo = Infinity, hi = -Infinity;
    series.forEach(s => points.forEach(p => { const v = p[s.key]; if (v < lo) lo = v; if (v > hi) hi = v; }));
    const pad2 = (hi - lo) * 0.1 || 0.5; lo -= pad2; hi += pad2;
    const ts = points.map(p => +new Date(p.date));
    const t0 = ts[0], t1 = ts[ts.length-1], tr = t1 - t0 || 1;
    geom = {
      dpr, W, H, pd, cW, cH, lo, hi, ts,
      xp: t => pd.l + (t - t0) / tr * cW,
      yp: v => pd.t + (1 - (v - lo) / (hi - lo)) * cH,
    };
  }

  function drawBase(p) {
    if (!geom) return;
    const { dpr, W, H, pd, cW, cH, lo, hi, ts, xp, yp } = geom;
    const ctx = base.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(28,42,62,0.8)'; ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const v = lo + (hi - lo) * (i / 4), y = yp(v);
      ctx.beginPath(); ctx.moveTo(pd.l, y); ctx.lineTo(W - pd.r, y); ctx.stroke();
      ctx.fillStyle = 'rgba(78,98,128,0.9)';
      ctx.font = `9px 'IBM Plex Mono', monospace`; ctx.textAlign = 'right';
      ctx.fillText(v.toFixed(1) + '%', pd.l - 5, y + 3);
    }
    const seen = new Set();
    points.forEach(pt => {
      const yr = pt.date.slice(0, 4);
      if (!seen.has(yr)) {
        seen.add(yr);
        ctx.fillStyle = 'rgba(78,98,128,0.9)';
        ctx.font = `9px 'IBM Plex Mono', monospace`; ctx.textAlign = 'center';
        ctx.fillText(yr, xp(+new Date(pt.date)), H - 7);
      }
    });

    const dp = Math.ceil(p * points.length);

    // Fill under fund line (only when fully drawn — partial fill flickers)
    if (p >= 1) {
      ctx.save();
      const gr = ctx.createLinearGradient(0, pd.t, 0, pd.t + cH);
      gr.addColorStop(0, 'rgba(99,102,241,0.14)');
      gr.addColorStop(1, 'rgba(99,102,241,0)');
      ctx.fillStyle = gr; ctx.beginPath();
      const by = yp(Math.max(lo, 0));
      ctx.moveTo(xp(ts[0]), by);
      points.forEach((pt, i) => ctx.lineTo(xp(ts[i]), yp(pt.fund_return)));
      ctx.lineTo(xp(ts[ts.length-1]), by); ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    series.forEach(s => {
      if (s.glow) { ctx.shadowBlur = 10; ctx.shadowColor = s.color; } else ctx.shadowBlur = 0;
      ctx.strokeStyle = s.color; ctx.lineWidth = s.w;
      ctx.lineJoin = 'round'; ctx.lineCap = 'round';
      ctx.beginPath();
      for (let i = 0; i < dp && i < points.length; i++) {
        const x = xp(ts[i]), y = yp(points[i][s.key]);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke(); ctx.shadowBlur = 0;
    });
  }

  function drawOverlay(mouseX) {
    if (!geom) return;
    const { dpr, W, H, pd, ts, xp, yp } = geom;
    const ctx = overlay.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    if (mouseX < 0) {
      const tip = document.getElementById('ctip');
      if (tip) tip.style.opacity = '0';
      return;
    }
    let ci = 0, md = Infinity;
    ts.forEach((t, i) => { const d = Math.abs(xp(t) - mouseX); if (d < md) { md = d; ci = i; } });
    if (md > 30) {
      const tip = document.getElementById('ctip');
      if (tip) tip.style.opacity = '0';
      return;
    }
    const hx = xp(ts[ci]);
    ctx.save();
    ctx.strokeStyle = 'rgba(99,102,241,0.35)'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(hx, pd.t); ctx.lineTo(hx, H - pd.b); ctx.stroke();
    ctx.setLineDash([]);
    series.forEach(s => {
      const cy2 = yp(points[ci][s.key]);
      ctx.beginPath(); ctx.arc(hx, cy2, 4, 0, Math.PI * 2);
      ctx.fillStyle = s.color; ctx.fill();
      ctx.strokeStyle = 'rgba(8,12,20,0.8)'; ctx.lineWidth = 1.5; ctx.stroke();
    });
    ctx.restore();

    const tip = document.getElementById('ctip');
    const tipdt = document.getElementById('tipdt');
    const tipbd = document.getElementById('tipbd');
    if (tip && tipdt && tipbd) {
      tipdt.textContent = points[ci].date;
      tipbd.innerHTML = series.map(s =>
        `<div class="tiprow"><span style="color:${s.color}">${esc(s.label)}</span><span style="color:#e2e8f0">${points[ci][s.key].toFixed(2)}%</span></div>`
      ).join('');
      let lx = hx + 14; if (lx + 175 > W) lx = hx - 183;
      tip.style.left = lx + 'px'; tip.style.top = pd.t + 'px'; tip.style.opacity = '1';
    }
  }

  // Animate fund line draw-in over 900ms.
  resize();
  const dur = 900, st = performance.now();
  (function tick(now) {
    const t = Math.min((now - st) / dur, 1);
    prog = t * t * (3 - 2 * t);
    drawBase(prog);
    if (t < 1) requestAnimationFrame(tick);
  })(performance.now());

  overlay.addEventListener('mousemove', e => {
    const x = e.clientX - overlay.getBoundingClientRect().left;
    if (prog >= 1) drawOverlay(x);
  });
  overlay.addEventListener('mouseleave', () => { if (prog >= 1) drawOverlay(-1); });
  new ResizeObserver(() => {
    resize();
    if (prog >= 1) { drawBase(1); drawOverlay(-1); }
  }).observe(base.parentElement);
}

function animBars() {
  document.querySelectorAll('[data-w]').forEach(el => {
    requestAnimationFrame(() => {
      el.style.width = el.dataset.w;
      if (el.dataset.left) el.style.left = el.dataset.left;
    });
  });
}

function stagger() {
  document.querySelectorAll('.fade').forEach((el, i) => {
    setTimeout(() => el.classList.add('in'), i * 35);
  });
}

window.toggleResume = function () {
  const r = document.getElementById('resume');
  if (!r) return;
  const b = r.nextElementSibling;
  if (r.classList.toggle('open')) {
    if (b) b.textContent = '收起 ▴';
  } else {
    if (b) b.textContent = '展开全文 ▾';
  }
};

/* ─── init ─── */

async function init() {
  try {
    // Resolve data file from `?code=<6-digit>` query, falling back to the
    // legacy fixed path so old bookmarks keep working. Whitelist 6-digit
    // codes to avoid path traversal via crafted URLs.
    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    const dataUrl = /^\d{6}$/.test(code || '')
      ? `./data/fund-${code}.json`
      : './data/fund-analysis.json';

    const data = await fetch(dataUrl).then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status + ' on ' + dataUrl);
      return r.json();
    });

    const app = document.getElementById('app');
    app.innerHTML = [
      bHeader(data),
      bHoldingBanner(data),
      bInfo(data),
      bFee(data),
      bPeriods(data),
      bYearly(data),
      bMonthlySeries(data),
      bAccChart(),
      bRisk(data),
      bBenchmark(data),
      bDistribution(data),
      bRolling(data),
      bScores(data),
      bManager(data),
      bManagerHistory(data),
      bTopBonds(data),
      bScaleChanges(data),
      bHolderStructure(data),
      bDividends(data),
      bFooter(data),
    ].join('');

    app.style.transition = 'opacity 0.4s';
    app.style.opacity = '1';
    document.getElementById('loading').classList.add('out');
    stagger();
    setTimeout(() => {
      animGauge(data.scores.overall);
      renderRadar(data.scores.items);
      renderAccChart(data.accumulated_return);
      animBars();
    }, 100);
  } catch (err) {
    document.getElementById('loading').innerHTML = `
      <div style="font-family:var(--mono);color:var(--neg);text-align:center;padding:32px">
        <div style="font-size:14px;margin-bottom:10px">数据加载失败</div>
        <div style="font-size:12px;color:var(--txtm);margin-bottom:8px">${esc(err.message)}</div>
        <div style="font-size:11px;color:var(--txtm)">请通过本地 HTTP 服务访问<br>python3 -m http.server 9876</div>
      </div>`;
  }
}
init();
</script>
