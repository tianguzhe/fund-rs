<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基金深度分析</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./fund-analysis.css">
</head>
<body>

<div id="loading" role="status" aria-live="polite">
  <div class="spin"></div>
  <div class="ltxt">LOADING FUND DATA...</div>
</div>

<div class="layout">
    <div class="wrap app-shell" id="app"></div>
  <aside class="toc" id="toc" aria-label="目录"></aside>
</div>

<script>
/* ─── helpers ─── */

// HTML-escape every interpolated upstream string. The fund-core JSON includes
// raw user-visible strings (fund names, manager resume, fee rule text). Any of
// these could in principle carry an `<` and break the page or run script.
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

const PMAP = {
  'Last Week':'近1周','Last Month':'近1月','Last 3 Months':'近3月',
  'Last 6 Months':'近6月','Last Year':'近1年','Last 2 Years':'近2年',
  'Last 3 Years':'近3年','Last 5 Years':'近5年','Year to Date':'今年以来',
  'Since Inception':'成立来',
};

function fmt(v, d=2) { const n=parseFloat(v); return isNaN(n)?'--':n.toFixed(d); }
function pct(v, d=2, sign=false) {
  const n=parseFloat(v); if(isNaN(n)) return '--';
  return (sign&&n>0?'+':'')+n.toFixed(d)+'%';
}
function cc(v) { const n=parseFloat(v); if(isNaN(n)||n===0) return 'neu'; return n>0?'pos':'neg'; }
function cpct(v,d=2) { return `<span class="${cc(v)}">${pct(v,d,true)}</span>`; }
function rankpct(r,t) { return t?r/t*100:50; }
function chip(r,t) {
  if(!t) return '--';
  const p=rankpct(r,t);
  const cls = p<=25?'good':p>=75?'bad':'';
  return `<span class="chip ${cls}">${r}/${t}</span>`;
}

/* section label with optional badge / as-of date */
function sl(text, badge='', asof='') {
  let html = `<div class="slabel">${esc(text)}`;
  if (badge) html += `<span class="badge">${esc(badge)}</span>`;
  if (asof) html += `<span class="asof">截至 ${esc(asof)}</span>`;
  html += `</div>`;
  return html;
}

/* ─── builders ─── */

function bHeader(d) {
  const s = d.scores.overall;
  const sc = s>=80?'#2f6a48':s>=65?'#a4761d':'#973340';
  const circ = 2 * Math.PI * 47;
  const det = d.detail;
  const scale = (parseFloat(det.ENDNAV)/1e8).toFixed(2);
  // Split the fund name into per-character spans so each letter can be
  // animated in turn — gives the masthead an editorial reveal cadence.
  const splitName = [...(det.SHORTNAME || '')].map((ch, i) =>
    ch === ' '
      ? '<span class="letter">&nbsp;</span>'
      : `<span class="letter" style="animation-delay:${(0.18 + i * 0.045).toFixed(3)}s">${esc(ch)}</span>`
  ).join('');
  return `
  <header class="hdr fade">
    <div>
      <div class="hcode">基金代码 ${esc(det.FCODE)}</div>
      <div class="hname">${splitName}</div>
      <div class="hfull">${esc(det.FULLNAME)}</div>
      <div class="tags">
        <span class="tag ttype">${esc(det.FTYPE)}</span>
        <span class="tag trisk">风险 R${esc(det.RISKLEVEL)}</span>
        <span class="tag tco">${esc(det.JJGS)}</span>
        <span class="tag tco">规模 ${scale} 亿</span>
      </div>
    </div>
    <div class="gaugewrap" aria-label="综合评分 ${s} 分">
      <div class="gaugesvg">
        <svg width="112" height="112" viewBox="0 0 112 112" aria-hidden="true">
          <circle class="gtrack" cx="56" cy="56" r="47"></circle>
          <circle class="gfill" id="gfill" cx="56" cy="56" r="47"
            stroke="${sc}" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${circ.toFixed(2)}"></circle>
        </svg>
        <div class="gcenter">
          <div class="gnum" id="gnum">0</div>
          <div class="gcap">综合评分</div>
        </div>
      </div>
      <div class="glabel">满分 100</div>
    </div>
  </header>`;
}

function bHoldingBanner(d) {
  const hc = d.holding_constraints;
  if (!hc || hc.min_holding_days == null) return '';
  const days = hc.min_holding_days;
  const phrase = days >= 365 ? `${(days/365).toFixed(0)} 年` : `${days} 天`;
  return `
  <div class="banner fade" role="alert">
    <div class="banner-icon" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
      </svg>
    </div>
    <div class="banner-text">
      <div class="banner-title">最短持有期 ${esc(phrase)}</div>
      <div class="banner-sub">${esc(hc.features || '')}</div>
    </div>
  </div>`;
}

/* Hero key stats — three oversized display numerals: annualized return,
 * max drawdown, sharpe. These are the three numbers a serious investor
 * looks at first; surface them with editorial scale right under the masthead. */
function bHeroStats(d) {
  const r = d.risk_metrics;
  if (!r) return '';
  const ar    = r.annualized_return;
  const mdd   = r.max_drawdown;
  const sharpe= r.sharpe_ratio;
  const arCls    = ar >= 8 ? 'pos' : ar >= 3 ? '' : 'warn';
  const mddCls   = mdd >= 15 ? 'neg' : mdd >= 8 ? 'warn' : '';
  const sharpeCls= sharpe >= 1 ? 'pos' : sharpe >= 0 ? '' : 'neg';
  const arSub    = ar >= 10 ? '同类顶级' : ar >= 6 ? '中上水平' : ar >= 3 ? '一般' : '偏弱';
  const mddSub   = mdd <= 3 ? '波动极小' : mdd <= 8 ? '温和回撤' : mdd <= 20 ? '中等波动' : '剧烈波动';
  const sharpeSub= sharpe >= 1.5 ? '风险收益顶级' : sharpe >= 1 ? '风险收益优秀' : sharpe >= 0.5 ? '风险收益尚可' : '风险收益偏弱';
  return `
  <div class="hero-stats fade">
    <div class="hero-stat">
      <div class="k">Annualized Return · 年化</div>
      <div class="v ${arCls}" data-count="${ar.toFixed(2)}" data-suffix="%" data-decimals="2" data-signed="1">${ar >= 0 ? '+' : ''}${ar.toFixed(2)}<span class="u">%</span></div>
      <div class="sub">${arSub} · 近 ${r.data_points} 交易日</div>
      <span class="underline"></span>
    </div>
    <div class="hero-stat">
      <div class="k">Max Drawdown · 最大回撤</div>
      <div class="v ${mddCls}" data-count="${(-mdd).toFixed(2)}" data-suffix="%" data-decimals="2">−${mdd.toFixed(2)}<span class="u">%</span></div>
      <div class="sub">${mddSub}${r.max_drawdown_recovery_days != null ? ` · ${r.max_drawdown_recovery_days} 天修复` : ' · 仍在水下'}</div>
      <span class="underline"></span>
    </div>
    <div class="hero-stat">
      <div class="k">Sharpe Ratio · 夏普</div>
      <div class="v ${sharpeCls}" data-count="${sharpe.toFixed(2)}" data-decimals="2">${sharpe.toFixed(2)}</div>
      <div class="sub">${sharpeSub} · 卡玛 ${r.calmar_ratio.toFixed(2)}</div>
      <span class="underline"></span>
    </div>
  </div>`;
}

function bInfo(d) {
  const det = d.detail;
  const mgr = parseFloat(det.MGREXP||'0'), tru = parseFloat(det.TRUSTEXP||'0'), sal = parseFloat(det.SALESEXP||'0');
  const tot = (mgr+tru+sal).toFixed(2);
  const scale = (parseFloat(det.ENDNAV)/1e8).toFixed(2);
  return `
  <div class="card mb24 fade">
    ${sl('基本信息')}
    <div class="igrid">
      <div class="icell"><div class="ikey">成立日期</div><div class="ival">${esc(det.ESTABDATE)}</div></div>
      <div class="icell"><div class="ikey">基金规模</div><div class="ival">${scale} 亿元</div></div>
      <div class="icell"><div class="ikey">托管银行</div><div class="ival">${esc(det.TGYH)}</div></div>
      <div class="icell"><div class="ikey">基金公司</div><div class="ival">${esc(det.JJGS)}</div></div>
      <div class="icell"><div class="ikey">基金经理</div><div class="ival">${esc(det.JJJL)}</div></div>
      <div class="icell"><div class="ikey">综合费率</div><div class="ival">${tot}% <small>管${esc(det.MGREXP)} 托${esc(det.TRUSTEXP)} 销${esc(det.SALESEXP)}</small></div></div>
    </div>
  </div>`;
}

function bFee(d) {
  if (!d.fee_rules?.redemption?.length) return '';
  const rc = r => { const v = parseFloat(r); return v>=1?'fri':v>=0.2?'frmid':v>0?'frlo':'frfree'; };
  const rows = d.fee_rules.redemption.map(r =>
    `<tr><td>${esc(r.scope)}</td><td class="${rc(r.rate)}">${esc(r.rate)}</td></tr>`
  ).join('');
  return `
  <div class="mb24 fade">
    <details class="fee">
      <summary class="feesumm">
        <div class="feeleft">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
          赎回费率规则
        </div>
        <svg class="feechev" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 9l-7 7-7-7"/></svg>
      </summary>
      <div class="feebody">
        <table class="ftbl">
          <thead><tr><th>持有期限</th><th>赎回费率</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </details>
  </div>`;
}

function bPeriods(d) {
  const rows = d.periods.map(p => `
    <tr>
      <td>${esc(PMAP[p.title] || p.title)}</td>
      <td>${cpct(p.return_rate)}</td>
      <td class="neu">${fmt(p.avg)}%</td>
      <td class="neu">${fmt(p.hs300_return)}%</td>
      <td>${chip(p.rank, p.total)}</td>
    </tr>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('阶段收益对比')}
    <div class="tscroll">
      <table class="dtbl">
        <thead><tr><th>时间段</th><th>本基金</th><th>同类均值</th><th>沪深300</th><th>同类排名</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function bYearly(d) {
  if (!d.yearly_returns?.length) return '';
  const mx = Math.max(...d.yearly_returns.map(y => Math.abs(y.return_rate)), 1);
  const rows = d.yearly_returns.map(y => {
    const col = y.return_rate >= 0 ? 'var(--pos)' : 'var(--neg)';
    const w = Math.abs(y.return_rate) / mx * 82;
    const pp = rankpct(y.rank, y.total);
    const rc = pp <= 25 ? 'pos' : pp >= 75 ? 'neg' : 'neu';
    return `
    <div class="barrow">
      <div class="baryr">${esc(y.title.replace('年度',''))}</div>
      <div class="bartk"><div class="barfl" data-w="${w}%" style="background:${col}"></div></div>
      <div class="barvl ${y.return_rate>=0?'pos':'neg'}">${pct(y.return_rate,2,true)}</div>
      <div class="barrk"><span class="${rc}">${y.rank}/${y.total}</span></div>
    </div>`;
  }).join('');
  return `<div class="card mb24 fade">${sl('年度收益')}${rows}</div>`;
}

function bMonthlySeries(d) {
  if (!d.monthly_series?.length) return '';
  const series = [...d.monthly_series].sort((a, b) => b.month.localeCompare(a.month));
  const mx = Math.max(...series.map(m => Math.abs(m.return_rate)), 0.01);
  const rows = series.map(m => {
    const v = m.return_rate;
    const pctW = Math.min(50, Math.abs(v) / mx * 50);
    const col = v >= 0 ? 'var(--pos)' : 'var(--neg)';
    const left = v >= 0 ? '50%' : `${50 - pctW}%`;
    return `
    <div class="mseries-row">
      <div class="lbl">${esc(m.month)}</div>
      <div class="bar-wrap">
        <div class="bar-zero"></div>
        <div class="bar-fill" data-w="${pctW}%" data-left="${left}" style="background:${col}"></div>
      </div>
      <div class="val ${v>=0?'pos':'neg'}">${pct(v,2,true)}</div>
    </div>`;
  }).join('');
  const asof = d.meta?.as_of?.monthly_series;
  return `
  <div class="card mb24 fade">
    ${sl('真月度收益序列', `共 ${series.length} 月`, asof)}
    <div>${rows}</div>
  </div>`;
}

function bAccChart() {
  const ranges = [
    { v:'1m', label:'1M', days:22  },
    { v:'3m', label:'3M', days:66  },
    { v:'6m', label:'6M', days:132 },
    { v:'1y', label:'1Y', days:250 },
    { v:'3y', label:'3Y', days:750 },
    { v:'5y', label:'5Y', days:1250 },
  ];
  const btns = ranges.map(r =>
    `<button type="button" class="rngbtn${r.v === '5y' ? ' active' : ''}" data-range="${r.v}" data-days="${r.days}">${esc(r.label)}</button>`
  ).join('');
  return `
  <div class="card mb24 fade" id="sec-acc">
    ${sl('累计收益走势', '可切换时间窗口')}
    <div class="rng-wrap">${btns}</div>
    <div class="chwrap">
      <canvas class="acc-chart" id="accchart-base" aria-label="基金累计收益走势"></canvas>
      <canvas class="acc-chart" id="accchart-overlay" aria-hidden="true"></canvas>
      <div class="tip" id="ctip"><div class="tipdt" id="tipdt"></div><div id="tipbd"></div></div>
    </div>
    <div class="legend legend-acc">
      <div class="litem litem-primary"><div class="ldot ldot-primary" style="background:#1c3a2a"></div><b>本基金</b></div>
      <div class="litem"><div class="ldot" style="background:#c8941d"></div>基准指数</div>
      <div class="litem"><div class="ldot ldot-dash" style="background:#5a574e"></div>同类均值</div>
      <div class="litem"><div class="ldot ldot-dot" style="background:#a39e91"></div>债券指数</div>
    </div>
  </div>`;
}

function bRisk(d) {
  const r = d.risk_metrics;
  const tot = r.positive_days + r.negative_days;
  const dwr = tot > 0 ? r.positive_days / tot * 100 : 0;
  const recoveryText = r.max_drawdown_recovery_days == null
    ? '仍在水下'
    : `${r.max_drawdown_recovery_days} 天`;
  const recoveryCls = r.max_drawdown_recovery_days == null ? 'neg' : 'neu';
  const items = [
    { k:'年化收益率', v: pct(r.annualized_return, 2, true), cls: cc(r.annualized_return), bar: Math.min(100, Math.abs(r.annualized_return)*8), bc:'var(--pos)' },
    { k:'最大回撤',   v: '-'+fmt(r.max_drawdown)+'%',       cls:'neg', bar: Math.min(100, r.max_drawdown*28), bc:'var(--neg)' },
    { k:'当前回撤',   v: '-'+fmt(r.current_drawdown)+'%',   cls: r.current_drawdown<0.5?'neu':'neg', bar: Math.min(100, r.current_drawdown*28), bc:'var(--warn)', hint:'距历史最高净值' },
    { k:'回撤恢复',   v: recoveryText,                       cls: recoveryCls, bar: 0, bc:'var(--neu)', hint:'最大回撤后恢复天数' },
    { k:'年化波动率', v: fmt(r.volatility)+'%',              cls:'neu', bar: Math.min(100, r.volatility*14), bc:'var(--warn)' },
    { k:'夏普比率',   v: fmt(r.sharpe_ratio),                cls: r.sharpe_ratio>1?'pos':r.sharpe_ratio>0?'neu':'neg', bar: Math.min(100, Math.max(0,r.sharpe_ratio)/3*100), bc:'var(--acc)' },
    { k:'索提诺比率', v: fmt(r.sortino_ratio),               cls: r.sortino_ratio>1?'pos':r.sortino_ratio>0?'neu':'neg', bar: Math.min(100, Math.max(0,r.sortino_ratio)/3*100), bc:'var(--acc)', hint:'仅下行波动调整' },
    { k:'卡玛比率',   v: fmt(r.calmar_ratio),                cls: r.calmar_ratio>1?'pos':r.calmar_ratio>0?'neu':'neg', bar: Math.min(100, Math.max(0,r.calmar_ratio)/5*100), bc:'var(--acc)', hint:'年化收益 / 最大回撤' },
    { k:'正收益天数', v: r.positive_days+' 天',              cls:'pos', bar: tot?r.positive_days/tot*100:0, bc:'var(--pos)' },
    { k:'负收益天数', v: r.negative_days+' 天',              cls:'neg', bar: tot?r.negative_days/tot*100:0, bc:'var(--neg)' },
    { k:'日胜率',     v: dwr.toFixed(1)+'%',                 cls: dwr>=55?'pos':'neu', bar: dwr, bc:'var(--pos)' },
    { k:'月胜率',     v: fmt(r.monthly_win_rate, 1)+'%',     cls: r.monthly_win_rate>=60?'pos':'neu', bar: r.monthly_win_rate, bc:'var(--pos)' },
  ];
  const cells = items.map(it => `
    <div class="mcell">
      <div class="mkey">${esc(it.k)}</div>
      <div class="mnum ${it.cls}">${esc(it.v)}</div>
      <div class="mbar"><div class="mbarfl" data-w="${it.bar}%" style="background:${it.bc}"></div></div>
      ${it.hint ? `<div class="mhint" style="margin-top:6px">${esc(it.hint)}</div>` : ''}
    </div>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('风险指标', `近 ${r.data_points} 交易日`)}
    <div class="mgrid">${cells}</div>
  </div>`;
}

function bBenchmark(d) {
  const b = d.benchmark_metrics;
  if (!b || b.data_points === 0) return '';
  const items = [
    { k:'Alpha (年化)',   v: b.alpha    != null ? pct(b.alpha, 2, true)       : '--', cls: cc(b.alpha), hint:'Jensen alpha (rf=2%)' },
    { k:'Beta',           v: b.beta     != null ? fmt(b.beta)                  : '--', cls:'neu',        hint:'1.0 = 与基准同步' },
    { k:'信息比率 IR',    v: b.information_ratio != null ? fmt(b.information_ratio)  : '--', cls: cc(b.information_ratio), hint:'主动管理稳定性' },
    { k:'跟踪误差 (年化)',v: b.tracking_error    != null ? fmt(b.tracking_error)+'%' : '--', cls:'neu',    hint:'偏离基准的波动' },
  ];
  const cells = items.map(it => `
    <div class="mcell">
      <div class="mkey">${esc(it.k)}</div>
      <div class="mnum ${it.cls}">${esc(it.v)}</div>
      <div class="mhint">${esc(it.hint)}</div>
    </div>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('相对基准表现', `${b.data_points} 日`)}
    <div class="mgrid mgrid-4">${cells}</div>
  </div>`;
}

function bDistribution(d) {
  const dist = d.distribution;
  if (!dist || dist.data_points === 0) return '';
  const items = [
    { k:'VaR 95%',       v: dist.var_95  != null ? '-'+fmt(dist.var_95)+'%'  : '--', cls:'neg', hint:'5% 概率单日跌幅' },
    { k:'CVaR 95%',      v: dist.cvar_95 != null ? '-'+fmt(dist.cvar_95)+'%' : '--', cls:'neg', hint:'尾部 5% 平均跌幅' },
    { k:'偏度 Skewness', v: dist.skewness != null ? fmt(dist.skewness)        : '--', cls: dist.skewness != null && dist.skewness < 0 ? 'neg' : 'neu', hint: dist.skewness != null && dist.skewness < 0 ? '左偏，偶有大跌' : '右偏 / 对称' },
    { k:'超额峰度',      v: dist.excess_kurtosis != null ? fmt(dist.excess_kurtosis) : '--', cls: dist.excess_kurtosis != null && dist.excess_kurtosis > 3 ? 'warn' : 'neu', hint: dist.excess_kurtosis != null && dist.excess_kurtosis > 3 ? '厚尾分布' : '接近正态' },
  ];
  const cells = items.map(it => `
    <div class="mcell">
      <div class="mkey">${esc(it.k)}</div>
      <div class="mnum ${it.cls}">${esc(it.v)}</div>
      <div class="mhint">${esc(it.hint)}</div>
    </div>`).join('');
  return `
  <div class="card mb24 fade">
    ${sl('日收益分布', `${dist.data_points} 日`)}
    <div class="mgrid mgrid-4">${cells}</div>
  </div>`;
}

function bRolling(d) {
  const r = d.rolling_returns;
  if (!r || (!r.y1 && !r.y3)) return '';
  // Combined range covers both 1Y and 3Y; pad ±5% so labels don't clip.
  const stats = [r.y1, r.y3].filter(x => x);
  if (!stats.length) return '';
  const lo = Math.min(...stats.map(s => s.min)) - 5;
  const hi = Math.max(...stats.map(s => s.max)) + 5;
  const span = hi - lo || 1;
  const toPct = v => ((v - lo) / span * 100);
  const row = (s, label) => {
    if (!s) return '';
    const lp = toPct(s.min), wp = toPct(s.max) - lp;
    const ip = toPct(s.p25), iw = toPct(s.p75) - ip;
    const mp = toPct(s.median);
    return `
    <div class="rolling-row">
      <div class="lbl">${esc(label)}</div>
      <div class="rolling-track" title="min ${fmt(s.min)}% · max ${fmt(s.max)}% · median ${fmt(s.median)}%">
        <div class="rolling-range" style="left:${lp.toFixed(2)}%;width:${wp.toFixed(2)}%"></div>
        <div class="rolling-iqr"   style="left:${ip.toFixed(2)}%;width:${iw.toFixed(2)}%"></div>
        <div class="rolling-mark"  style="left:${mp.toFixed(2)}%"></div>
      </div>
      <div class="val">${pct(s.median,1,true)}</div>
      <div class="val neu">${s.count} 窗口</div>
    </div>`;
  };
  return `
  <div class="card mb24 fade">
    ${sl('滚动收益分布', '1Y / 3Y')}
    <div class="sub-label">中位线 + IQR 阴影 + 最大最小范围</div>
    ${row(r.y1, '近 1 年')}
    ${row(r.y3, '近 3 年')}
    <div class="axis-note">
      取值轴 ${fmt(lo,1)}% &nbsp;→&nbsp; ${fmt(hi,1)}%
    </div>
    ${rollingCommentary(r.y1, r.y3)}
  </div>`;
}

function rollingCommentary(y1, y3) {
  const bullets = [];
  const ref = y1 || y3;
  if (!ref) return '';
  const refLabel = y1 ? '近 1 年滚动' : '近 3 年滚动';

  const iqr = ref.p75 - ref.p25;
  const tag = iqr < 2 ? '极窄' : iqr < 5 ? '较窄' : iqr < 10 ? '中等' : '偏宽';
  bullets.push(
    `<li><b>${refLabel}中位收益 ${pct(ref.median,2,true)}</b>，IQR 区间 `
    + `${pct(ref.p25,2,true)} ~ ${pct(ref.p75,2,true)}（宽度 ${fmt(iqr,2)}pp，${tag}），`
    + `${tag === '极窄' || tag === '较窄' ? '体感平稳' : '体感波动较明显'}。</li>`
  );

  if (ref.min >= 0) {
    bullets.push(
      `<li><b>历史上任意时点持有 ${y1 ? 1 : 3} 年均未出现亏损</b>，`
      + `最差窗口仍录得 ${pct(ref.min,2,true)}。</li>`
    );
  } else {
    bullets.push(
      `<li>最差窗口收益 <b class="neg">${pct(ref.min,2,true)}</b>，`
      + `最佳 <b class="pos">${pct(ref.max,2,true)}</b>，极端区间跨度 `
      + `${fmt(ref.max - ref.min,1)}pp。</li>`
    );
  }

  if (y1 && y3) {
    const diff = y1.median - y3.median;
    if (Math.abs(diff) < 0.8) {
      bullets.push(
        `<li>1Y 与 3Y 中位差仅 ${fmt(Math.abs(diff),2)}pp，<b>近一年风格与长期一致</b>。</li>`
      );
    } else if (diff > 0) {
      bullets.push(
        `<li>1Y 中位较 3Y 高 <b class="pos">+${fmt(diff,2)}pp</b>，近期回报优于长期均值。</li>`
      );
    } else {
      bullets.push(
        `<li>1Y 中位较 3Y 低 <b class="neg">${fmt(diff,2)}pp</b>，近一年收益弱于长期均值，留意是否进入估值消化。</li>`
      );
    }
  }

  return `
    <div class="commentary">
      <div class="commentary-title">解读</div>
      <ul class="commentary-list">${bullets.join('')}</ul>
    </div>`;
}

function bScores(d) {
  const rows = d.scores.items.map(it => {
    const cls = it.score >= 80 ? 'pos' : it.score >= 60 ? 'neu' : 'neg';
    return `
    <div class="srow">
      <div class="snm">${esc(it.name)}</div>
      <div class="sbar"><div class="sbfl" data-w="${it.score}%"></div></div>
      <div class="svl ${cls}">${it.score}</div>
      <div class="swt">${it.weight}%</div>

  return `

    ${sl('综合评分明细')}
    <div class="scorearea">
      <div class="radwrap"><svg class="radsvg" id="radsvg" viewBox="0 0 260 260" aria-hidden="true"></svg></div>
      <div>

function bManager(d) {
  const all = d.managers || [];
  const primary = all[0];
  if (!primary || !primary.info) return '';
  const mi = primary.info, me = primary.eval;
  const years = (parseFloat(mi.TOTALDAYS||'0') / 365).toFixed(1);
  const navB  = (parseFloat(mi.NETNAV||'0') / 1e8).toFixed(0);
  const earn1 = (parseFloat(mi.FMAXEARN1||'0') * 100).toFixed(2);
  const dd1m  = (parseFloat(mi.FMAXRETRA1||'0') * 100).toFixed(2);

  const stats = [
    { k:'从业年限',     v: years+' 年',     cls:'' },
    { k:'在管规模',     v: navB+' 亿',      cls:'' },
    { k:'在管基金',     v: (mi.FCOUNT||'--')+' 只', cls:'' },
    { k:'历史最佳年化', v: '+'+earn1+'%',   cls:'pos' },
    { k:'历史最大回撤', v: '-'+dd1m+'%',    cls:'neg' },
  ];
  if (me) {
    const s1 = parseFloat(me.SHARP_1||'0'), s3 = parseFloat(me.SHARP_3||'0');
    const mdd1 = (parseFloat(me.MAXRETRA_1||'0')*100).toFixed(2);
    const mdd3 = (parseFloat(me.MAXRETRA_3||'0')*100).toFixed(2);
    const w1 = parseFloat(me.WIN_1||'0'), w3 = parseFloat(me.WIN_3||'0');
    stats.push(
      { k:'近1年夏普', v: fmt(s1),         cls: s1>1?'pos':s1>0?'neu':'neg' },
      { k:'近3年夏普', v: fmt(s3),         cls: s3>1?'pos':s3>0?'neu':'neg' },
      { k:'近1年回撤', v: '-'+mdd1+'%',    cls:'neg' },
      { k:'近3年回撤', v: '-'+mdd3+'%',    cls:'neg' },
      { k:'近1年胜率', v: w1.toFixed(1)+'%', cls: w1>=55?'pos':'neu' },
      { k:'近3年胜率', v: w3.toFixed(1)+'%', cls: w3>=55?'pos':'neu' },
    );
  }
  const cols = Math.min(stats.length, 5);
  const cellHtml = stats.map(s => `
    <div class="mgrc">
      <div class="mgrk">${esc(s.k)}</div>
      <div class="mgrv ${s.cls}">${esc(s.v)}</div>
    </div>`).join('');

  const resume = mi.RESUME || '';
  const resumeHtml = resume ? `
    <div class="resume-wrap">
      <div class="resume" id="resume">${esc(resume)}</div>
      <button class="resume-btn" type="button" onclick="toggleResume()">展开全文 ▾</button>
    </div>` : '';

  // Title: primary manager + comma-joined co-managers when len > 1.
  // Card body shows primary's full profile only; co-managers' info objects are
  // available in d.managers[1..] for future tab UI.
  const coManagers = all.slice(1).map(m => m.manager_name).filter(Boolean).join('、');
  const title = '基金经理 · ' + (mi.MGRNAME || '')
    + (coManagers ? `（共管：${esc(coManagers)}）` : '');

  return `
  <div class="card mb24 fade">
    ${sl(title)}
    <div class="mgrg mgr-cols-${cols}">${cellHtml}</div>
    ${resumeHtml}
  </div>`;
}

function bManagerHistory(d) {
  const primary = (d.managers || [])[0];
  const list = primary ? primary.history : null;
  if (!Array.isArray(list) || !list.length) return '';
  // Sort by start date desc, keep top 8 to bound page length.
  const sorted = [...list]
    .sort((a, b) => (b.FEMPDATE || '').localeCompare(a.FEMPDATE || ''))
    .slice(0, 8);
  const fmtDate = s => s && s.length >= 10 ? s.slice(0, 10) : (s === '--' ? '至今' : esc(s));
  const rows = sorted.map((m, i) => {
    const days = parseInt(m.TOTALDAYS || '0', 10);
    const yrs = (days / 365).toFixed(1);
    const ret = parseFloat(m.PENAVGROWTH || '0');
    const retCls = ret >= 0 ? 'pos' : 'neg';
    const rank = m.TLRANK && m.TLSC ? chip(parseInt(m.TLRANK,10), parseInt(m.TLSC,10)) : '--';
    return `
    <tr>
      <td>${i+1}</td>
      <td>
        <div>${esc(m.SHORTNAME || '')}</div>
        <div class="ccode">${esc(m.FCODE || '')}</div>
      </td>
      <td>${fmtDate(m.FEMPDATE)} → ${fmtDate(m.LEMPDATE)}</td>
      <td>${yrs} 年</td>
      <td class="${retCls}">${pct(ret, 2, true)}</td>
      <td>${rank}</td>
    </tr>`;
  }).join('');
  return `
  <div class="card mb24 fade">
    ${sl('经理任职履历', `共 ${list.length} 只 · 显示前 ${sorted.length}`)}
    <div class="tscroll">
      <table class="mtbl">
        <thead><tr><th>#</th><th>基金</th><th>任期</th><th>时长</th><th>任内收益</th><th>同类排名</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

/* ─── P3 extension builders ─────────────────────────────────────
 * Render data that already lives in the analyze JSON but the original
 * P0-P2 page didn't surface: max-drawdown trough dates, asset allocation
 * trends, top stocks, rolling-return amounts, benchmark cumulative gap.
 */

const MACRO_EVENTS = [
  // Date is the END (trough) of the max-drawdown episode. Match by year-month
  // string prefix; fall through to generic note if no match.
  { match: /^2018-1[0-2]|^2019-0[1-3]/, note: '对应 A 股贸易战熊市底（2018Q4–2019Q1）' },
  { match: /^2020-0[2-4]/,              note: '对应新冠疫情流行性暴跌（2020 年 2–4 月）' },
  { match: /^2022-(0[3-9]|1[0-2])/,     note: '对应稳增长摇摆 + 美联储加息周期，债股双杀（2022Q1–Q4）' },
  { match: /^2023-(0[8-9]|1[0-2])/,     note: '对应人民币贬值压力 + 高息环境，二级债基普遍承压（2023Q3–Q4）' },
  { match: /^2024-(09|10)/,             note: '对应"924"政策博弈快涨快跌（2024 年 9–10 月）' },
  { match: /^2025-0[1-3]/,              note: '对应 DeepSeek 行情后快速回吐（2025Q1）' },
];

function macroNote(endDate) {
  if (!endDate) return '';
  const hit = MACRO_EVENTS.find(e => e.match.test(endDate));
  return hit ? hit.note : '';
}

function bMaxDrawdownEvent(d) {
  const r = d.risk_metrics;
  if (!r || !r.max_drawdown_start_date || !r.max_drawdown_end_date) return '';
  const recoveryText = r.max_drawdown_recovery_days == null
    ? '仍在水下'
    : `${r.max_drawdown_recovery_days} 天`;
  const recoveryCls = r.max_drawdown_recovery_days == null ? 'neg' : 'neu';
  const note = macroNote(r.max_drawdown_end_date);
  const items = [
    { k:'起点日期', v: r.max_drawdown_start_date,        cls:'neu', hint:'前期净值高点' },
    { k:'谷底日期', v: r.max_drawdown_end_date,          cls:'neg', hint:'回撤最深时点' },
    { k:'回撤幅度', v: '-'+fmt(r.max_drawdown)+'%',      cls:'neg', hint:'峰谷距离' },
    { k:'恢复天数', v: recoveryText,                      cls: recoveryCls, hint:'回到前期高点用时' },
  ];
  const cells = items.map(it => `
    <div class="mcell">
      <div class="mkey">${esc(it.k)}</div>
      <div class="mnum ${it.cls}">${esc(it.v)}</div>
      <div class="mhint">${esc(it.hint)}</div>
    </div>`).join('');
  const noteHtml = note
    ? `<div class="sub-label sub-label-callout">📌 ${esc(note)}</div>`
    : '';
  return `
  <div class="card mb24 fade">
    ${sl('最大回撤事件溯源', '近 '+r.data_points+' 交易日')}
    <div class="mgrid mgrid-4">${cells}</div>
    ${noteHtml}
  </div>`;
}

function bBenchAccCompare(d) {
  const acc = d.accumulated_return;
  if (!Array.isArray(acc) || acc.length < 2) return '';
  const last = acc[acc.length - 1];
  // Pick anchor points at 250 / 750 / 1250 trading days back; fall back to
  // the series start when the fund is younger than the window.
  const at = (offset) => acc.length > offset ? acc[acc.length - 1 - offset] : null;
  const rows = [
    { label: '成立以来', start: acc[0] },
    { label: '近 5 年',  start: at(1250) },
    { label: '近 3 年',  start: at(750) },
    { label: '近 1 年',  start: at(250) },
  ].filter(r => r.start && r.start.date !== last.date);

  const tr = rows.map(row => {
    const fund  = last.fund_return     - row.start.fund_return;
    const bench = last.bench_return    - row.start.bench_return;
    const cat   = last.category_return - row.start.category_return;
    const exB = fund - bench;
    const exC = fund - cat;
    return `
    <tr>
      <td>${esc(row.label)}</td>
      <td class="ccode">${esc(row.start.date)} → ${esc(last.date)}</td>
      <td class="${cc(fund)}">${pct(fund,2,true)}</td>
      <td>${pct(bench,2,true)}</td>
      <td>${pct(cat,2,true)}</td>
      <td class="${cc(exB)}"><b>${pct(exB,2,true)} pp</b></td>
      <td class="${cc(exC)}">${pct(exC,2,true)} pp</td>
    </tr>`;
  }).join('');
  return `
  <div class="card mb24 fade">
    ${sl('真实基准累计对照', `${acc.length} 个交易日`)}
    <div class="sub-label">直接取累计收益序列首尾差，非估算值</div>
    <div class="tscroll">
      <table class="mtbl">
        <thead><tr>
          <th>区间</th><th>区间端点</th>
          <th>本基金</th><th>业绩基准</th><th>同类均值</th>
          <th>vs 基准</th><th>vs 同类</th>
        </tr></thead>
        <tbody>${tr}</tbody>
      </table>
    </div>
  </div>`;
}

function bRollingMoney(d) {
  const r = d.rolling_returns;
  if (!r || (!r.y1 && !r.y3)) return '';
  // Amount comes from `?amount=NNN` query param; default 100k for an easy
  // mental anchor and to scale via simple multiplication for any holding size.
  const params = new URLSearchParams(location.search);
  const raw = parseFloat(params.get('amount') || '');
  const amount = isFinite(raw) && raw > 0 ? raw : 100000;
  const fmtCNY = v => {
    const sign = v >= 0 ? '+' : '−';
    const abs = Math.abs(v);
    return sign + abs.toLocaleString('zh-CN', { maximumFractionDigits: 0 }) + ' 元';
  };
  const row = (s, label) => {
    if (!s) return '';
    const worst = amount * s.min / 100;
    const med   = amount * s.median / 100;
    const best  = amount * s.max / 100;
    return `
    <tr>
      <td>${esc(label)}</td>
      <td class="${cc(s.min)}"><b>${fmtCNY(worst)}</b><div class="ccode">${pct(s.min,2,true)}</div></td>
      <td class="${cc(s.median)}"><b>${fmtCNY(med)}</b><div class="ccode">${pct(s.median,2,true)}</div></td>
      <td class="${cc(s.max)}"><b>${fmtCNY(best)}</b><div class="ccode">${pct(s.max,2,true)}</div></td>
      <td>${s.count} 样本</td>
    </tr>`;
  };
  const baseLabel = (amount === 100000) ? '10 万元基准' : amount.toLocaleString('zh-CN') + ' 元';
  const hintLine = (r.y3 && r.y3.min > 0)
    ? `✅ 任意 3 年滚动从未亏损，最差也赚 ${fmtCNY(amount * r.y3.min / 100)}`
    : (r.y1 && r.y1.min < -3)
      ? `⚠️ 极端情况下 1 年可亏 ${fmtCNY(amount * r.y1.min / 100)}（约 ${pct(Math.abs(r.y1.min),1)} 本金）`
      : '';
  return `
  <div class="card mb24 fade">
    ${sl('持有期收益区间（金额化预期）', baseLabel)}
    <div class="sub-label">基于滚动收益分布，按你的金额换算成实际盈亏</div>
    <div class="tscroll">
      <table class="mtbl">
        <thead><tr>
          <th>持有期</th>
          <th>最差情形</th><th>中位情形</th><th>最好情形</th>
          <th>样本</th>
        </tr></thead>
        <tbody>${row(r.y1, '1 年')}${row(r.y3, '3 年')}</tbody>
      </table>
    </div>
    ${hintLine ? `<div class="sub-label sub-label-callout">${hintLine}</div>` : ''}
    <div class="sub-label sub-label-muted">URL 加 <code>?amount=150000</code> 可自定义金额</div>
  </div>`;
}

function bAssetAllocation(d) {
  const aa = d.asset_allocation;
  if (!Array.isArray(aa) || !aa.length) return '';
  const top = aa.slice(0, 6);
  const rows = top.map(a => {
    const total = (a.stock_pct || 0) + (a.bond_pct || 0) + (a.cash_pct || 0);
    const lev = total - 100;
    const levCell = lev > 5
      ? `<td class="warn"><b>+${fmt(lev,2)}%</b><div class="ccode">质押回购加杠杆</div></td>`
      : lev < -5
        ? `<td class="neu">${fmt(lev,2)}%</td>`

    return `
    <tr>
      <td>${esc(a.date)}</td>
      <td class="pos">${fmt(a.stock_pct)}%</td>
      <td>${fmt(a.bond_pct)}%</td>
      <td class="neu">${fmt(a.cash_pct)}%</td>
      <td>${fmt(total,2)}%</td>
      ${levCell}
      <td>${fmt(a.total_assets_yi)} 亿</td>
    </tr>`;
  }).join('');

  // Style drift: spread of stock_pct across the full history. Cards above the
  // table summarize the latest snapshot + drift in plain language.
  const allStock = aa.map(x => x.stock_pct).filter(v => v != null);
  const drift = allStock.length > 1 ? Math.max(...allStock) - Math.min(...allStock) : 0;
  const driftLabel = drift <= 5  ? '风格稳定（仓位 ≤ 5pp）'
                   : drift <= 15 ? '温和择时（5–15pp）'

  const latest = aa[0];
  const summary = [
    { k:'最新股票占比', v: fmt(latest.stock_pct)+'%', cls:'pos' },

    { k:'最新总资产',   v: fmt(latest.total_assets_yi)+' 亿', cls:'neu' },
    { k:'股票占比跨度', v: fmt(drift,1)+' pp',          cls: driftCls, hint: driftLabel },
  ];
  const sumCells = summary.map(it => `
    <div class="mcell">
      <div class="mkey">${esc(it.k)}</div>
      <div class="mnum ${it.cls}">${esc(it.v)}</div>
      ${it.hint ? `<div class="mhint">${esc(it.hint)}</div>` : ''}
    </div>`).join('');

  return `
  <div class="card mb24 fade">
    ${sl('资产配置 + 风格漂移', `近 ${top.length} 期`, d.meta?.as_of?.asset_allocation)}
    <div class="mgrid mgrid-4 summary-grid">${sumCells}</div>

}

/* ─── animations / charts ─── */

function animGauge(score) {
  const fill = document.getElementById('gfill');
  const num  = document.getElementById('gnum');
  if (!fill || !num) return;
  const circ = 2 * Math.PI * 47;
  requestAnimationFrame(() => { fill.style.strokeDashoffset = circ * (1 - score / 100); });
  if (!score) { num.textContent = 0; return; }
  let cur = 0;
  const step = Math.max(1, Math.floor(score / 60));
  const ivl = setInterval(() => {
    cur = Math.min(cur + step, score);
    num.textContent = cur;
    if (cur >= score) clearInterval(ivl);
  }, 1000 / Math.max(score, 30));
}

function renderRadar(items) {
  const svg = document.getElementById('radsvg');
  if (!svg) return;
  const n = items.length, cx = 130, cy = 130, R = 88;
  const a0 = -Math.PI/2, step = 2*Math.PI/n;
  const pt = (i, r) => ({ x: cx+r*Math.cos(a0+i*step), y: cy+r*Math.sin(a0+i*step) });
  let h = '';
  [20,40,60,80,100].forEach(p => {
    const pp = items.map((_, i) => { const v = pt(i, R*p/100); return `${v.x.toFixed(1)},${v.y.toFixed(1)}`; }).join(' ');
    h += `<polygon points="${pp}" fill="none" stroke="#d4cfbe" stroke-width="0.6"/>`;
  });
  items.forEach((_, i) => { const p = pt(i, R); h += `<line x1="${cx}" y1="${cy}" x2="${p.x.toFixed(1)}" y2="${p.y.toFixed(1)}" stroke="#d4cfbe" stroke-width="0.6"/>`; });
  const ref = items.map((_, i) => { const p = pt(i, R*0.8); return `${p.x.toFixed(1)},${p.y.toFixed(1)}`; }).join(' ');
  h += `<polygon points="${ref}" fill="rgba(28,58,42,0.03)" stroke="rgba(28,58,42,0.35)" stroke-width="0.8" stroke-dasharray="3,3"/>`;
  const spts = items.map((it, i) => { const p = pt(i, R*it.score/100); return `${p.x.toFixed(1)},${p.y.toFixed(1)}`; }).join(' ');
  h += `<polygon id="rpoly" points="${spts}" fill="rgba(28,58,42,0.12)" stroke="#1c3a2a" stroke-width="1.5" opacity="0" style="transition:opacity 0.6s"/>`;
  items.forEach((it, i) => {
    const p = pt(i, R*it.score/100);
    h += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="#1c3a2a" stroke="#fbfaf6" stroke-width="1.5"/>`;
    const lp = pt(i, R+19);
    const vc = it.score>=80 ? '#2f6a48' : it.score>=60 ? '#14130f' : '#973340';
    h += `<text x="${lp.x.toFixed(1)}" y="${(lp.y-5).toFixed(1)}" text-anchor="middle" font-family="${'IBM Plex Mono,monospace'}" font-size="10" letter-spacing="0.5" fill="#8a8780">${esc(it.name)}</text>`;
    h += `<text x="${lp.x.toFixed(1)}" y="${(lp.y+10).toFixed(1)}" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="11" font-weight="500" fill="${vc}">${it.score}</text>`;
  });
  svg.innerHTML = h;
  setTimeout(() => { const p = document.getElementById('rpoly'); if (p) p.style.opacity = '1'; }, 400);
}

/* Downsample a time series to roughly `target` points using uniform stride.
   Cheap and good enough — values are smoothed cumulative returns, so stride
   sampling is visually indistinguishable from the original at this density. */
function downsample(points, target) {
  if (!points || points.length <= target) return points || [];
  const step = (points.length - 1) / (target - 1);
  const out = [];
  for (let i = 0; i < target; i++) {
    out.push(points[Math.min(points.length - 1, Math.round(i * step))]);
  }
  // Always include the last point.
  if (out[out.length - 1] !== points[points.length - 1]) {
    out[out.length - 1] = points[points.length - 1];
  }
  return out;
}

function finiteSeriesValue(point, key) {
  const value = point?.[key];
  return isFinite(value) ? value : null;
}

// Holds the raw daily accumulated_return series so we can re-window it
// when the user clicks a range button without re-fetching JSON.
let _accRaw = null;
let _accRenderId = 0;
let _accResizeObserver = null;
let _accOverlayCleanup = null;
let _accAnimFrame = 0;
let _accCurrentDays = 0;

function normalizeAccWindow(source, days) {
  if (!source?.length) return [];
  const activeDays = Math.max(0, Number.isFinite(days) ? days : 0);
  let windowed = source;
  if (activeDays > 0 && source.length > activeDays) {
    windowed = source.slice(-activeDays);
  }
  if (windowed.length <= 1) return windowed;

  const keys = ['fund_return', 'index_return', 'category_return', 'bench_return'];
  const starts = Object.fromEntries(keys.map(key => [key, windowed[0][key]]));
  const rebase = (value, start) => {
    if (!isFinite(value) || !isFinite(start)) return null;
    const base = 1 + start / 100;
    if (!isFinite(base) || Math.abs(base) < 1e-9) return value - start;
    return ((1 + value / 100) / base - 1) * 100;
  };

  return windowed.map((p, idx) => {
    const out = { date: p.date };
    keys.forEach(key => {
      const value = p[key];
      const isMissingZero = idx > 0 && value === 0 && starts[key] !== 0;
      out[key] = isMissingZero ? null : rebase(value, starts[key]);
    });
    return out;
  });
}

function renderAccChart(rawPoints, days) {
  if (Array.isArray(rawPoints)) _accRaw = rawPoints;
  const source = _accRaw || rawPoints;
  if (!source?.length) return;

  let base = document.getElementById('accchart-base');
  let overlay = document.getElementById('accchart-overlay');
  if (!base || !overlay) return;

  if (Number.isFinite(days)) _accCurrentDays = Math.max(0, days);
  const activeDays = _accCurrentDays;
  const renderId = ++_accRenderId;
  if (_accResizeObserver) {
    _accResizeObserver.disconnect();
    _accResizeObserver = null;
  }
  if (_accOverlayCleanup) {
    _accOverlayCleanup();
    _accOverlayCleanup = null;
  }
  if (_accAnimFrame) {
    cancelAnimationFrame(_accAnimFrame);
    _accAnimFrame = 0;
  }

  const freshBase = base.cloneNode(false);
  const freshOverlay = overlay.cloneNode(false);
  base.replaceWith(freshBase);
  overlay.replaceWith(freshOverlay);
  base = freshBase;
  overlay = freshOverlay;

  const tip = document.getElementById('ctip');
  if (tip) tip.style.opacity = '0';
  const overlayCtx = overlay.getContext('2d');
  overlayCtx.clearRect(0, 0, overlay.width, overlay.height);

  base.dataset.rangeDays = String(activeDays);
  overlay.dataset.rangeDays = String(activeDays);
  const windowed = normalizeAccWindow(source, activeDays);

  const series = [
    { key:'fund_return',     color:'#1c3a2a', w:3.2, label:'本基金',    glow:true,  dash:[] },
    { key:'index_return',    color:'#c8941d', w:1.6, label:'基准指数', glow:false, dash:[] },
    { key:'category_return', color:'#5a574e', w:1.4, label:'同类均值', glow:false, dash:[7,4] },
    { key:'bench_return',    color:'#a39e91', w:1.2, label:'债券指数', glow:false, dash:[3,4] },
  ];

  // Cached geometry — computed once per resize.
  let geom = null;
  let points = [];
  let prog = 0;

  function resize() {
    if (renderId !== _accRenderId) return;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const W = base.clientWidth, H = base.clientHeight;
    if (!W || !H) return;
    const compact = W < 420;
    const mid = W < 640;
    const target = compact ? Math.max(48, Math.floor(W / 4.8)) : Math.min(150, Math.max(80, Math.floor(W / 5)));
    points = downsample(windowed, target);
    if (points.length < 2) return;
    [base, overlay].forEach(c => {
      if (c.width !== W * dpr || c.height !== H * dpr) {
        c.width = W * dpr; c.height = H * dpr;
      }
    });
    const pd = compact
      ? { t: 12, r: 8, b: 24, l: 40 }
      : mid
        ? { t: 12, r: 10, b: 26, l: 42 }
        : { t: 14, r: 14, b: 28, l: 44 };
    const cW = Math.max(10, W - pd.l - pd.r);
    const cH = Math.max(10, H - pd.t - pd.b);
    let lo = Infinity, hi = -Infinity;
    series.forEach(s => points.forEach(p => {
      const v = finiteSeriesValue(p, s.key);
      if (v == null) return;
      if (v < lo) lo = v;
      if (v > hi) hi = v;
    }));
    if (!isFinite(lo) || !isFinite(hi)) { lo = -0.5; hi = 0.5; }
    const pad2 = (hi - lo) * 0.1 || 0.5; lo -= pad2; hi += pad2;
    const ts = points.map(p => +new Date(p.date));
    const t0 = ts[0], t1 = ts[ts.length-1], tr = t1 - t0 || 1;
    geom = {
      dpr, W, H, pd, cW, cH, lo, hi, ts, compact,
      strokeScale: compact ? 0.78 : mid ? 0.9 : 1,
      yTicks: compact ? 3 : 4,
      yearGap: compact ? 86 : mid ? 70 : 54,
      xp: t => pd.l + (t - t0) / tr * cW,
      yp: v => pd.t + (1 - (v - lo) / (hi - lo)) * cH,
    };
  }

  function drawBase(p) {
    if (renderId !== _accRenderId) return;
    if (!geom) return;
    const { dpr, W, H, pd, cW, cH, lo, hi, ts, xp, yp, compact, strokeScale, yTicks, yearGap } = geom;
    const ctx = base.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(20,18,15,0.08)'; ctx.lineWidth = 0.6;
    for (let i = 0; i <= yTicks; i++) {
      const v = lo + (hi - lo) * (i / yTicks), y = yp(v);
      ctx.beginPath(); ctx.moveTo(pd.l, y); ctx.lineTo(W - pd.r, y); ctx.stroke();
      ctx.fillStyle = '#8a8780';
      ctx.font = `${compact ? 8 : 9}px 'IBM Plex Mono', monospace`; ctx.textAlign = 'right';
      const label = Math.abs(v) >= 10 && compact ? v.toFixed(0) : v.toFixed(1);
      ctx.fillText(label + '%', pd.l - 5, y + 3);
    }
    const seen = new Set();
    let lastLabelX = -Infinity;
    points.forEach(pt => {
      const yr = pt.date.slice(0, 4);
      const x = xp(+new Date(pt.date));
      if (!seen.has(yr) && x - lastLabelX >= yearGap) {
        seen.add(yr);
        lastLabelX = x;
        ctx.fillStyle = '#8a8780';
        ctx.font = `${compact ? 8 : 9}px 'IBM Plex Mono', monospace`; ctx.textAlign = 'center';
        ctx.fillText(yr, x, H - 7);
      }
    });

    const dp = Math.ceil(p * points.length);

    // Fill under fund line (only when fully drawn — partial fill flickers)
    if (p >= 1) {
      ctx.save();
      const gr = ctx.createLinearGradient(0, pd.t, 0, pd.t + cH);
      gr.addColorStop(0, 'rgba(28,58,42,0.22)');
      gr.addColorStop(1, 'rgba(28,58,42,0)');
      ctx.fillStyle = gr; ctx.beginPath();
      const by = yp(Math.max(lo, 0));
      ctx.moveTo(xp(ts[0]), by);
      points.forEach((pt, i) => {
        const v = finiteSeriesValue(pt, 'fund_return');
        if (v != null) ctx.lineTo(xp(ts[i]), yp(v));
      });
      ctx.lineTo(xp(ts[ts.length-1]), by); ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    // Draw supporting series first (so the headline fund line sits on top).
    [...series].reverse().forEach(s => {
      ctx.save();
      if (s.glow) {
        // Soft drop shadow on the fund line — adds visual weight without
        // looking neon. Subtle but it cuts through busy backgrounds.
        ctx.shadowColor = 'rgba(28,58,42,0.30)';
        ctx.shadowBlur = 6;
        ctx.shadowOffsetY = 1.5;
      }
      ctx.setLineDash(s.dash || []);
      ctx.strokeStyle = s.color;
      ctx.lineWidth = Math.max(0.85, s.w * strokeScale);
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.beginPath();
      let started = false;
      for (let i = 0; i < dp && i < points.length; i++) {
        const v = finiteSeriesValue(points[i], s.key);
        if (v == null) { started = false; continue; }
        const x = xp(ts[i]), y = yp(v);
        started ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
        started = true;
      }
      ctx.stroke();
      ctx.restore();
    });

    // Endpoint marker on fund line — accentuates the latest value.
    if (p >= 1) {
      const lastI = points.length - 1;
      const lastFund = finiteSeriesValue(points[lastI], 'fund_return');
      if (lastFund == null) return;
      const lx = xp(ts[lastI]), ly = yp(lastFund);
      ctx.save();
      ctx.fillStyle = '#1c3a2a';
      ctx.strokeStyle = '#fbfaf6';
      ctx.lineWidth = compact ? 1.5 : 2;
      ctx.beginPath();
      ctx.arc(lx, ly, compact ? 3.8 : 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawOverlay(mouseX) {
    if (renderId !== _accRenderId) return;
    if (!geom) return;
    const { dpr, W, H, pd, ts, xp, yp } = geom;
    const ctx = overlay.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    if (mouseX < 0) {
      const tip = document.getElementById('ctip');
      if (tip) tip.style.opacity = '0';
      return;
    }
    let ci = 0, md = Infinity;
    ts.forEach((t, i) => { const d = Math.abs(xp(t) - mouseX); if (d < md) { md = d; ci = i; } });
    if (md > 30) {
      const tip = document.getElementById('ctip');
      if (tip) tip.style.opacity = '0';
      return;
    }
    const hx = xp(ts[ci]);
    ctx.save();
    ctx.strokeStyle = 'rgba(28,58,42,0.4)'; ctx.lineWidth = 0.8; ctx.setLineDash([3, 4]);
    ctx.beginPath(); ctx.moveTo(hx, pd.t); ctx.lineTo(hx, H - pd.b); ctx.stroke();
    ctx.setLineDash([]);
    series.forEach(s => {
      const value = finiteSeriesValue(points[ci], s.key);
      if (value == null) return;
      const cy2 = yp(value);
      ctx.beginPath(); ctx.arc(hx, cy2, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = s.color; ctx.fill();
      ctx.strokeStyle = '#fbfaf6'; ctx.lineWidth = 1.5; ctx.stroke();
    });
    ctx.restore();

    const tip = document.getElementById('ctip');
    const tipdt = document.getElementById('tipdt');
    const tipbd = document.getElementById('tipbd');
    if (tip && tipdt && tipbd) {
      tipdt.textContent = points[ci].date;
      tipbd.innerHTML = series.map(s =>
        `<div class="tiprow"><span style="color:${s.color}">${esc(s.label)}</span><span style="color:#14130f">${finiteSeriesValue(points[ci], s.key) == null ? '--' : finiteSeriesValue(points[ci], s.key).toFixed(2) + '%'}</span></div>`
      ).join('');
      const parentW = overlay.parentElement.clientWidth;
      const tipW = Math.min(tip.offsetWidth || 175, parentW - 16);
      const ox = overlay.offsetLeft;
      const oy = overlay.offsetTop;
      let lx = ox + hx + 12;
      if (lx + tipW > parentW - 8) lx = ox + hx - tipW - 12;
      lx = Math.max(8, Math.min(lx, parentW - tipW - 8));
      tip.style.left = lx + 'px'; tip.style.top = (oy + pd.t) + 'px'; tip.style.opacity = '1';
    }
  }

  // Animate fund line draw-in over 900ms.
  resize();
  const dur = 900, st = performance.now();
  (function tick(now) {
    if (renderId !== _accRenderId) return;
    const t = Math.min((now - st) / dur, 1);
    prog = t * t * (3 - 2 * t);
    drawBase(prog);
    if (t < 1) {
      _accAnimFrame = requestAnimationFrame(tick);
    } else {
      _accAnimFrame = 0;
    }
  })(performance.now());

  const pointerX = e => e.clientX - overlay.getBoundingClientRect().left;
  const onPointerMove = e => {
    if (renderId !== _accRenderId) return;
    if (prog >= 1) drawOverlay(pointerX(e));
  };
  const onPointerDown = e => {
    if (renderId !== _accRenderId) return;
    if (overlay.setPointerCapture && e.pointerId != null) {
      overlay.setPointerCapture(e.pointerId);
    }
    if (prog >= 1) drawOverlay(pointerX(e));
  };
  const onPointerLeave = () => {
    if (renderId !== _accRenderId) return;
    if (prog >= 1) drawOverlay(-1);
  };
  overlay.addEventListener('pointermove', onPointerMove);
  overlay.addEventListener('pointerdown', onPointerDown);
  overlay.addEventListener('pointerleave', onPointerLeave);
  overlay.addEventListener('pointercancel', onPointerLeave);
  _accOverlayCleanup = () => {
    overlay.removeEventListener('pointermove', onPointerMove);
    overlay.removeEventListener('pointerdown', onPointerDown);
    overlay.removeEventListener('pointerleave', onPointerLeave);
    overlay.removeEventListener('pointercancel', onPointerLeave);
  };

  _accResizeObserver = new ResizeObserver(() => {
    if (renderId !== _accRenderId) return;
    resize();
    if (prog >= 1) { drawBase(1); drawOverlay(-1); }
  });
  _accResizeObserver.observe(base.parentElement);
}

function animBars() {
  document.querySelectorAll('[data-w]').forEach(el => {
    requestAnimationFrame(() => {
      el.style.width = el.dataset.w;
      if (el.dataset.left) el.style.left = el.dataset.left;
    });
  });
}

/* Tween every [data-count] element from 0 → target value, easing with a
 * tasteful out-cubic so the digits decelerate into place. Tabular figures
 * keep glyph widths fixed so nothing jitters during the run. */
function animCount() {
  const easeOut = t => 1 - Math.pow(1 - t, 3);
  document.querySelectorAll('[data-count]').forEach(el => {
    const target = parseFloat(el.dataset.count);
    if (!isFinite(target)) return;
    const decimals = parseInt(el.dataset.decimals || '2', 10);
    const suffix   = el.dataset.suffix || '';
    const prefix   = target >= 0 && (suffix === '%' || el.dataset.signed === '1') ? '+' : '';
    const dur = 1300;
    const start = performance.now();
    const tick = now => {
      const t = Math.min(1, (now - start) / dur);
      const v = target * easeOut(t);
      el.innerHTML = `${prefix}${v.toFixed(decimals)}${suffix ? `<span class="u">${suffix}</span>` : ''}`;
      if (t < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });
}

function stagger() {
  /* Staggered reveal with subtle acceleration — first cards appear faster,
   * then ease into the later ones. Below-fold cards wait for IntersectionObserver. */
  const items = [...document.querySelectorAll('.fade')];
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in');
        io.unobserve(e.target);
      }
    });
  }, { rootMargin: '-8% 0px -8% 0px', threshold: 0.05 });
  items.forEach((el, i) => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight + 200) {
      const delay = Math.min(60 + i * 60, 600);
      setTimeout(() => el.classList.add('in'), delay);
    } else {
      io.observe(el);
    }
  });
}

window.toggleResume = function () {
  const r = document.getElementById('resume');
  if (!r) return;
  const b = r.nextElementSibling;
  if (r.classList.toggle('open')) {
    if (b) b.textContent = '收起 ▴';
  } else {
    if (b) b.textContent = '展开全文 ▾';
  }
};

function setAccRangeFromButton(btn) {
  if (!btn || btn.disabled) return;
  const wrap = btn.closest('.rng-wrap');
  if (!wrap) return;
  wrap.querySelectorAll('.rngbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const days = parseInt(btn.dataset.days || '0', 10);
  renderAccChart(null, days);
}

function configureAccRanges(points) {
  const count = Array.isArray(points) ? points.length : 0;
  const buttons = [...document.querySelectorAll('.rngbtn')];
  if (!buttons.length) return;

  let best = null;
  buttons.forEach(btn => {
    const days = parseInt(btn.dataset.days || '0', 10);
    const available = count >= Math.max(2, days);
    btn.disabled = !available;
    btn.classList.toggle('disabled', !available);
    btn.title = available ? '' : '历史数据不足，暂不可用';
    if (available && (!best || days > parseInt(best.dataset.days || '0', 10))) best = btn;
  });

  buttons.forEach(btn => btn.classList.remove('active'));
  (best || buttons.find(btn => !btn.disabled) || buttons[0])?.classList.add('active');
}

function renderActiveAccChart(rawPoints) {
  const active = document.querySelector('.rngbtn.active') || document.querySelector('.rngbtn[data-range="5y"]');
  const days = parseInt(active?.dataset.days || '0', 10);
  renderAccChart(rawPoints || null, days);
}

/* Range toggle for the accumulated chart. Use pointer/touch first because
 * mobile scrollable button strips can delay or drop synthetic click events. */
let _lastRangeTap = 0;
document.addEventListener('pointerup', e => {
  const btn = e.target.closest('.rngbtn');
  if (!btn) return;
  _lastRangeTap = Date.now();
  e.preventDefault();
  setAccRangeFromButton(btn);
});
document.addEventListener('touchend', e => {
  const btn = e.target.closest('.rngbtn');
  if (!btn || Date.now() - _lastRangeTap < 350) return;
  _lastRangeTap = Date.now();
  e.preventDefault();
  setAccRangeFromButton(btn);
}, { passive: false });
document.addEventListener('click', e => {
  const btn = e.target.closest('.rngbtn');
  if (!btn || Date.now() - _lastRangeTap < 350) return;
  setAccRangeFromButton(btn);
});

/* Build a sticky right-rail TOC from every .slabel inside the main article.
 * Each section gets an auto-assigned anchor id; scroll-spy highlights the
 * active item via IntersectionObserver. */
function buildTOC() {
  const aside = document.getElementById('toc');
  if (!aside) return;
  const labels = document.querySelectorAll('#app .slabel');
  if (!labels.length) return;
  const items = [...labels].map((el, i) => {
    const card = el.closest('.card, .banner, .hero-stats') || el;
    const id = card.id || `sec-${i}`;
    if (!card.id) card.id = id;
    // Slabel may contain badge / asof children — strip them for the TOC
    // label so we only show the chinese section title.
    const clone = el.cloneNode(true);
    clone.querySelectorAll('.badge, .asof').forEach(n => n.remove());
    const title = clone.textContent.trim();
    return { id, title };
  });
  aside.innerHTML = `
    <div class="toc-head">目录 · INDEX</div>
    <ol class="toc-list">
      ${items.map(it => `<li><a href="#${it.id}" data-target="${it.id}">${esc(it.title)}</a></li>`).join('')}
    </ol>`;
  // Smooth scroll on click + active state.
  aside.addEventListener('click', e => {
    const a = e.target.closest('a[data-target]');
    if (!a) return;
    e.preventDefault();
    const t = document.getElementById(a.dataset.target);
    if (t) t.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
  // Scroll-spy: mark the topmost visible section.
  const links = new Map();
  aside.querySelectorAll('a[data-target]').forEach(a => links.set(a.dataset.target, a));
  const spy = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const a = links.get(e.target.id);
      if (!a) return;
      if (e.isIntersecting) {
        aside.querySelectorAll('a').forEach(x => x.classList.remove('active'));
        a.classList.add('active');
      }
    });
  }, { rootMargin: '-30% 0px -60% 0px', threshold: 0 });
  items.forEach(it => {
    const el = document.getElementById(it.id);
    if (el) spy.observe(el);
  });
}

/* ─── init ─── */

async function init() {
  try {
    // Resolve data file from `?code=<6-digit>` query, falling back to the
    // legacy fixed path so old bookmarks keep working. Whitelist 6-digit
    // codes to avoid path traversal via crafted URLs.
    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    const dataUrl = /^\d{6}$/.test(code || '')
      ? `./data/fund-${code}.json`
      : './data/fund-analysis.json';

    const data = await fetch(dataUrl).then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status + ' on ' + dataUrl);
      return r.json();
    });

    const app = document.getElementById('app');
    app.innerHTML = [
      bHeader(data),
      bHoldingBanner(data),
      bHeroStats(data),
      bInfo(data),
      bFee(data),
      bPeriods(data),
      bYearly(data),
      bMonthlySeries(data),
      bAccChart(),
      bBenchAccCompare(data),
      bRisk(data),
      bMaxDrawdownEvent(data),
      bBenchmark(data),
      bDistribution(data),
      bRolling(data),
      bRollingMoney(data),
      bScores(data),
      bManager(data),
      bManagerHistory(data),
      bAssetAllocation(data),
      bTopStocks(data),
      bTopBonds(data),
      bScaleChanges(data),
      bHolderStructure(data),
      bDividends(data),
      bFooter(data),
    ].join('');

    app.style.transition = 'opacity 0.4s';
    app.style.opacity = '1';
    document.getElementById('loading').classList.add('out');
    configureAccRanges(data.accumulated_return);
    stagger();
    buildTOC();
    setTimeout(() => {
      animGauge(data.scores.overall);
      renderRadar(data.scores.items);
      renderActiveAccChart(data.accumulated_return);
      animBars();
      animCount();
    }, 100);
  } catch (err) {
    document.getElementById('loading').innerHTML = `
      <div style="font-family:var(--mono);color:var(--neg);text-align:center;padding:32px">
        <div style="font-size:14px;margin-bottom:10px">数据加载失败</div>
        <div style="font-size:12px;color:var(--ink3);margin-bottom:8px">${esc(err.message)}</div>
        <div style="font-size:11px;color:var(--ink3)">请通过本地 HTTP 服务访问<br>python3 -m http.server 9876</div>
      </div>`;
  }
}
init();
</script>
