/* ─── animations / charts ─── */

function animGauge(score) {
  const fill = document.getElementById('gfill');
  const num  = document.getElementById('gnum');
  if (!fill || !num) return;
  const circ = 2 * Math.PI * 47;
  requestAnimationFrame(() => { fill.style.strokeDashoffset = circ * (1 - score / 100); });
  if (!score) { num.textContent = 0; return; }
  let cur = 0;
  const step = Math.max(1, Math.floor(score / 60));
  const ivl = setInterval(() => {
    cur = Math.min(cur + step, score);
    num.textContent = cur;
    if (cur >= score) clearInterval(ivl);
  }, 1000 / Math.max(score, 30));
}

function renderRadar(items) {
  const svg = document.getElementById('radsvg');
  if (!svg) return;
  const n = items.length, cx = 130, cy = 130, R = 88;
  const a0 = -Math.PI/2, step = 2*Math.PI/n;
  const pt = (i, r) => ({ x: cx+r*Math.cos(a0+i*step), y: cy+r*Math.sin(a0+i*step) });
  let h = '';
  [20,40,60,80,100].forEach(p => {
    const pp = items.map((_, i) => { const v = pt(i, R*p/100); return `${v.x.toFixed(1)},${v.y.toFixed(1)}`; }).join(' ');
    h += `<polygon points="${pp}" fill="none" stroke="#d4cfbe" stroke-width="0.6"/>`;
  });
  items.forEach((_, i) => { const p = pt(i, R); h += `<line x1="${cx}" y1="${cy}" x2="${p.x.toFixed(1)}" y2="${p.y.toFixed(1)}" stroke="#d4cfbe" stroke-width="0.6"/>`; });
  const ref = items.map((_, i) => { const p = pt(i, R*0.8); return `${p.x.toFixed(1)},${p.y.toFixed(1)}`; }).join(' ');
  h += `<polygon points="${ref}" fill="rgba(28,58,42,0.03)" stroke="rgba(28,58,42,0.35)" stroke-width="0.8" stroke-dasharray="3,3"/>`;
  const spts = items.map((it, i) => { const p = pt(i, R*it.score/100); return `${p.x.toFixed(1)},${p.y.toFixed(1)}`; }).join(' ');
  h += `<polygon id="rpoly" points="${spts}" fill="rgba(28,58,42,0.12)" stroke="#1c3a2a" stroke-width="1.5" opacity="0" style="transition:opacity 0.6s"/>`;
  items.forEach((it, i) => {
    const p = pt(i, R*it.score/100);
    h += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="#1c3a2a" stroke="#fbfaf6" stroke-width="1.5"/>`;
    const lp = pt(i, R+19);
    const vc = it.score>=80 ? '#2f6a48' : it.score>=60 ? '#14130f' : '#973340';
    h += `<text x="${lp.x.toFixed(1)}" y="${(lp.y-5).toFixed(1)}" text-anchor="middle" font-family="${'IBM Plex Mono,monospace'}" font-size="10" letter-spacing="0.5" fill="#8a8780">${esc(it.name)}</text>`;
    h += `<text x="${lp.x.toFixed(1)}" y="${(lp.y+10).toFixed(1)}" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="11" font-weight="500" fill="${vc}">${it.score}</text>`;
  });
  svg.innerHTML = h;
  setTimeout(() => { const p = document.getElementById('rpoly'); if (p) p.style.opacity = '1'; }, 400);
}

/* Downsample a time series to roughly `target` points using uniform stride.
   Cheap and good enough — values are smoothed cumulative returns, so stride
   sampling is visually indistinguishable from the original at this density. */
function downsample(points, target) {
  if (!points || points.length <= target) return points || [];
  const step = (points.length - 1) / (target - 1);
  const out = [];
  for (let i = 0; i < target; i++) {
    out.push(points[Math.min(points.length - 1, Math.round(i * step))]);
  }
  // Always include the last point.
  if (out[out.length - 1] !== points[points.length - 1]) {
    out[out.length - 1] = points[points.length - 1];
  }
  return out;
}

function finiteSeriesValue(point, key) {
  const value = point?.[key];
  return isFinite(value) ? value : null;
}

// Holds the raw daily accumulated_return series so we can re-window it
// when the user clicks a range button without re-fetching JSON.
let _accRaw = null;
let _accRenderId = 0;
let _accResizeObserver = null;
let _accOverlayCleanup = null;
let _accAnimFrame = 0;
let _accCurrentDays = 0;

function normalizeAccWindow(source, days) {
  if (!source?.length) return [];
  const activeDays = Math.max(0, Number.isFinite(days) ? days : 0);
  let windowed = source;
  if (activeDays > 0 && source.length > activeDays) {
    windowed = source.slice(-activeDays);
  }
  if (windowed.length <= 1) return windowed;

  const keys = ['fund_return', 'index_return', 'category_return', 'bench_return'];
  const starts = Object.fromEntries(keys.map(key => [key, windowed[0][key]]));
  const rebase = (value, start) => {
    if (!isFinite(value) || !isFinite(start)) return null;
    const base = 1 + start / 100;
    if (!isFinite(base) || Math.abs(base) < 1e-9) return value - start;
    return ((1 + value / 100) / base - 1) * 100;
  };

  return windowed.map((p, idx) => {
    const out = { date: p.date };
    keys.forEach(key => {
      const value = p[key];
      const isMissingZero = idx > 0 && value === 0 && starts[key] !== 0;
      out[key] = isMissingZero ? null : rebase(value, starts[key]);
    });
    return out;
  });
}

function renderAccChart(rawPoints, days) {
  if (Array.isArray(rawPoints)) _accRaw = rawPoints;
  const source = _accRaw || rawPoints;
  if (!source?.length) return;

  let base = document.getElementById('accchart-base');
  let overlay = document.getElementById('accchart-overlay');
  if (!base || !overlay) return;

  if (Number.isFinite(days)) _accCurrentDays = Math.max(0, days);
  const activeDays = _accCurrentDays;
  const renderId = ++_accRenderId;
  if (_accResizeObserver) {
    _accResizeObserver.disconnect();
    _accResizeObserver = null;
  }
  if (_accOverlayCleanup) {
    _accOverlayCleanup();
    _accOverlayCleanup = null;
  }
  if (_accAnimFrame) {
    cancelAnimationFrame(_accAnimFrame);
    _accAnimFrame = 0;
  }

  const freshBase = base.cloneNode(false);
  const freshOverlay = overlay.cloneNode(false);
  base.replaceWith(freshBase);
  overlay.replaceWith(freshOverlay);
  base = freshBase;
  overlay = freshOverlay;

  const tip = document.getElementById('ctip');
  if (tip) tip.style.opacity = '0';
  const overlayCtx = overlay.getContext('2d');
  overlayCtx.clearRect(0, 0, overlay.width, overlay.height);

  base.dataset.rangeDays = String(activeDays);
  overlay.dataset.rangeDays = String(activeDays);
  const windowed = normalizeAccWindow(source, activeDays);

  const series = [
    { key:'fund_return',     color:'#1c3a2a', w:3.2, label:'本基金',    glow:true,  dash:[] },
    { key:'index_return',    color:'#c8941d', w:1.6, label:'基准指数', glow:false, dash:[] },
    { key:'category_return', color:'#5a574e', w:1.4, label:'同类均值', glow:false, dash:[7,4] },
    { key:'bench_return',    color:'#a39e91', w:1.2, label:'债券指数', glow:false, dash:[3,4] },
  ];

  // Cached geometry — computed once per resize.
  let geom = null;
  let points = [];
  let prog = 0;

  function resize() {
    if (renderId !== _accRenderId) return;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const W = base.clientWidth, H = base.clientHeight;
    if (!W || !H) return;
    const compact = W < 420;
    const mid = W < 640;
    const target = compact ? Math.max(48, Math.floor(W / 4.8)) : Math.min(150, Math.max(80, Math.floor(W / 5)));
    points = downsample(windowed, target);
    if (points.length < 2) return;
    [base, overlay].forEach(c => {
      if (c.width !== W * dpr || c.height !== H * dpr) {
        c.width = W * dpr; c.height = H * dpr;
      }
    });
    const pd = compact
      ? { t: 12, r: 8, b: 24, l: 40 }
      : mid
        ? { t: 12, r: 10, b: 26, l: 42 }
        : { t: 14, r: 14, b: 28, l: 44 };
    const cW = Math.max(10, W - pd.l - pd.r);
    const cH = Math.max(10, H - pd.t - pd.b);
    let lo = Infinity, hi = -Infinity;
    series.forEach(s => points.forEach(p => {
      const v = finiteSeriesValue(p, s.key);
      if (v == null) return;
      if (v < lo) lo = v;
      if (v > hi) hi = v;
    }));
    if (!isFinite(lo) || !isFinite(hi)) { lo = -0.5; hi = 0.5; }
    const pad2 = (hi - lo) * 0.1 || 0.5; lo -= pad2; hi += pad2;
    const ts = points.map(p => +new Date(p.date));
    const t0 = ts[0], t1 = ts[ts.length-1], tr = t1 - t0 || 1;
    geom = {
      dpr, W, H, pd, cW, cH, lo, hi, ts, compact,
      strokeScale: compact ? 0.78 : mid ? 0.9 : 1,
      yTicks: compact ? 3 : 4,
      yearGap: compact ? 86 : mid ? 70 : 54,
      xp: t => pd.l + (t - t0) / tr * cW,
      yp: v => pd.t + (1 - (v - lo) / (hi - lo)) * cH,
    };
  }

  function drawBase(p) {
    if (renderId !== _accRenderId) return;
    if (!geom) return;
    const { dpr, W, H, pd, cW, cH, lo, hi, ts, xp, yp, compact, strokeScale, yTicks, yearGap } = geom;
    const ctx = base.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(20,18,15,0.08)'; ctx.lineWidth = 0.6;
    for (let i = 0; i <= yTicks; i++) {
      const v = lo + (hi - lo) * (i / yTicks), y = yp(v);
      ctx.beginPath(); ctx.moveTo(pd.l, y); ctx.lineTo(W - pd.r, y); ctx.stroke();
      ctx.fillStyle = '#8a8780';
      ctx.font = `${compact ? 8 : 9}px 'IBM Plex Mono', monospace`; ctx.textAlign = 'right';
      const label = Math.abs(v) >= 10 && compact ? v.toFixed(0) : v.toFixed(1);
      ctx.fillText(label + '%', pd.l - 5, y + 3);
    }
    const seen = new Set();
    let lastLabelX = -Infinity;
    points.forEach(pt => {
      const yr = pt.date.slice(0, 4);
      const x = xp(+new Date(pt.date));
      if (!seen.has(yr) && x - lastLabelX >= yearGap) {
        seen.add(yr);
        lastLabelX = x;
        ctx.fillStyle = '#8a8780';
        ctx.font = `${compact ? 8 : 9}px 'IBM Plex Mono', monospace`; ctx.textAlign = 'center';
        ctx.fillText(yr, x, H - 7);
      }
    });

    const dp = Math.ceil(p * points.length);

    // Fill under fund line (only when fully drawn — partial fill flickers)
    if (p >= 1) {
      ctx.save();
      const gr = ctx.createLinearGradient(0, pd.t, 0, pd.t + cH);
      gr.addColorStop(0, 'rgba(28,58,42,0.22)');
      gr.addColorStop(1, 'rgba(28,58,42,0)');
      ctx.fillStyle = gr; ctx.beginPath();
      const by = yp(Math.max(lo, 0));
      ctx.moveTo(xp(ts[0]), by);
      points.forEach((pt, i) => {
        const v = finiteSeriesValue(pt, 'fund_return');
        if (v != null) ctx.lineTo(xp(ts[i]), yp(v));
      });
      ctx.lineTo(xp(ts[ts.length-1]), by); ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    // Draw supporting series first (so the headline fund line sits on top).
    [...series].reverse().forEach(s => {
      ctx.save();
      if (s.glow) {
        // Soft drop shadow on the fund line — adds visual weight without
        // looking neon. Subtle but it cuts through busy backgrounds.
        ctx.shadowColor = 'rgba(28,58,42,0.30)';
        ctx.shadowBlur = 6;
        ctx.shadowOffsetY = 1.5;
      }
      ctx.setLineDash(s.dash || []);
      ctx.strokeStyle = s.color;
      ctx.lineWidth = Math.max(0.85, s.w * strokeScale);
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.beginPath();
      let started = false;
      for (let i = 0; i < dp && i < points.length; i++) {
        const v = finiteSeriesValue(points[i], s.key);
        if (v == null) { started = false; continue; }
        const x = xp(ts[i]), y = yp(v);
        started ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
        started = true;
      }
      ctx.stroke();
      ctx.restore();
    });

    // Endpoint marker on fund line — accentuates the latest value.
    if (p >= 1) {
      const lastI = points.length - 1;
      const lastFund = finiteSeriesValue(points[lastI], 'fund_return');
      if (lastFund == null) return;
      const lx = xp(ts[lastI]), ly = yp(lastFund);
      ctx.save();
      ctx.fillStyle = '#1c3a2a';
      ctx.strokeStyle = '#fbfaf6';
      ctx.lineWidth = compact ? 1.5 : 2;
      ctx.beginPath();
      ctx.arc(lx, ly, compact ? 3.8 : 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawOverlay(mouseX) {
    if (renderId !== _accRenderId) return;
    if (!geom) return;
    const { dpr, W, H, pd, ts, xp, yp } = geom;
    const ctx = overlay.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    if (mouseX < 0) {
      const tip = document.getElementById('ctip');
      if (tip) tip.style.opacity = '0';
      return;
    }
    let ci = 0, md = Infinity;
    ts.forEach((t, i) => { const d = Math.abs(xp(t) - mouseX); if (d < md) { md = d; ci = i; } });
    if (md > 30) {
      const tip = document.getElementById('ctip');
      if (tip) tip.style.opacity = '0';
      return;
    }
    const hx = xp(ts[ci]);
    ctx.save();
    ctx.strokeStyle = 'rgba(28,58,42,0.4)'; ctx.lineWidth = 0.8; ctx.setLineDash([3, 4]);
    ctx.beginPath(); ctx.moveTo(hx, pd.t); ctx.lineTo(hx, H - pd.b); ctx.stroke();
    ctx.setLineDash([]);
    series.forEach(s => {
      const value = finiteSeriesValue(points[ci], s.key);
      if (value == null) return;
      const cy2 = yp(value);
      ctx.beginPath(); ctx.arc(hx, cy2, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = s.color; ctx.fill();
      ctx.strokeStyle = '#fbfaf6'; ctx.lineWidth = 1.5; ctx.stroke();
    });
    ctx.restore();

    const tip = document.getElementById('ctip');
    const tipdt = document.getElementById('tipdt');
    const tipbd = document.getElementById('tipbd');
    if (tip && tipdt && tipbd) {
      tipdt.textContent = points[ci].date;
      tipbd.innerHTML = series.map(s =>
        `<div class="tiprow"><span style="color:${s.color}">${esc(s.label)}</span><span style="color:#14130f">${finiteSeriesValue(points[ci], s.key) == null ? '--' : finiteSeriesValue(points[ci], s.key).toFixed(2) + '%'}</span></div>`
      ).join('');
      const parentW = overlay.parentElement.clientWidth;
      const tipW = Math.min(tip.offsetWidth || 175, parentW - 16);
      const ox = overlay.offsetLeft;
      const oy = overlay.offsetTop;
      let lx = ox + hx + 12;
      if (lx + tipW > parentW - 8) lx = ox + hx - tipW - 12;
      lx = Math.max(8, Math.min(lx, parentW - tipW - 8));
      tip.style.left = lx + 'px'; tip.style.top = (oy + pd.t) + 'px'; tip.style.opacity = '1';
    }
  }

  // Animate fund line draw-in over 900ms.
  resize();
  const dur = 900, st = performance.now();
  (function tick(now) {
    if (renderId !== _accRenderId) return;
    const t = Math.min((now - st) / dur, 1);
    prog = t * t * (3 - 2 * t);
    drawBase(prog);
    if (t < 1) {
      _accAnimFrame = requestAnimationFrame(tick);
    } else {
      _accAnimFrame = 0;
    }
  })(performance.now());

  const pointerX = e => e.clientX - overlay.getBoundingClientRect().left;
  const onPointerMove = e => {
    if (renderId !== _accRenderId) return;
    if (prog >= 1) drawOverlay(pointerX(e));
  };
  const onPointerDown = e => {
    if (renderId !== _accRenderId) return;
    if (overlay.setPointerCapture && e.pointerId != null) {
      overlay.setPointerCapture(e.pointerId);
    }
    if (prog >= 1) drawOverlay(pointerX(e));
  };
  const onPointerLeave = () => {
    if (renderId !== _accRenderId) return;
    if (prog >= 1) drawOverlay(-1);
  };
  overlay.addEventListener('pointermove', onPointerMove);
  overlay.addEventListener('pointerdown', onPointerDown);
  overlay.addEventListener('pointerleave', onPointerLeave);
  overlay.addEventListener('pointercancel', onPointerLeave);
  _accOverlayCleanup = () => {
    overlay.removeEventListener('pointermove', onPointerMove);
    overlay.removeEventListener('pointerdown', onPointerDown);
    overlay.removeEventListener('pointerleave', onPointerLeave);
    overlay.removeEventListener('pointercancel', onPointerLeave);
  };

  _accResizeObserver = new ResizeObserver(() => {
    if (renderId !== _accRenderId) return;
    resize();
    if (prog >= 1) { drawBase(1); drawOverlay(-1); }
  });
  _accResizeObserver.observe(base.parentElement);
}

function animBars() {
  document.querySelectorAll('[data-w]').forEach(el => {
    requestAnimationFrame(() => {
      el.style.width = el.dataset.w;
      if (el.dataset.left) el.style.left = el.dataset.left;
    });
  });
}

/* Tween every [data-count] element from 0 → target value, easing with a
 * tasteful out-cubic so the digits decelerate into place. Tabular figures
 * keep glyph widths fixed so nothing jitters during the run. */
function animCount() {
  const easeOut = t => 1 - Math.pow(1 - t, 3);
  document.querySelectorAll('[data-count]').forEach(el => {
    const target = parseFloat(el.dataset.count);
    if (!isFinite(target)) return;
    const decimals = parseInt(el.dataset.decimals || '2', 10);
    const suffix   = el.dataset.suffix || '';
    const prefix   = target >= 0 && (suffix === '%' || el.dataset.signed === '1') ? '+' : '';
    const dur = 1300;
    const start = performance.now();
    const tick = now => {
      const t = Math.min(1, (now - start) / dur);
      const v = target * easeOut(t);
      el.innerHTML = `${prefix}${v.toFixed(decimals)}${suffix ? `<span class="u">${suffix}</span>` : ''}`;
      if (t < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });
}

function stagger() {
  /* Staggered reveal with subtle acceleration — first cards appear faster,
   * then ease into the later ones. Below-fold cards wait for IntersectionObserver. */
  const items = [...document.querySelectorAll('.fade')];
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in');
        io.unobserve(e.target);
      }
    });
  }, { rootMargin: '-8% 0px -8% 0px', threshold: 0.05 });
  items.forEach((el, i) => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight + 200) {
      const delay = Math.min(60 + i * 60, 600);
      setTimeout(() => el.classList.add('in'), delay);
    } else {
      io.observe(el);
    }
  });
}

window.toggleResume = function () {
  const r = document.getElementById('resume');
  if (!r) return;
  const b = r.nextElementSibling;
  if (r.classList.toggle('open')) {
    if (b) b.textContent = '收起 ▴';
  } else {
    if (b) b.textContent = '展开全文 ▾';
  }
};

function setAccRangeFromButton(btn) {
  if (!btn || btn.disabled) return;
  const wrap = btn.closest('.rng-wrap');
  if (!wrap) return;
  wrap.querySelectorAll('.rngbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const days = parseInt(btn.dataset.days || '0', 10);
  renderAccChart(null, days);
}

function configureAccRanges(points) {
  const count = Array.isArray(points) ? points.length : 0;
  const buttons = [...document.querySelectorAll('.rngbtn')];
  if (!buttons.length) return;

  let best = null;
  buttons.forEach(btn => {
    const days = parseInt(btn.dataset.days || '0', 10);
    const available = count >= Math.max(2, days);
    btn.disabled = !available;
    btn.classList.toggle('disabled', !available);
    btn.title = available ? '' : '历史数据不足，暂不可用';
    if (available && (!best || days > parseInt(best.dataset.days || '0', 10))) best = btn;
  });

  buttons.forEach(btn => btn.classList.remove('active'));
  (best || buttons.find(btn => !btn.disabled) || buttons[0])?.classList.add('active');
}

function renderActiveAccChart(rawPoints) {
  const active = document.querySelector('.rngbtn.active') || document.querySelector('.rngbtn[data-range="5y"]');
  const days = parseInt(active?.dataset.days || '0', 10);
  renderAccChart(rawPoints || null, days);
}

/* Range toggle for the accumulated chart. Use pointer/touch first because
 * mobile scrollable button strips can delay or drop synthetic click events. */
let _lastRangeTap = 0;
document.addEventListener('pointerup', e => {
  const btn = e.target.closest('.rngbtn');
  if (!btn) return;
  _lastRangeTap = Date.now();
  e.preventDefault();
  setAccRangeFromButton(btn);
});
document.addEventListener('touchend', e => {
  const btn = e.target.closest('.rngbtn');
  if (!btn || Date.now() - _lastRangeTap < 350) return;
  _lastRangeTap = Date.now();
  e.preventDefault();
  setAccRangeFromButton(btn);
}, { passive: false });
document.addEventListener('click', e => {
  const btn = e.target.closest('.rngbtn');
  if (!btn || Date.now() - _lastRangeTap < 350) return;
  setAccRangeFromButton(btn);
});

/* Build a sticky right-rail TOC grouped by chapter. Each chapter-break
 * starts a group; .slabel elements found until the next break form the
 * sections inside that chapter. Scroll-spy highlights the currently
 * visible section link. */
function buildTOC() {
  const aside = document.getElementById('toc');
  if (!aside) return;
  const app = document.getElementById('app');
  if (!app) return;
  const breaks = [...app.querySelectorAll('.chapter-break')];
  if (!breaks.length) return;

  let sectionCounter = 0;
  const groups = breaks.map((br, idx) => {
    const meta = CHAPTERS[idx] || { roman: '?', tag: '', name: '' };
    const sections = [];
    let node = br.nextElementSibling;
    while (node && !node.classList.contains('chapter-break')) {
      const label = node.querySelector(':scope > .slabel');
      if (label) {
        sectionCounter += 1;
        if (!node.id) node.id = `sec-toc-${sectionCounter}`;
        const numNode = label.querySelector('.slabel-num');
        const titleNode = label.querySelector('.slabel-title');
        const num = numNode ? numNode.textContent.trim().replace(/^§/, '') : '';
        const title = titleNode ? titleNode.textContent.trim() : label.textContent.trim();
        sections.push({ id: node.id, num, title });
      }
      node = node.nextElementSibling;
    }
    return { roman: meta.roman, tag: meta.tag, name: meta.name, breakId: br.id, sections };
  });

  aside.innerHTML = `
    <div class="toc-head">目录 · INDEX</div>
    <ol class="toc-list">
      ${groups.map(g => `
        <li class="toc-chapter">
          <a class="toc-chapter-head" href="#${g.breakId}" data-target="${g.breakId}">
            <span class="toc-chapter-roman">${esc(g.roman)}</span>
            <span>${esc(g.tag)}</span>
          </a>
          <ul class="toc-sections">
            ${g.sections.map(s => `
              <li><a href="#${s.id}" data-target="${s.id}" data-num="${esc(s.num)}">${esc(s.title)}</a></li>
            `).join('')}
          </ul>
        </li>
      `).join('')}
    </ol>`;

  aside.addEventListener('click', e => {
    const a = e.target.closest('a[data-target]');
    if (!a) return;
    e.preventDefault();
    const t = document.getElementById(a.dataset.target);
    if (t) t.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  const links = new Map();
  aside.querySelectorAll('.toc-sections a[data-target]').forEach(a => links.set(a.dataset.target, a));
  if (!links.size) return;
  const spy = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const a = links.get(e.target.id);
      if (!a) return;
      if (e.isIntersecting) {
        aside.querySelectorAll('.toc-sections a').forEach(x => x.classList.remove('active'));
        a.classList.add('active');
      }
    });
  }, { rootMargin: '-30% 0px -60% 0px', threshold: 0 });
  groups.forEach(g => g.sections.forEach(s => {
    const el = document.getElementById(s.id);
    if (el) spy.observe(el);
  }));
}

/* Top scroll progress: fixed 2px hairline at viewport top that fills
 * from 0 → 1 as the user scrolls. rAF-throttled so we don't write style
 * more than once per frame. */
function initScrollProgress() {
  const fill = document.getElementById('scrollProgFill');
  if (!fill) return;
  let ticking = false;
  const update = () => {
    const max = document.documentElement.scrollHeight - window.innerHeight;
    const p = max > 0 ? Math.min(1, Math.max(0, window.scrollY / max)) : 0;
    fill.style.transform = `scaleX(${p.toFixed(4)})`;
    ticking = false;
  };
  const onScroll = () => {
    if (!ticking) {
      requestAnimationFrame(update);
      ticking = true;
    }
  };
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
}

/* Chapter break reveal — uses its own IntersectionObserver because
 * chapter-break sits outside .fade and has a bigger, slower animation. */
function revealChapterBreaks() {
  const breaks = document.querySelectorAll('.chapter-break');
  if (!breaks.length) return;
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in');
        io.unobserve(e.target);
      }
    });
  }, { rootMargin: '-10% 0px -10% 0px', threshold: 0.05 });
  breaks.forEach(br => {
    const rect = br.getBoundingClientRect();
    if (rect.top < window.innerHeight + 200) {
      setTimeout(() => br.classList.add('in'), 200);
    } else {
      io.observe(br);
    }
  });
}

/* ─── init ─── */

async function init() {
  try {
    // Resolve data file from `?code=<6-digit>` query, falling back to the
    // legacy fixed path so old bookmarks keep working. Whitelist 6-digit
    // codes to avoid path traversal via crafted URLs.
    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    const requestedDataUrl = /^\d{6}$/.test(code || '')
      ? `./data/fund-${code}.json`
      : './data/fund-analysis.json';

    async function loadJsonWithFallback(primaryUrl) {
      const primary = await fetch(primaryUrl);
      if (primary.ok) return primary.json();
      if (primaryUrl !== './data/fund-analysis.json') {
        const fallback = await fetch('./data/fund-analysis.json');
        if (fallback.ok) return fallback.json();
        throw new Error('HTTP ' + fallback.status + ' on ./data/fund-analysis.json');
      }
      throw new Error('HTTP ' + primary.status + ' on ' + primaryUrl);
    }

    const data = await loadJsonWithFallback(requestedDataUrl);

    const app = document.getElementById('app');
    // Builder order is significant: bChapterBreak() advances _secCh and
    // resets _secNo as a side effect, and the next builders' sl() calls
    // pick up those counters in document order. Reordering across
    // chapters will break the §NN.NN numbering.
    app.innerHTML = [
      // Front matter — no chapter prefix
      bHeader(data),
      bHoldingBanner(data),
      bVerdict(data),
      bHeroStats(data),
      bInvestmentSummary(data),

      // I. RETURN
      bChapterBreak(1, 4),
      bPeriods(data),
      bAccChart(),
      bBenchAccCompare(data),
      bBenchmark(data),

      // II. RISK
      bChapterBreak(2, 6),
      bRisk(data),
      bMaxDrawdownEvent(data),
      bDistribution(data),
      bRolling(data),
      bRollingMoney(data),
      bNavHistory(data),

      // III. STYLE
      bChapterBreak(3, 6),
      bAssetAllocation(data),
      bDataGaps(data),
      bManagerRoster(data),
      bManagerStyle(data),
      bTopStocks(data),
      bTopBonds(data),

      // IV. FLOW & COST
      bChapterBreak(4, 5),
      bFlowRisk(data),
      bScaleChanges(data),
      bHolderStructure(data),
      bTradingCost(data),
      bCostDrag(data),

      // V. APPENDIX
      bChapterBreak(5, 6),
      bInfo(data),
      bScores(data),
      bManager(data),
      bManagerHistory(data),
      bYearly(data),
      bMonthlySeries(data),
      bDividends(data),

      bFooter(data),
    ].join('');

    app.style.transition = 'opacity 0.4s';
    app.style.opacity = '1';
    document.getElementById('loading').classList.add('out');
    configureAccRanges(data.accumulated_return);
    stagger();
    revealChapterBreaks();
    buildTOC();
    initScrollProgress();
    setTimeout(() => {
      animGauge(data.scores.overall);
      renderRadar(data.scores.items);
      renderActiveAccChart(data.accumulated_return);
      animBars();
      animCount();
    }, 100);
  } catch (err) {
    document.getElementById('loading').innerHTML = `
      <div style="font-family:var(--mono);color:var(--neg);text-align:center;padding:32px">
        <div style="font-size:14px;margin-bottom:10px">数据加载失败</div>
        <div style="font-size:12px;color:var(--ink3);margin-bottom:8px">${esc(err.message)}</div>
        <div style="font-size:11px;color:var(--ink3)">请通过本地 HTTP 服务访问<br>python3 -m http.server 9876</div>
      </div>`;
  }
}
init();
</script>
