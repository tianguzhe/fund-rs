<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>持仓走势 · Portfolio Ledger</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,0..100,0..1;1,9..144,300..900,0..100,0..1&family=DM+Sans:opsz,wght@9..40,400..700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');

:root {
  --bg: #efe7d4;
  --bg-deep: #e8dec6;
  --paper: rgba(252, 244, 230, 0.94);
  --paper-strong: #fcf4e6;
  --ink: #1a1410;
  --ink-soft: #3a2e22;
  --muted: #6f5f48;
  --faint: #a3957c;
  --line: rgba(26, 20, 16, 0.13);
  --rule: rgba(26, 20, 16, 0.32);
  --gold: #a8782c;
  --gold-deep: #8b6322;
  --oxblood: #6b2c1a;
  --up: #a83c1f;
  --down: #1f5e58;
  --up-bg: rgba(168, 60, 31, 0.13);
  --down-bg: rgba(31, 94, 88, 0.13);
  --fund-0: #a83c1f;
  --fund-1: #1f5e58;
  --fund-2: #a8782c;
  --fund-3: #4a5d7e;
  --fund-4: #7a3a68;
  --fund-5: #5a7a4a;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 24px 60px rgba(40, 28, 14, 0.16);
  --font-display: 'Fraunces', 'Noto Serif SC', 'Songti SC', serif;
  --font-sans: 'DM Sans', 'Noto Sans SC', -apple-system, system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-num: 'JetBrains Mono', 'IBM Plex Mono', monospace;
  --font-serif: 'Noto Serif SC', 'Songti SC', serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  color: var(--ink);
  min-height: 100vh;
  padding: 56px 28px 80px;
  font-size: 15.5px;
  line-height: 1.6;
  letter-spacing: 0.005em;
  -webkit-font-smoothing: antialiased;
  text-rendering: geometricPrecision;
  background:
    radial-gradient(ellipse 70% 50% at 18% 4%, rgba(168, 60, 31, 0.11), transparent 70%),
    radial-gradient(ellipse 60% 50% at 86% 6%, rgba(31, 94, 88, 0.07), transparent 70%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.32;
  background-image: radial-gradient(rgba(26, 20, 16, 0.18) 0.5px, transparent 0.7px);
  background-size: 5px 5px;
  mix-blend-mode: multiply;
  z-index: -1;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.05;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  mix-blend-mode: multiply;
  z-index: -1;
}

.container { max-width: 1180px; margin: 0 auto; position: relative; }

/* ── EDITORIAL UTILITIES ────────────────────────────── */
.fleuron {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 22px;
  margin: 6px 0 28px;
  color: var(--gold);
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.5rem;
  font-variation-settings: "opsz" 14, "SOFT" 100, "WONK" 1;
  opacity: 0.78;
  letter-spacing: 0.4em;
}
.fleuron::before, .fleuron::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--rule) 30%, var(--rule) 70%, transparent);
  max-width: 220px;
}

/* ── HERO ─────────────────────────────────────────────── */
.hero {
  position: relative;
  border: 1px solid var(--ink);
  border-radius: var(--radius-lg);
  padding: 40px 40px 32px;
  margin-bottom: 28px;
  background: linear-gradient(170deg, rgba(252, 244, 230, 0.96), rgba(238, 228, 210, 0.78));
  box-shadow: var(--shadow), inset 0 0 0 1px rgba(168, 122, 44, 0.18);
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: 16px; left: 16px; right: 16px;
  height: 1px;
  background: var(--ink);
  opacity: 0.18;
}
.hero::after {
  content: 'PORTFOLIO LEDGER';
  position: absolute;
  right: 32px;
  bottom: -28px;
  font-family: var(--font-display);
  font-style: italic;
  font-size: clamp(3.4rem, 11vw, 8.2rem);
  font-weight: 400;
  letter-spacing: -0.06em;
  font-variation-settings: "opsz" 144, "SOFT" 100, "WONK" 1;
  color: rgba(26, 20, 16, 0.04);
  pointer-events: none;
  white-space: nowrap;
  line-height: 0.85;
}

.eyebrow {
  position: relative;
  z-index: 1;
  display: inline-flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 22px;
  margin-top: 16px;
  padding: 0;
  font-family: var(--font-display);
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-soft);
  background: transparent;
  border: none;
  border-radius: 0;
  font-variation-settings: "opsz" 14;
}
.eyebrow .num {
  font-style: italic;
  color: var(--gold);
  font-variation-settings: "opsz" 14, "SOFT" 80, "WONK" 1;
  letter-spacing: 0.04em;
  font-weight: 400;
  border-right: 1px solid var(--rule);
  padding-right: 14px;
  text-transform: none;
  font-size: 0.84rem;
}

h1 {
  font-family: var(--font-display);
  font-size: clamp(2.6rem, 6.4vw, 5.4rem);
  line-height: 1.0;
  font-weight: 400;
  letter-spacing: -0.045em;
  font-variation-settings: "opsz" 144, "SOFT" 100, "WONK" 1;
  color: var(--ink);
  position: relative;
  z-index: 1;
  max-width: 720px;
}

.subtitle {
  position: relative;
  z-index: 1;
  color: var(--muted);
  font-size: 0.94rem;
  margin-top: 22px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
  max-width: 540px;
  font-feature-settings: "onum" 1;
}

.hero-metrics {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  margin-top: 36px;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
}
.hero-metric {
  padding: 20px 22px;
  position: relative;
  background: transparent;
  border: none;
  border-radius: 0;
}
.hero-metric + .hero-metric { border-left: 1px solid var(--line); }
.hero-metric .label {
  font-family: var(--font-display);
  color: var(--ink-soft);
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.hero-metric .value {
  margin-top: 12px;
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 400;
  letter-spacing: -0.025em;
  font-variation-settings: "opsz" 36, "SOFT" 50, "WONK" 1;
  font-feature-settings: "onum" 1, "salt" 1;
  line-height: 1;
  color: var(--ink);
}
.hero-metric .value.up { color: var(--up); }
.hero-metric .value.down { color: var(--down); }
.hero-metric .note {
  margin-top: 10px;
  color: var(--muted);
  font-size: 0.78rem;
  font-feature-settings: "onum" 1;
}

/* ── PANELS ───────────────────────────────────────────── */
.panel {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 28px 30px 26px;
  box-shadow: 0 12px 28px rgba(40, 28, 14, 0.07);
  margin-bottom: 22px;
  position: relative;
}
.panel-title {
  display: flex;
  align-items: baseline;
  gap: 16px;
  font-family: var(--font-display);
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 22px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
  font-variation-settings: "opsz" 14;
}
.panel-title::before {
  content: '§ ' attr(data-numeral);
  font-family: var(--font-display);
  font-style: italic;
  color: var(--gold);
  font-size: 1rem;
  letter-spacing: 0.04em;
  font-variation-settings: "opsz" 14, "SOFT" 100, "WONK" 1;
  border-right: 1px solid var(--rule);
  padding-right: 16px;
  margin-right: 4px;
  font-weight: 400;
  text-transform: none;
}
.panel-title::after {
  content: '◆';
  margin-left: auto;
  color: var(--gold);
  font-size: 0.55rem;
  opacity: 0.5;
  letter-spacing: 0;
}

.two-col { display: grid; grid-template-columns: minmax(0, 3fr) minmax(0, 2fr); gap: 22px; margin-bottom: 22px; }

/* ── FUND ROSTER ─────────────────────────────────────── */
.fund-roster {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border-top: 1px solid var(--line);
  border-left: 1px solid var(--line);
}
.fund-mini {
  position: relative;
  padding: 20px 22px 24px 28px;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  background: transparent;
  border-radius: 0;
  overflow: hidden;
  transition: background 0.2s ease;
}
.fund-mini:hover { background: rgba(168, 122, 44, 0.06); transform: none; box-shadow: none; }
.fund-mini::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--fund-color); }
.fund-mini::after {
  content: attr(data-mark);
  position: absolute;
  right: -4px;
  bottom: -22px;
  font-family: var(--font-display);
  font-style: italic;
  font-size: 4.4rem;
  font-variation-settings: "opsz" 144, "SOFT" 100, "WONK" 1;
  color: var(--fund-color);
  opacity: 0.06;
  line-height: 0.85;
  pointer-events: none;
  font-feature-settings: "onum" 1;
}
.fund-mini-name {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 1.1rem;
  line-height: 1.32;
  letter-spacing: -0.012em;
  font-variation-settings: "opsz" 36, "SOFT" 60, "WONK" 1;
  color: var(--ink);
}
.fund-mini-code {
  display: inline-block;
  margin-top: 6px;
  padding: 3px 9px;
  border: 1px solid var(--line);
  border-radius: 3px;
  background: transparent;
  color: var(--muted);
  font-family: var(--font-num);
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  font-weight: 500;
}
.fund-mini-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  margin-top: 10px;
  font-family: var(--font-display);
  font-size: 0.8rem;
  color: var(--muted);
  letter-spacing: 0.04em;
}
.fund-mini-row b {
  font-family: var(--font-num);
  font-weight: 600;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  font-feature-settings: "onum" 1;
}
.fund-mini-bar {
  margin-top: 14px;
  height: 3px;
  border-radius: 0;
  background: rgba(26, 20, 16, 0.07);
  overflow: hidden;
}
.fund-mini-bar > i {
  display: block;
  height: 100%;
  background: var(--fund-color);
  width: var(--w, 0%);
}

/* ── CHARTS ──────────────────────────────────────────── */
.chart-container { position: relative; height: 320px; }
.chart-container.tall { height: 360px; }

/* ── CONTRIBUTION LIST ───────────────────────────────── */
.contrib-list { display: grid; gap: 12px; }
.contrib-meta {
  font-family: var(--font-display);
  font-size: 0.74rem;
  color: var(--ink-soft);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 4px;
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--line);
  font-variation-settings: "opsz" 14;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.contrib-meta b {
  font-family: var(--font-num);
  font-weight: 600;
  font-feature-settings: "onum" 1;
  color: var(--ink);
  text-transform: none;
  letter-spacing: 0;
  font-size: 0.86rem;
}
.contrib-row {
  display: grid;
  grid-template-columns: 96px 1fr 96px;
  gap: 12px;
  align-items: center;
  font-size: 0.84rem;
}
.contrib-name {
  color: var(--ink-soft);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: var(--font-sans);
  font-weight: 500;
}
.contrib-bar {
  height: 10px;
  border-radius: 0;
  background: rgba(26, 20, 16, 0.06);
  position: relative;
  overflow: hidden;
}
.contrib-bar > i {
  position: absolute;
  top: 0;
  bottom: 0;
  border-radius: 0;
}
.contrib-amt {
  text-align: right;
  font-family: var(--font-num);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  font-feature-settings: "onum" 1;
}
.contrib-amt.up { color: var(--up); }
.contrib-amt.down { color: var(--down); }

/* ── HEATMAP ─────────────────────────────────────────── */
.heatmap-wrap { overflow-x: auto; padding-bottom: 6px; }
.heatmap {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 14px;
  min-width: 720px;
}
.heatmap-rows { display: contents; }
.heatmap-label {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-size: 0.84rem;
  color: var(--ink-soft);
  font-weight: 500;
  letter-spacing: 0.005em;
  font-variation-settings: "opsz" 14, "SOFT" 60;
}
.heatmap-label::before {
  content: '';
  width: 8px;
  height: 8px;
  background: var(--fund-color);
  border-radius: 0;
  transform: rotate(45deg);
}
.heatmap-cells {
  display: grid;
  grid-template-columns: repeat(var(--days), minmax(10px, 1fr));
  gap: 4px;
}
.cell {
  position: relative;
  aspect-ratio: 1;
  min-height: 16px;
  border: 1px solid rgba(26, 20, 16, 0.08);
  border-radius: 3px;
  background: var(--cell-color);
  transition: transform 0.18s cubic-bezier(0.2, 0.7, 0.2, 1), box-shadow 0.18s ease;
  cursor: default;
}
.cell:hover, .cell:focus {
  transform: translateY(-2px) scale(1.12);
  box-shadow: 0 8px 18px rgba(40, 28, 14, 0.16);
  outline: none;
  z-index: 5;
}
.cell.empty { background: transparent; border-style: dashed; }
.cell::after {
  content: attr(data-date) "\A" attr(data-main) "\A" attr(data-sub);
  position: absolute;
  left: 50%;
  bottom: calc(100% + 9px);
  transform: translateX(-50%) translateY(4px);
  min-width: 110px;
  padding: 9px 12px;
  border: 1px solid var(--rule);
  border-radius: 3px;
  background: var(--paper-strong);
  color: var(--ink);
  font-family: var(--font-num);
  font-feature-settings: "onum" 1;
  font-size: 0.74rem;
  line-height: 1.5;
  opacity: 0;
  pointer-events: none;
  white-space: pre;
  box-shadow: 0 14px 30px rgba(40, 28, 14, 0.18);
  transition: opacity 0.14s ease, transform 0.14s ease;
}
.cell:hover::after, .cell:focus::after { opacity: 1; transform: translateX(-50%) translateY(0); }
.heatmap-axis {
  grid-column: 2;
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  color: var(--faint);
  font-family: var(--font-num);
  font-size: 0.7rem;
  font-feature-settings: "onum" 1;
}

.legend-row {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px dashed var(--line);
  color: var(--muted);
  font-size: 0.78rem;
  font-family: var(--font-display);
}
.legend-row span { display: inline-flex; align-items: center; gap: 8px; }
.legend-row span::before { content: ''; width: 10px; height: 10px; border-radius: 2px; background: currentColor; }
.legend-row .up { color: var(--up); }
.legend-row .down { color: var(--down); }

.error { color: var(--up); }

/* ── ANIMATIONS ──────────────────────────────────────── */
@keyframes riseIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.hero, .panel, .fleuron {
  animation: riseIn 0.7s cubic-bezier(0.2, 0.7, 0.2, 1) both;
}
.hero { animation-delay: 0.05s; }
.panel:nth-of-type(1) { animation-delay: 0.18s; }
.panel:nth-of-type(2) { animation-delay: 0.26s; }
.panel:nth-of-type(3) { animation-delay: 0.34s; }
.panel:nth-of-type(4) { animation-delay: 0.42s; }
.panel:nth-of-type(5) { animation-delay: 0.5s; }
.fleuron { animation-delay: 0.22s; }

/* ── RESPONSIVE ──────────────────────────────────────── */
@media (max-width: 900px) {
  body { padding: 32px 16px 56px; }
  .hero { padding: 30px 24px 26px; border-radius: 8px; }
  .hero-metrics { grid-template-columns: repeat(2, 1fr); }
  .hero-metric:nth-child(2) { border-left: 1px solid var(--line); }
  .hero-metric:nth-child(3) { border-left: none; border-top: 1px solid var(--line); }
  .hero-metric:nth-child(4) { border-left: 1px solid var(--line); border-top: 1px solid var(--line); }
  .two-col { grid-template-columns: 1fr; }
  .fund-roster { grid-template-columns: repeat(2, 1fr); }
  .panel { padding: 24px 22px; }
}

@media (max-width: 560px) {
  .hero-metrics { grid-template-columns: 1fr; }
  .hero-metric:nth-child(n) { border-left: none; border-top: 1px solid var(--line); }
  .hero-metric:first-child { border-top: none; }
  .panel { padding: 20px 18px; }
  .fund-roster { grid-template-columns: 1fr; }
  .chart-container { height: 260px; }
  .chart-container.tall { height: 300px; }
  .contrib-row { grid-template-columns: 80px 1fr 86px; }
  .heatmap { grid-template-columns: 86px 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <section class="hero">
    <div class="eyebrow"><span class="num">FOLIO N° 01</span><span>Portfolio Ledger</span></div>
    <h1>持仓走势</h1>
    <div class="subtitle" id="subtitle">加载中...</div>
    <div class="hero-metrics" id="hero-metrics"></div>
  </section>

  <div class="panel">
    <div class="panel-title" data-numeral="I">持仓明细</div>
    <div class="fund-roster" id="fund-roster"></div>
  </div>

  <div class="fleuron">❦</div>

  <div class="two-col">
    <div class="panel">
      <div class="panel-title" data-numeral="II">累计盈亏走势</div>
      <div class="chart-container tall"><canvas id="cumChart"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-title" data-numeral="III">最近一日贡献</div>
      <div class="contrib-list" id="contrib-list"></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title" data-numeral="IV">每日涨跌热力</div>
    <div class="heatmap-wrap">
      <div class="heatmap" id="heatmap" style="--days:0"></div>
    </div>
    <div class="legend-row"><span class="up">上涨</span><span class="down">下跌</span><span>色深 = 幅度</span></div>
  </div>

  <div class="panel">
    <div class="panel-title" data-numeral="V">每日总盈亏</div>
    <div class="chart-container"><canvas id="dailyChart"></canvas></div>
  </div>
</div>

<script>
const FUND_VARS = ['--fund-0', '--fund-1', '--fund-2', '--fund-3', '--fund-4', '--fund-5'];
const root = getComputedStyle(document.documentElement);
const fundColor = i => root.getPropertyValue(FUND_VARS[i % FUND_VARS.length]).trim() || '#666';

const num = v => v == null ? null : Number(v);
const fmtPct = v => v == null ? '—' : (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
const fmtAmt = v => {
  if (v == null) return '—';
  const sign = v >= 0 ? '+' : '−';
  const abs = Math.abs(v);
  return sign + abs.toLocaleString('zh-CN', { maximumFractionDigits: 0 }) + '元';
};
const fmtMoneyShort = v => {
  const abs = Math.abs(v);
  if (abs >= 1e4) return (v / 1e4).toFixed(2) + ' 万';
  return v.toFixed(0);
};

async function loadData() {
  const res = await fetch('./data/portfolio.json?ts=' + Date.now());
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

function deriveContext(data) {
  const dates = data.dates;
  const totalCum = data.total.cumulative_amounts.map(Number);
  const totalDailyAmt = data.total.day_amounts.map(Number);
  const totalDailyPct = data.total.day_pcts.map(Number);
  const totalHolding = data.funds.reduce((s, f) => s + f.holding, 0);

  let runningMax = 0;
  let maxDD = 0;
  let curDD = 0;
  totalCum.forEach(v => {
    if (v > runningMax) runningMax = v;
    const dd = v - runningMax;
    if (dd < maxDD) maxDD = dd;
    curDD = dd;
  });

  const lastIdx = dates.length - 1;
  const lastCum = totalCum[lastIdx] ?? 0;
  const cumPct = totalHolding > 0 ? (lastCum / totalHolding) * 100 : 0;

  return {
    dates, totalCum, totalDailyAmt, totalDailyPct, totalHolding,
    lastCum, cumPct, maxDD, curDD,
    funds: data.funds.map((f, i) => ({
      ...f,
      idx: i,
      color: fundColor(i),
      day_pcts_n: f.day_pcts.map(num),
      day_amounts_n: f.day_amounts.map(num),
      cum_n: f.cumulative_amounts.map(Number),
    })),
  };
}

function renderHero(ctx) {
  const direction = ctx.lastCum >= 0 ? 'up' : 'down';
  const cumPctClass = ctx.cumPct >= 0 ? 'up' : 'down';
  const ddNote = ctx.totalHolding > 0 ? `占总资产 ${(Math.abs(ctx.maxDD) / ctx.totalHolding * 100).toFixed(2)}%` : '';
  const items = [
    { label: '总资产', value: fmtMoneyShort(ctx.totalHolding), note: `${ctx.funds.length} 只基金` },
    { label: '累计盈亏', value: (ctx.lastCum >= 0 ? '+' : '') + fmtMoneyShort(ctx.lastCum), note: `${ctx.dates.length} 个交易日`, valClass: direction },
    { label: '累计收益率', value: fmtPct(ctx.cumPct), note: '相对总持仓本金', valClass: cumPctClass },
    { label: '最大回撤', value: fmtMoneyShort(ctx.maxDD), note: ddNote, valClass: 'down' },
  ];
  document.getElementById('hero-metrics').innerHTML = items.map(m => `
    <div class="hero-metric">
      <div class="label">${m.label}</div>
      <div class="value ${m.valClass || ''}">${m.value}</div>
      <div class="note">${m.note}</div>
    </div>`).join('');
}

function renderRoster(ctx) {
  const html = ctx.funds.map((f, i) => {
    const lastCum = f.cum_n.at(-1) ?? 0;
    const lastPct = (() => {
      for (let j = f.day_pcts_n.length - 1; j >= 0; j--) {
        if (f.day_pcts_n[j] != null) return f.day_pcts_n[j];
      }
      return null;
    })();
    const cumColor = lastCum >= 0 ? 'var(--up)' : 'var(--down)';
    const dayColor = lastPct == null ? 'var(--faint)' : (lastPct >= 0 ? 'var(--up)' : 'var(--down)');
    const mark = String.fromCharCode(0x2160 + i); // Roman numeral I, II, III, ...
    return `
      <div class="fund-mini" style="--fund-color:${f.color}" data-mark="${mark}">
        <div class="fund-mini-name">${f.name}</div>
        <span class="fund-mini-code">${f.code}</span>
        <div class="fund-mini-row"><span>持仓</span><b>${fmtMoneyShort(f.holding)}</b></div>
        <div class="fund-mini-row"><span>占比</span><b>${f.weight.toFixed(1)}%</b></div>
        <div class="fund-mini-row"><span>累计</span><b style="color:${cumColor}">${(lastCum >= 0 ? '+' : '') + lastCum.toFixed(0)} 元</b></div>
        <div class="fund-mini-row"><span>最近一日</span><b style="color:${dayColor}">${fmtPct(lastPct)}</b></div>
        <div class="fund-mini-bar"><i style="--w:${Math.min(100, f.weight).toFixed(1)}%"></i></div>
      </div>`;
  }).join('');
  document.getElementById('fund-roster').innerHTML = html;
}

const tickFont = { size: 10, family: 'JetBrains Mono', weight: '500' };
const tickColor = '#a3957c';
const gridColor = 'rgba(26, 20, 16, 0.05)';
const chartTooltip = {
  backgroundColor: 'rgba(26, 20, 16, 0.94)',
  titleFont: { family: 'Noto Sans SC', size: 12, weight: '500' },
  bodyFont: { family: 'JetBrains Mono', size: 12, weight: '500' },
  padding: 12,
  cornerRadius: 3,
  borderColor: 'rgba(168, 122, 44, 0.4)',
  borderWidth: 1,
};
const chartLegend = {
  position: 'bottom',
  labels: { font: { size: 11, family: 'Noto Sans SC', weight: '500' }, color: '#6f5f48', padding: 14, boxWidth: 12, boxHeight: 12 }
};

function renderCumChart(ctx) {
  const ink = root.getPropertyValue('--ink').trim();
  const gold = root.getPropertyValue('--gold').trim();
  let max = 0;
  const peak = ctx.totalCum.map(v => { if (v > max) max = v; return max; });

  new Chart(document.getElementById('cumChart'), {
    type: 'line',
    data: {
      labels: ctx.dates.map(d => d.slice(5)),
      datasets: [
        {
          label: '累计盈亏',
          data: ctx.totalCum,
          borderColor: ink,
          backgroundColor: ctx.lastCum >= 0 ? 'rgba(168,60,31,0.13)' : 'rgba(31,94,88,0.13)',
          fill: { target: 'origin', above: 'rgba(168,60,31,0.13)', below: 'rgba(31,94,88,0.13)' },
          tension: 0.3,
          pointRadius: 0,
          pointHoverRadius: 5,
          pointHoverBackgroundColor: ink,
          borderWidth: 2.2,
        },
        {
          label: '历史峰值',
          data: peak,
          borderColor: gold,
          borderDash: [4, 4],
          borderWidth: 1.5,
          pointRadius: 0,
          fill: false,
          tension: 0,
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: chartLegend,
        tooltip: {
          ...chartTooltip,
          callbacks: { label: c => ' ' + c.dataset.label + ': ' + (c.parsed.y >= 0 ? '+' : '') + c.parsed.y.toFixed(0) + ' 元' }
        }
      },
      scales: {
        x: { ticks: { maxTicksLimit: 8, font: tickFont, color: tickColor }, grid: { display: false } },
        y: { ticks: { font: tickFont, color: tickColor, callback: v => (v >= 0 ? '+' : '') + v }, grid: { color: gridColor } }
      }
    }
  });
}

function renderContrib(ctx) {
  const lastIdx = ctx.dates.length - 1;
  const items = ctx.funds
    .map(f => ({ name: f.name, color: f.color, amount: f.day_amounts_n[lastIdx] ?? 0, pct: f.day_pcts_n[lastIdx] }))
    .sort((a, b) => Math.abs(b.amount) - Math.abs(a.amount));
  const maxAbs = Math.max(...items.map(it => Math.abs(it.amount)), 1);
  const html = items.map(it => {
    const pctW = (Math.abs(it.amount) / maxAbs * 100).toFixed(1);
    const cls = it.amount >= 0 ? 'up' : 'down';
    return `
      <div class="contrib-row">
        <div class="contrib-name" title="${it.name}">${it.name}</div>
        <div class="contrib-bar"><i style="left:0; width:${pctW}%; background:var(--${it.amount >= 0 ? 'up' : 'down'})"></i></div>
        <div class="contrib-amt ${cls}">${fmtAmt(it.amount)}</div>
      </div>`;
  }).join('');
  const date = ctx.dates[lastIdx];
  document.getElementById('contrib-list').innerHTML = `
    <div class="contrib-meta">
      <span>${date}</span>
      <b>总计 ${fmtAmt(ctx.totalDailyAmt[lastIdx])}</b>
    </div>${html}`;
}

function heatColor(pct, max) {
  if (pct == null || Math.abs(pct) < 1e-6) return 'rgba(26, 20, 16, 0.045)';
  const strength = Math.max(0.18, Math.min(0.92, Math.abs(pct) / max));
  const alpha = (0.16 + strength * 0.74).toFixed(2);
  return pct >= 0 ? `rgba(168, 60, 31, ${alpha})` : `rgba(31, 94, 88, ${alpha})`;
}

function renderHeatmap(ctx) {
  const allPcts = ctx.funds.flatMap(f => f.day_pcts_n.filter(v => v != null));
  const maxAbs = Math.max(...allPcts.map(Math.abs), 0.01);
  const dateMarks = [
    ctx.dates[0],
    ctx.dates[Math.floor(ctx.dates.length / 2)],
    ctx.dates[ctx.dates.length - 1],
  ].filter(Boolean).map(d => d.slice(5));

  const rows = ctx.funds.map(f => {
    const cells = ctx.dates.map((date, i) => {
      const pct = f.day_pcts_n[i];
      const amt = f.day_amounts_n[i];
      if (pct == null) {
        return `<div class="cell empty" data-date="${date}" data-main="无数据" data-sub="${f.name}"></div>`;
      }
      return `<div class="cell" tabindex="0" data-date="${date}" data-main="${fmtPct(pct)}" data-sub="${f.name} · ${fmtAmt(amt)}" style="--cell-color:${heatColor(pct, maxAbs)}"></div>`;
    }).join('');
    return `
      <div class="heatmap-label" style="--fund-color:${f.color}">${f.name}</div>
      <div class="heatmap-cells" style="--days:${ctx.dates.length}">${cells}</div>`;
  }).join('');

  const heatmap = document.getElementById('heatmap');
  heatmap.style.setProperty('--days', ctx.dates.length);
  heatmap.innerHTML = `${rows}<div class="heatmap-axis">${dateMarks.map(d => `<span>${d}</span>`).join('')}</div>`;
}

function renderDailyChart(ctx) {
  const data = ctx.totalDailyAmt;
  const colors = data.map(v => v >= 0 ? 'rgba(168,60,31,0.78)' : 'rgba(31,94,88,0.78)');
  const ma = data.map((_, i) => {
    const start = Math.max(0, i - 6);
    const slice = data.slice(start, i + 1);
    return slice.reduce((s, v) => s + v, 0) / slice.length;
  });

  new Chart(document.getElementById('dailyChart'), {
    type: 'bar',
    data: {
      labels: ctx.dates.map(d => d.slice(5)),
      datasets: [
        { label: '当日盈亏', data, backgroundColor: colors, borderRadius: 1, borderSkipped: false, order: 2 },
        { label: '7日均线', type: 'line', data: ma, borderColor: '#a8782c', borderWidth: 2, pointRadius: 0, tension: 0.35, fill: false, order: 1 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: chartLegend,
        tooltip: {
          ...chartTooltip,
          callbacks: { label: c => ' ' + c.dataset.label + ': ' + (c.parsed.y >= 0 ? '+' : '') + c.parsed.y.toFixed(0) + ' 元' }
        }
      },
      scales: {
        x: { ticks: { maxTicksLimit: 10, font: tickFont, color: tickColor }, grid: { display: false } },
        y: { ticks: { font: tickFont, color: tickColor, callback: v => (v >= 0 ? '+' : '') + v }, grid: { color: gridColor } }
      }
    }
  });
}

async function main() {
  try {
    const data = await loadData();
    if (!data.dates || !data.dates.length) {
      throw new Error('数据为空，请先运行 fund portfolio --save 录入数据');
    }
    const ctx = deriveContext(data);
    document.getElementById('subtitle').textContent =
      `本账册整理至 ${data.generated_at} · ${ctx.dates.length} 个交易日 · ${ctx.funds.length} 只基金`;
    renderHero(ctx);
    renderRoster(ctx);
    renderCumChart(ctx);
    renderContrib(ctx);
    renderHeatmap(ctx);
    renderDailyChart(ctx);
  } catch (e) {
    document.getElementById('subtitle').innerHTML =
      `<span class="error">加载失败: ${e.message}<br>请先运行: fund export</span>`;
    console.error(e);
  }
}

main();
</script>
</body>
</html>
