<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>组合每日收益</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f8f5; --page: #fff; --card: #fff; --cardhi: #f8faf7; --tint: #eef4ee;
      --ink: #121411; --ink2: #4a5049; --ink3: #7f887e; --ink4: #b3bbb1;
      --rule: #e2e8df; --rule-mid: #cbd5c9;
      --acc: #1c3a2a; --gold: #8a6a2f; --warn: #a4761d;
      /* 涨跌色（中国习惯：红涨绿跌） */
      --up: #c0392b; --down: #2f6a48; --flat: #7f887e;
      --display: 'Spectral','STSong','Songti SC','Source Han Serif SC',serif;
      --body: 'Newsreader','STSong','Songti SC','Source Han Serif SC',Georgia,serif;
      --sans: -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',system-ui,sans-serif;
      --mono: 'IBM Plex Mono','SF Mono',Menlo,Consolas,monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--ink);
      font-family: var(--body); font-size: 16px; line-height: 1.6;
      font-feature-settings: 'kern' 1, 'liga' 1;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      background-image:
        linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(247,248,245,0.9) 45%, rgba(241,245,240,0.94) 100%),
        linear-gradient(90deg, rgba(18,20,17,0.03) 1px, transparent 1px),
        linear-gradient(180deg, rgba(18,20,17,0.022) 1px, transparent 1px);
      background-size: auto, 44px 44px, 44px 44px;
      min-height: 100vh;
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 56px 40px 80px; }

    /* ── loading / error ── */
    #loading { padding: 120px 0; text-align: center; color: var(--ink3); font-family: var(--mono); font-size: 12px; letter-spacing: .08em; }
    #err { display: none; padding: 80px 0; text-align: center; color: var(--up); font-family: var(--mono); font-size: 13px; }

    /* ── masthead ── */
    .masthead { border-bottom: 2px solid var(--ink); padding-bottom: 18px; margin-bottom: 6px; }
    .kicker { font-family: var(--mono); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
    h1.title { font-family: var(--display); font-weight: 600; font-size: 46px; line-height: 1.04; letter-spacing: -.01em; margin: 0 0 10px; }
    .sub { font-family: var(--mono); font-size: 12px; color: var(--ink3); letter-spacing: .03em; }
    .sub b { color: var(--ink2); font-weight: 500; }

    /* ── disclaimer ── */
    .disclaimer {
      margin: 22px 0 34px; padding: 14px 18px;
      border: 1px solid #e3cf9e; border-left: 3px solid var(--warn);
      background: #fdf8ec; color: #6f5417;
      font-family: var(--sans); font-size: 13px; line-height: 1.55;
    }
    .disclaimer b { color: var(--warn); letter-spacing: .02em; }

    /* ── stats grid ── */
    .stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; background: var(--rule); border: 1px solid var(--rule); margin-bottom: 40px; }
    .stat { background: var(--page); padding: 16px 16px 18px; }
    .stat .label { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 9px; }
    .stat .value { font-family: var(--mono); font-weight: 500; font-size: 22px; line-height: 1; letter-spacing: -.01em; }
    .stat .sub { font-family: var(--mono); font-size: 10px; color: var(--ink4); margin-top: 6px; }
    @media (max-width: 860px) { .stats { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 520px) { .stats { grid-template-columns: repeat(2, 1fr); } }

    /* ── panels ── */
    .panel { background: var(--page); border: 1px solid var(--rule); margin-bottom: 28px; }
    .panel-head { padding: 16px 22px 12px; border-bottom: 1px solid var(--rule); }
    .panel-head h2 { font-family: var(--display); font-weight: 600; font-size: 19px; margin: 0 0 3px; letter-spacing: -.005em; }
    .panel-head .note { font-family: var(--mono); font-size: 11px; color: var(--ink3); letter-spacing: .02em; }
    .panel-body { padding: 14px 18px 18px; }
    svg.chart { display: block; width: 100%; height: auto; }

    /* ── funds table ── */
    table.funds { width: 100%; border-collapse: collapse; font-size: 14px; }
    table.funds th, table.funds td { padding: 11px 12px; border-bottom: 1px solid var(--rule); text-align: right; }
    table.funds th { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink3); font-weight: 500; }
    table.funds td.l, table.funds th.l { text-align: left; }
    table.funds td.code { font-family: var(--mono); font-size: 13px; color: var(--ink2); }
    table.funds td.name { font-family: var(--body); color: var(--ink); }
    table.funds td.num { font-family: var(--mono); font-size: 13px; }
    table.funds tr:last-child td { border-bottom: none; }

    .up { color: var(--up); } .down { color: var(--down); } .flat { color: var(--flat); }

    /* ── foot ── */
    .foot { margin-top: 36px; padding-top: 18px; border-top: 1px solid var(--rule); font-family: var(--mono); font-size: 11px; color: var(--ink4); line-height: 1.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="loading">LOADING · 组合每日收益</div>
    <div id="err"></div>
    <main id="app" style="display:none"></main>
  </div>

  <script>
    "use strict";
    const UP = "#c0392b", DOWN = "#2f6a48", FLAT = "#9aa39a", ACC = "#1c3a2a", RULE = "#e2e8df", INK3 = "#7f887e";

    const fmtPct = (v, d = 2) => (v > 0 ? "+" : v < 0 ? "−" : "") + Math.abs(v).toFixed(d) + "%";
    const cls = (v) => (v > 0 ? "up" : v < 0 ? "down" : "flat");
    const fmtMoney = (v) => v.toLocaleString("en-US", { maximumFractionDigits: 0 });
    const mmdd = (iso) => iso.slice(5).replace("-", "/");
    const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

    // ── cumulative-return line + area chart ──────────────────────────────
    function cumChart(series) {
      const W = 1000, H = 360, P = { l: 54, r: 22, t: 26, b: 38 };
      const N = series.length, pw = W - P.l - P.r, ph = H - P.t - P.b;
      const xs = (i) => P.l + pw * i / (N - 1);
      const vals = series.map((s) => s.cum_return_pct);
      let lo = Math.min(0, ...vals), hi = Math.max(0, ...vals);
      const pad = (hi - lo) * 0.14 || 1; lo -= pad; hi += pad;
      const ys = (v) => P.t + ph * (1 - (v - lo) / (hi - lo));
      const line = series.map((s, i) => (i ? "L" : "M") + xs(i).toFixed(1) + " " + ys(s.cum_return_pct).toFixed(1)).join(" ");
      const z = ys(0);
      const area = line + " L" + xs(N - 1).toFixed(1) + " " + z.toFixed(1) + " L" + xs(0).toFixed(1) + " " + z.toFixed(1) + " Z";

      // y grid + labels (5 ticks)
      let grid = "";
      for (let k = 0; k <= 4; k++) {
        const v = lo + (hi - lo) * k / 4, y = ys(v);
        grid += `<line x1="${P.l}" y1="${y.toFixed(1)}" x2="${W - P.r}" y2="${y.toFixed(1)}" stroke="${RULE}" stroke-width="1"/>`;
        grid += `<text x="${P.l - 8}" y="${(y + 3).toFixed(1)}" text-anchor="end" font-family="var(--mono)" font-size="10" fill="${INK3}">${v.toFixed(1)}%</text>`;
      }
      // x labels (~7)
      let xl = "";
      const step = Math.max(1, Math.round((N - 1) / 6));
      for (let i = 0; i < N; i += step) {
        xl += `<text x="${xs(i).toFixed(1)}" y="${H - 14}" text-anchor="middle" font-family="var(--mono)" font-size="10" fill="${INK3}">${mmdd(series[i].date)}</text>`;
      }
      // last point marker + label
      const lx = xs(N - 1), ly = ys(series[N - 1].cum_return_pct);
      const last = series[N - 1].cum_return_pct;

      return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="累计收益曲线">
        <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${UP}" stop-opacity="0.16"/><stop offset="100%" stop-color="${UP}" stop-opacity="0.01"/>
        </linearGradient></defs>
        ${grid}
        <line x1="${P.l}" y1="${z.toFixed(1)}" x2="${W - P.r}" y2="${z.toFixed(1)}" stroke="${INK3}" stroke-width="1" stroke-dasharray="3 3"/>
        <path d="${area}" fill="url(#ag)"/>
        <path d="${line}" fill="none" stroke="${ACC}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3.5" fill="${ACC}"/>
        <text x="${(lx - 6).toFixed(1)}" y="${(ly - 9).toFixed(1)}" text-anchor="end" font-family="var(--mono)" font-size="12" font-weight="500" fill="${ACC}">${fmtPct(last)}</text>
        ${xl}
      </svg>`;
    }

    // ── daily-return bar chart (red up / green down) ─────────────────────
    function dailyChart(series) {
      const W = 1000, H = 210, P = { l: 54, r: 22, t: 18, b: 30 };
      const N = series.length, pw = W - P.l - P.r, ph = H - P.t - P.b;
      const xs = (i) => P.l + pw * i / (N - 1);
      const data = series.slice(1); // day0 has placeholder 0
      const m = Math.max(...data.map((s) => Math.abs(s.daily_return_pct))) * 1.18 || 1;
      const ys = (v) => P.t + ph * (1 - (v + m) / (2 * m));
      const z = ys(0), bw = pw / (N - 1) * 0.6;

      let bars = "";
      for (let i = 1; i < N; i++) {
        const v = series[i].daily_return_pct, y = v >= 0 ? ys(v) : z, h = Math.abs(ys(v) - z);
        bars += `<rect x="${(xs(i) - bw / 2).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0.6, h).toFixed(1)}" fill="${v >= 0 ? UP : DOWN}" opacity="0.92"/>`;
      }
      // y labels
      let grid = "";
      [m, m / 2, 0, -m / 2, -m].forEach((v) => {
        const y = ys(v);
        grid += `<line x1="${P.l}" y1="${y.toFixed(1)}" x2="${W - P.r}" y2="${y.toFixed(1)}" stroke="${RULE}" stroke-width="${v === 0 ? 1 : 0.6}"/>`;
        grid += `<text x="${P.l - 8}" y="${(y + 3).toFixed(1)}" text-anchor="end" font-family="var(--mono)" font-size="10" fill="${INK3}">${v.toFixed(2)}%</text>`;
      });
      let xl = "";
      const step = Math.max(1, Math.round((N - 1) / 6));
      for (let i = 0; i < N; i += step) {
        xl += `<text x="${xs(i).toFixed(1)}" y="${H - 10}" text-anchor="middle" font-family="var(--mono)" font-size="10" fill="${INK3}">${mmdd(series[i].date)}</text>`;
      }
      return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="每日收益率">
        ${grid}${bars}${xl}
      </svg>`;
    }

    function statCard(label, valueHtml, sub) {
      return `<div class="stat"><div class="label">${label}</div><div class="value">${valueHtml}</div><div class="sub">${sub || ""}</div></div>`;
    }

    function render(d) {
      const s = d.stats, meta = d.meta;
      const app = document.getElementById("app");
      const head = `
        <div class="masthead">
          <div class="kicker">Portfolio · Simulated Daily Return</div>
          <h1 class="title">组合每日收益走势</h1>
          <div class="sub"><b>${meta.from}</b> → <b>${meta.to}</b> · 共 <b>${s.trading_days}</b> 个交易日 · 模拟回溯（当前持仓份额 × 历史净值）</div>
        </div>
        <div class="disclaimer"><b>⚠ 模拟回溯，非真实账户盈亏。</b> ${esc(meta.disclaimer)}</div>`;

      const stats = `<div class="stats">
        ${statCard("区间累计收益", `<span class="${cls(s.cum_return_pct)}">${fmtPct(s.cum_return_pct)}</span>`, `${s.trading_days} 个交易日`)}
        ${statCard("最佳单日", `<span class="up">${fmtPct(s.best_day.pct)}</span>`, mmdd(s.best_day.date))}
        ${statCard("最差单日", `<span class="down">${fmtPct(s.worst_day.pct)}</span>`, mmdd(s.worst_day.date))}
        ${statCard("上涨胜率", `${s.win_rate_pct.toFixed(1)}%`, `涨 ${s.up_days} / 跌 ${s.down_days}`)}
        ${statCard("年化波动", `${s.ann_volatility_pct.toFixed(2)}%`, "日收益 σ×√252")}
        ${statCard("当前市值", fmtMoney(s.current_market_value), "CNY（模拟）")}
      </div>`;

      const cum = `<div class="panel"><div class="panel-head"><h2>累计收益曲线</h2><div class="note">基于累计净值(acc_nav)，规避分红日假摔 · 末值 ${fmtPct(s.cum_return_pct)}</div></div><div class="panel-body">${cumChart(d.series)}</div></div>`;
      const daily = `<div class="panel"><div class="panel-head"><h2>每日收益率</h2><div class="note">红涨绿跌 · 最佳 ${mmdd(s.best_day.date)} ${fmtPct(s.best_day.pct)} · 最差 ${mmdd(s.worst_day.date)} ${fmtPct(s.worst_day.pct)}</div></div><div class="panel-body">${dailyChart(d.series)}</div></div>`;

      const rows = d.funds.map((f) => `<tr>
        <td class="code l">${esc(f.code)}</td>
        <td class="name l">${esc(f.name)}</td>
        <td class="num">${f.shares.toLocaleString("en-US", { maximumFractionDigits: 2 })}</td>
        <td class="num">${f.latest_nav.toFixed(4)}</td>
        <td class="num">${fmtMoney(f.market_value)}</td>
        <td class="num ${cls(f.period_pct)}">${fmtPct(f.period_pct)}</td>
        <td class="num ${cls(f.contribution_pct)}">${fmtPct(f.contribution_pct)}</td>
      </tr>`).join("");
      const funds = `<div class="panel"><div class="panel-head"><h2>成分基金</h2><div class="note">区间涨幅按累计净值 · 贡献 = 该基金对组合累计收益的拉动（合计 ≈ ${fmtPct(s.cum_return_pct)}）</div></div>
        <div class="panel-body" style="padding-top:4px">
          <table class="funds"><thead><tr>
            <th class="l">代码</th><th class="l">名称</th><th>份额</th><th>最新净值</th><th>市值(元)</th><th>区间涨幅</th><th>收益贡献</th>
          </tr></thead><tbody>${rows}</tbody></table>
        </div></div>`;

      const foot = `<div class="foot">
        数据口径：收益基于累计净值(acc_nav)，市值 = 单位净值 × 当前份额；交易日取 5 只基金净值交集。<br>
        历史区间受上游天天基金接口长度限制（实际 ${meta.from} 起）。模拟基准：${meta.basis}。生成时间：${esc(meta.generated || "—")}。<br>
        刷新数据：fund backfill 后运行 scripts/gen_portfolio_daily.py
      </div>`;

      app.innerHTML = head + stats + cum + daily + funds + foot;
      document.getElementById("loading").style.display = "none";
      app.style.display = "block";
    }

    fetch("./data/portfolio-daily.json")
      .then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(render)
      .catch((e) => {
        document.getElementById("loading").style.display = "none";
        const err = document.getElementById("err");
        err.style.display = "block";
        err.textContent = "数据加载失败：" + e.message + "（需先运行 scripts/gen_portfolio_daily.py 生成 ./data/portfolio-daily.json）";
      });
  </script>
</body>
</html>
